// Simulate lottery using weighted random selection
function simulateLottery(lotteryTeams) {
  const teams = lotteryTeams.map(t => ({ ...t }));
  const lotteryResult = [];

  // Top 4 picks determined by lottery balls
  for (let pick = 0; pick < 4; pick++) {
    const totalOdds = teams.reduce((s, t) => s + t.odds, 0);
    let rand = Math.random() * totalOdds;
    let selected = teams[0];
    for (const t of teams) {
      rand -= t.odds;
      if (rand <= 0) { selected = t; break; }
    }
    lotteryResult.push({ ...selected, pick: pick + 1 });
    const idx = teams.findIndex(t => t.team === selected.team);
    teams.splice(idx, 1);
  }

  // Picks 5-14 go in reverse-record order
  teams.forEach((t, i) => {
    lotteryResult.push({ ...t, pick: 5 + i });
  });

  return lotteryResult;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `${r}, ${g}, ${b}`;
}

function applyTeamColors(colors) {
  const root = document.documentElement.style;
  root.setProperty('--team-primary', colors.primary);
  root.setProperty('--team-secondary', colors.secondary);
  root.setProperty('--team-midnight', colors.midnight);
  root.setProperty('--team-deep', colors.deep);
  root.setProperty('--team-light', colors.light);
  root.setProperty('--team-black', colors.black);
  root.setProperty('--team-primary-rgb', hexToRgb(colors.primary));
  root.setProperty('--team-secondary-rgb', hexToRgb(colors.secondary));
  root.setProperty('--team-midnight-rgb', hexToRgb(colors.midnight));
  root.setProperty('--team-deep-rgb', hexToRgb(colors.deep));
  root.setProperty('--team-light-rgb', hexToRgb(colors.light));
}

function generateStubRoster(config) {
  const stubs = [
    { pos: 'PG', starter: true }, { pos: 'SG', starter: true }, { pos: 'SF', starter: true },
    { pos: 'PF', starter: true }, { pos: 'C', starter: true }, { pos: 'PG', starter: false },
    { pos: 'SG', starter: false }, { pos: 'SF', starter: false }, { pos: 'PF', starter: false },
    { pos: 'C', starter: false }, { pos: 'SG/SF', starter: false }, { pos: 'PF/C', starter: false },
    { pos: 'PG/SG', starter: false }, { pos: 'SF/PF', starter: false }
  ];
  return stubs.map((s, i) => ({
    name: `${config.name} Player ${i + 1}`, pos: s.pos, number: i + 1, badge: null, starter: s.starter,
    headshot: null,
    stats: { ppg: +(10 + Math.random() * 15).toFixed(1), rpg: +(2 + Math.random() * 7).toFixed(1), apg: +(1 + Math.random() * 6).toFixed(1), fgPct: +(40 + Math.random() * 10).toFixed(1), threePct: +(30 + Math.random() * 12).toFixed(1), tsPct: +(50 + Math.random() * 10).toFixed(1) },

    radar: { Scoring: 55 + Math.floor(Math.random() * 25), Playmaking: 50 + Math.floor(Math.random() * 25), Defense: 50 + Math.floor(Math.random() * 25), Athleticism: 55 + Math.floor(Math.random() * 25), Shooting: 50 + Math.floor(Math.random() * 25), IQ: 55 + Math.floor(Math.random() * 20) },
    zones: { Rim: 30, Midrange: 25, Three: 25, FreeThrow: 20 },
    monthly: [], strengths: ['Full data coming soon'], weaknesses: ['Full data coming soon'],
    scoutReport: `Detailed scouting data for the ${config.fullName} is coming soon. Check back for full player analysis.`,
    ceiling: { label: 'TBD', pct: 50 }, comps: [],
    streak: Array.from({ length: 10 }, (_, j) => {
      const r = Math.random();
      return { result: r > 0.6 ? 'hot' : r > 0.3 ? 'avg' : 'cold', opp: '???', pts: Math.floor(8 + Math.random() * 20), reb: Math.floor(1 + Math.random() * 8), ast: Math.floor(Math.random() * 8), win: Math.random() > 0.5 };
    })
  }));
}

function getTeamData(config, field) {
  if (field === 'prospects') {
    if (config.prospects) {
      return config.prospects.map(p => ({ ...p, teamFit: p.jazzFit || p.teamFit || 5, teamFitAnalysis: p.jazzFitAnalysis || p.teamFitAnalysis || '' }));
    }
    return generateStubProspects(config);
  }
  if (config[field]) return config[field];
  switch (field) {
    case 'players': return generateStubRoster(config);
    case 'pollQuestions': return generatePollQuestions(config);
    case 'lotteryTeams': return JAZZ_LOTTERY_TEAMS;
    default: return null;
  }
}

// Floating Particles
function Particles() {
  const particles = useMemo(() => Array.from({length: 15}, (_, i) => ({
    id: i,
    left: Math.random() * 100,
    delay: Math.random() * 8,
    duration: 6 + Math.random() * 8,
    size: 2 + Math.random() * 4,
    opacity: 0.2 + Math.random() * 0.4
  })), []);
  return (
    <div className="absolute inset-0 overflow-hidden pointer-events-none">
      {particles.map(p => (
        <div key={p.id} className="absolute rounded-full" style={{
          left: `${p.left}%`, bottom: '-10px',
          width: p.size, height: p.size,
          background: `rgba(var(--team-secondary-rgb),${p.opacity})`,
          animation: `float-particle ${p.duration}s ${p.delay}s infinite linear`,
          willChange: 'transform'
        }} />
      ))}
    </div>
  );
}

        {number}
      </text>
    </svg>

}

// Badge Component
function Badge({ type }) {
  const styles = {
    'ROOKIE': 'bg-green-600 text-white',
    'ALL-STAR': 'bg-yellow-500 text-black',
    'DPOY': 'bg-red-600 text-white',
    'RETURNING': 'bg-blue-600 text-white',
    'NEW ACQUISITION': 'bg-orange-500 text-white'
  };
  if (!type) return null;
  return (
    <span className={`px-2 py-0.5 rounded-full text-xs font-bold ${styles[type] || 'bg-gray-600 text-white'}`}>
      {type === 'DPOY' ? '👑 DPOY' : type}
    </span>
  );
}

// Hot/Cold Streak
function StreakDots({ streak }) {
  const [hovIdx, setHovIdx] = useState(null);
  const colors = { hot: '#22c55e', cold: '#ef4444', avg: '#eab308' };
  return (
    <div className="flex gap-1.5 items-center relative">
      {streak.map((g, i) => (
        <div key={i} className="relative">
          <div
            className="w-4 h-4 rounded-full cursor-pointer transition-transform hover:scale-150"
            style={{ background: colors[g.result] }}
            onMouseEnter={() => setHovIdx(i)}
            onMouseLeave={() => setHovIdx(null)}
          />
          {hovIdx === i && (
            <div className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs whitespace-nowrap z-50 shadow-lg">
              <div className="font-bold">vs {g.opp}</div>
              <div>{g.pts} pts, {g.reb} reb{g.ast ? `, ${g.ast} ast` : ''}</div>
              <div className={g.win ? 'text-green-400' : 'text-red-400'}>{g.win ? 'W' : 'L'}</div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// Radar Chart for Players
function PlayerRadar({ data, size = 280 }) {
  const chartData = Object.entries(data).map(([key, val]) => ({ subject: key, value: val, fullMark: 100 }));
  return (
    <ResponsiveContainer width="100%" height={size}>
      <RadarChart data={chartData}>
        <PolarGrid stroke="rgba(var(--team-primary-rgb),0.5)" />
        <PolarAngleAxis dataKey="subject" tick={{ fill: '#ccc', fontSize: 11 }} />
        <PolarRadiusAxis domain={[0, 100]} tick={false} axisLine={false} />
        <Radar dataKey="value" stroke="var(--team-secondary)" fill="var(--team-secondary)" fillOpacity={0.3} strokeWidth={2} />
      </RadarChart>
    </ResponsiveContainer>
  );
}

// Scouting Panel (Slide-in)
function ScoutingPanel({ player, onClose }) {
  if (!player) return null;
  const zoneData = Object.entries(player.zones).map(([k, v]) => ({ zone: k, pct: v }));
  return (
    <div className="fixed inset-0 z-50 flex justify-end" onClick={onClose}>
      <div className="absolute inset-0 bg-black/60" />
      <div className="relative w-full max-w-lg bg-team-midnight border-l border-team-primary overflow-y-auto animate-slide-in"
           onClick={e => e.stopPropagation()}>
        <div className="sticky top-0 bg-team-midnight/95 backdrop-blur-sm border-b border-team-primary p-4 flex justify-between items-center z-10">
          <div>
            <h2 className="text-xl font-bold text-team-secondary">{player.name}</h2>
            <p className="text-sm text-gray-400">{player.pos} | #{player.number}</p>
          </div>
          <button onClick={onClose} className="text-gray-400 hover:text-white text-2xl">&times;</button>
        </div>
        <div className="p-4 space-y-6">
          {/* Stats Pills */}
          <div className="grid grid-cols-3 gap-2">
            {[['PPG', player.stats.ppg, player.lastYear?.ppg], ['RPG', player.stats.rpg, player.lastYear?.rpg], ['APG', player.stats.apg, player.lastYear?.apg],
              ['FG%', player.stats.fgPct, player.lastYear?.fgPct], ['3P%', player.stats.threePct, player.lastYear?.threePct], ['TS%', player.stats.tsPct, player.lastYear?.tsPct]].map(([label, val, prev]) => {
              const delta = prev != null && prev > 0 ? Math.round(((val - prev) / prev) * 100) : null;
              return (
                <div key={label} className="glass rounded-lg p-3 text-center">
                  <div className="text-lg font-bold text-team-secondary">{val}</div>
                  <div className="text-xs text-gray-400">{label}</div>
                  {delta !== null && (
                    <div className={`text-[10px] font-bold mt-0.5 ${delta > 0 ? 'text-green-400' : delta < 0 ? 'text-red-400' : 'text-gray-500'}`}>
                      {delta > 0 ? '\u2191' : delta < 0 ? '\u2193' : '\u2013'} {Math.abs(delta)}% YoY
                    </div>
                  )}
                  {delta === null && player.lastYear === null && (
                    <div className="text-[10px] text-gray-600 mt-0.5">ROOKIE</div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Radar Chart */}
          <div className="glass rounded-xl p-4">
            <h3 className="text-sm font-semibold text-team-secondary mb-2">Skill Breakdown</h3>
            <PlayerRadar data={player.radar} />
          </div>

          {/* Scoring Zones */}
          <div className="glass rounded-xl p-4">
            <h3 className="text-sm font-semibold text-team-secondary mb-3">Scoring Zones</h3>
            {zoneData.map(z => (
              <div key={z.zone} className="mb-2">
                <div className="flex justify-between text-xs text-gray-400 mb-1">
                  <span>{z.zone}</span><span>{z.pct}%</span>
                </div>
                <div className="h-2 bg-gray-800 rounded-full overflow-hidden">
                  <div className="h-full bg-team-secondary rounded-full transition-all duration-500" style={{ width: `${z.pct}%` }} />
                </div>
              </div>
            ))}
          </div>

          {/* Monthly PPG */}
          <div className="glass rounded-xl p-4">
            <h3 className="text-sm font-semibold text-team-secondary mb-2">Monthly PPG Trend</h3>
            <ResponsiveContainer width="100%" height={180}>
              <LineChart data={player.monthly.filter(m => m.ppg > 0)}>
                <CartesianGrid strokeDasharray="3 3" stroke="rgba(var(--team-primary-rgb),0.3)" />
                <XAxis dataKey="month" tick={{ fill: '#aaa', fontSize: 11 }} />
                <YAxis tick={{ fill: '#aaa', fontSize: 11 }} domain={['auto', 'auto']} />
                <Tooltip contentStyle={{ background: 'var(--team-midnight)', border: '1px solid var(--team-primary)', borderRadius: 8 }} />
                <Line type="monotone" dataKey="ppg" stroke="var(--team-secondary)" strokeWidth={2} dot={{ fill: 'var(--team-secondary)' }} />
              </LineChart>
            </ResponsiveContainer>
          </div>

          {/* Strengths & Weaknesses */}
          <div className="glass rounded-xl p-4 space-y-3">
            <h3 className="text-sm font-semibold text-team-secondary">Strengths</h3>
            {player.strengths.map((s, i) => (
              <div key={i} className="flex items-start gap-2 text-sm"><span className="text-green-400 mt-0.5">&#10003;</span><span className="text-gray-300">{s}</span></div>
            ))}
            <h3 className="text-sm font-semibold text-team-secondary mt-4">Weaknesses</h3>
            {player.weaknesses.map((w, i) => (
              <div key={i} className="flex items-start gap-2 text-sm"><span className="text-amber-400 mt-0.5">&#9888;</span><span className="text-gray-300">{w}</span></div>
            ))}
          </div>

          {/* Scout Report */}
          <div className="glass rounded-xl p-4">
            <h3 className="text-sm font-semibold text-team-secondary mb-2">Scout Report</h3>
            {player.scoutReport.split('\n\n').map((p, i) => (
              <p key={i} className="text-sm text-gray-300 leading-relaxed mb-3">{p}</p>
            ))}
          </div>

          {/* Ceiling */}
          <div className="glass rounded-xl p-4">
            <h3 className="text-sm font-semibold text-team-secondary mb-2">Development Ceiling</h3>
            <div className="flex justify-between text-xs text-gray-400 mb-1">
              <span>{player.ceiling.label}</span><span>{player.ceiling.pct}%</span>
            </div>
            <div className="h-3 bg-gray-800 rounded-full overflow-hidden">
              <div className="h-full rounded-full transition-all duration-700" style={{
                width: `${player.ceiling.pct}%`,
                background: player.ceiling.pct >= 80 ? 'linear-gradient(90deg, var(--team-secondary), color-mix(in srgb, var(--team-secondary), white 20%))' :
                  player.ceiling.pct >= 60 ? 'linear-gradient(90deg, var(--team-primary), var(--team-light))' : '#6b7280'
              }} />
            </div>
          </div>

          {/* Comps */}
          <div className="glass rounded-xl p-4">
            <h3 className="text-sm font-semibold text-team-secondary mb-2">NBA Comparisons</h3>
            <div className="flex gap-2">
              {player.comps.map((c, i) => (
                <span key={i} className="px-3 py-1 rounded-full text-sm font-medium bg-team-primary/50 text-team-secondary border border-team-primary">{c}</span>
              ))}
            </div>
          </div>

          {/* Hot/Cold Streak */}
          <div className="glass rounded-xl p-4">
            <h3 className="text-sm font-semibold text-team-secondary mb-3">Last 10 Games</h3>
            <StreakDots streak={player.streak} />
          </div>
        </div>
      </div>
    </div>
  );
}

// SECTION: ROSTER
// ============================================================
function RosterSection() {
  const { teamData } = useTeam();
  const players = teamData.players;
  const [selectedPlayer, setSelectedPlayer] = useState(null);
  const starters = players.filter(p => p.starter);
  const bench = players.filter(p => !p.starter);

  const pctChange = (curr, prev) => {
    if (!prev || prev === 0) return null;
    return Math.round(((curr - prev) / prev) * 100);
  };

  const StatWithDelta = ({ val, label, prev }) => {
    const delta = prev != null ? pctChange(val, prev) : null;
    return (
      <span className="inline-flex items-center gap-0.5">
        {val} {label}
        {delta !== null && (
          <span className={`text-[9px] font-bold ${delta > 0 ? 'text-green-400' : delta < 0 ? 'text-red-400' : 'text-gray-500'}`}>
            {delta > 0 ? '+' : ''}{delta}%
          </span>
        )}
      </span>
    );
  };

  const PlayerTile = ({ player, large }) => (
    <div
      onClick={() => setSelectedPlayer(player)}
      className={`glass rounded-xl cursor-pointer transition-all duration-300 hover:scale-105 hover:border-team-secondary/50 group overflow-hidden ${large ? '' : 'p-3'}`}
    >
      <div className="flex flex-col items-center text-center">
        {player.headshot ? (
          large ? (
            <div className="w-full h-48 overflow-hidden rounded-t-xl mb-3 relative" style={{ background: 'linear-gradient(180deg, var(--team-deep) 0%, var(--team-midnight) 100%)' }}>
              <img src={player.headshot} alt={player.name} loading="lazy"
                className="w-full h-full object-cover object-top transition-transform duration-300 group-hover:scale-110"
                style={{ objectPosition: 'top center' }} />
              <div className="absolute bottom-0 left-0 right-0 h-16" style={{ background: 'linear-gradient(transparent, rgba(var(--team-deep-rgb),0.95))' }} />
            </div>
          ) : (
            <div className="w-14 h-14 rounded-full overflow-hidden mt-2 border-2 border-team-primary/40" style={{ background: 'linear-gradient(180deg, var(--team-deep) 0%, var(--team-midnight) 100%)' }}>
              <img src={player.headshot} alt={player.name} loading="lazy"
                className="w-full h-full object-cover object-top" />
            </div>
          )
        ) : (
          <div className={large ? 'pt-5' : ''}>
            <JerseyAvatar number={player.number} size={large ? 80 : 56} />
          </div>
        )}
        <div className={large ? 'px-4 pb-4' : ''}>
          <h3 className={`font-bold ${large ? '' : 'mt-2'} group-hover:text-team-secondary transition-colors ${large ? 'text-lg' : 'text-sm'}`}>
            {player.name}
          </h3>
          <p className="text-xs text-gray-400">{player.pos} | #{player.number}</p>
          {player.badge && <div className="mt-1.5"><Badge type={player.badge} /></div>}
          <div className={`flex gap-3 mt-2 ${large ? 'text-sm' : 'text-xs'} text-gray-400`}>
            <StatWithDelta val={player.stats.ppg} label="PPG" prev={player.lastYear?.ppg} />
            <StatWithDelta val={player.stats.rpg} label="RPG" prev={player.lastYear?.rpg} />
            <StatWithDelta val={player.stats.apg} label="APG" prev={player.lastYear?.apg} />
          </div>
          <div className="mt-2"><StreakDots streak={player.streak} /></div>
        </div>
      </div>
    </div>
  );

  return (
    <section className="py-12 px-4 max-w-7xl mx-auto">
      <h2 className="text-3xl font-black text-center mb-2">
        <span className="text-team-secondary">STARTING</span> FIVE
      </h2>
      <p className="text-center text-gray-400 mb-8 text-sm">Click any player for full scouting report</p>
      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-10">
        {starters.map(p => <PlayerTile key={p.name} player={p} large />)}
      </div>
      <h2 className="text-2xl font-bold text-center mb-6">
        <span className="text-team-light">BENCH</span> ROTATION
      </h2>
      <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
        {bench.map(p => <PlayerTile key={p.name} player={p} />)}
      </div>
      <ScoutingPanel player={selectedPlayer} onClose={() => setSelectedPlayer(null)} />
    </section>
  );
}

                <h3 className="text-sm font-semibold text-team-secondary">Strengths</h3>

                <h3 className="text-sm font-semibold text-team-secondary mb-2">{config.name} Fit Analysis</h3>
                <div className="flex items-center gap-2 mb-3">
                  <span className={`text-2xl font-black ${selectedProspect.teamFit >= 8 ? 'text-green-400' : selectedProspect.teamFit >= 6 ? 'text-yellow-400' : 'text-red-400'}`}>
                    {selectedProspect.teamFit}/10

                  <span className="text-sm text-gray-400">{config.name} Fit Score</span>
                </div>
                <p className="text-sm text-gray-300 leading-relaxed">{selectedProspect.teamFitAnalysis}</p>
              </div>
              <div className="glass rounded-xl p-4">

                <div className="text-lg font-bold text-team-secondary">{selectedProspect.projected}</div>

      )}
      </>}
    </section>
  );
}

// US state boundaries as simplified SVG path data for an Albers projection
// We use a simple lat/lng → pixel projection for the US bounding box
const US_BOUNDS = { minLat: 24.5, maxLat: 49.5, minLng: -125, maxLng: -66.5 };
const WORLD_BOUNDS = { minLat: -60, maxLat: 72, minLng: -180, maxLng: 180 };

function projectPoint(lat, lng, bounds, width, height) {
  const x = ((lng - bounds.minLng) / (bounds.maxLng - bounds.minLng)) * width;
  const y = ((bounds.maxLat - lat) / (bounds.maxLat - bounds.minLat)) * height;
  return { x, y };
}

function isInUS(lat, lng) {
  return lat >= US_BOUNDS.minLat && lat <= US_BOUNDS.maxLat &&
         lng >= US_BOUNDS.minLng && lng <= US_BOUNDS.maxLng;
}

// Reverse geocode — show state only for US, country for international
async function reverseGeocode(lat, lng) {
  try {
    const resp = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=5`);
    const data = await resp.json();
    const state = data.address?.state || '';
    const country = data.address?.country_code?.toUpperCase() || '??';
    const label = country === 'US' && state ? state : (data.address?.country || 'Unknown');
    return { city: label, country };
  } catch {
    return { city: 'Unknown', country: '??' };
  }
}

const STORAGE_KEY = 'jazzketball_fanmap_visitors';

function loadVisitors() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function saveVisitors(visitors) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(visitors)); } catch {}
}

function FanMap() {
  const { config } = useTeam();
  const [visitors, setVisitors] = useState(() => loadVisitors());
  const [userLoc, setUserLoc] = useState(null);
  const [hovCity, setHovCity] = useState(null);
  const [geoStatus, setGeoStatus] = useState('pending');
  const [isNewVisit, setIsNewVisit] = useState(false);

  const hasIntl = visitors.some(v => !isInUS(v.lat, v.lng));
  const mapBounds = hasIntl ? WORLD_BOUNDS : US_BOUNDS;
  const mapWidth = 800;
  const mapHeight = hasIntl ? 500 : 500;

  useEffect(() => {
    if (!navigator.geolocation) { setGeoStatus('denied'); return; }
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const lat = Math.round(pos.coords.latitude * 10) / 10;
        const lng = Math.round(pos.coords.longitude * 10) / 10;
        setUserLoc({ lat, lng });
        setGeoStatus('granted');

        const geo = await reverseGeocode(pos.coords.latitude, pos.coords.longitude);

        setVisitors(prev => {
          const existing = prev.find(v => Math.abs(v.lat - lat) < 0.2 && Math.abs(v.lng - lng) < 0.2);
          let updated;
          if (existing) {
            updated = prev.map(v => v === existing ? { ...v, count: v.count + 1, lastVisit: new Date().toISOString() } : v);
          } else {
            setIsNewVisit(true);
            updated = [...prev, { lat, lng, city: geo.city, country: geo.country, count: 1, lastVisit: new Date().toISOString() }];
          }
          saveVisitors(updated);
          return updated;
        });
      },
      () => setGeoStatus('denied')
    );
  }, []);

  const totalVisits = visitors.reduce((s, v) => s + v.count, 0);
  const uniqueLocations = visitors.length;
  const top5 = [...visitors].sort((a, b) => b.count - a.count).slice(0, 5);
  const flags = { US: '🇺🇸', GB: '🇬🇧', JP: '🇯🇵', AU: '🇦🇺', FR: '🇫🇷', CA: '🇨🇦', MX: '🇲🇽', SG: '🇸🇬', DE: '🇩🇪', BR: '🇧🇷', '??': '🌍' };

  // Recognizable US continental outline (simplified but accurate shape)
  // Coordinates mapped to 800x500 SVG viewBox using US_BOUNDS projection
  const usOutline = useMemo(() => {
    // Key coastal/border points of the continental US, projected
    const pts = [
      // Pacific NW
      [-124.7, 48.4], [-124.2, 46.3], [-123.9, 46.2], [-124.1, 43.5], [-124.4, 42.0],
      // California coast
      [-124.2, 40.4], [-123.8, 39.4], [-122.4, 37.8], [-121.9, 36.6], [-120.6, 35.1],
      [-118.6, 34.0], [-117.3, 32.7],
      // Mexican border
      [-114.7, 32.7], [-111.1, 31.3], [-108.2, 31.8], [-106.6, 31.8], [-104.0, 30.0],
      [-103.0, 29.0], [-101.4, 29.8], [-100.0, 28.2], [-97.2, 25.9], [-97.1, 26.4],
      // Gulf coast
      [-97.0, 28.0], [-96.5, 28.8], [-95.0, 29.7], [-94.5, 29.4], [-93.8, 29.7],
      [-91.8, 29.5], [-89.6, 29.0], [-89.0, 29.0], [-88.8, 30.2], [-87.6, 30.3],
      [-86.5, 30.4], [-85.0, 29.9], [-84.0, 30.0], [-83.0, 29.0], [-82.0, 27.5],
      [-81.0, 25.5], [-80.0, 25.2],
      // Florida east coast up
      [-80.1, 26.5], [-80.4, 28.5], [-81.1, 30.7], [-81.4, 31.5],
      // Atlantic coast north
      [-79.5, 33.0], [-77.9, 34.3], [-75.5, 35.5], [-75.5, 37.0], [-76.0, 37.3],
      [-76.3, 38.0], [-75.1, 38.8], [-74.7, 39.3], [-74.0, 40.5], [-73.7, 40.6],
      [-72.0, 41.0], [-71.0, 41.5], [-70.0, 41.7], [-69.9, 42.0], [-70.6, 42.7],
      [-71.0, 42.8], [-70.8, 43.1], [-67.0, 44.5], [-67.0, 47.2],
      // Canadian border
      [-69.0, 47.4], [-71.0, 45.0], [-74.7, 45.0], [-76.8, 43.6], [-79.0, 43.3],
      [-82.4, 41.7], [-83.5, 42.0], [-84.4, 46.5], [-85.0, 46.8], [-88.0, 46.0],
      [-89.6, 48.0], [-95.2, 49.0], [-123.3, 49.0], [-124.7, 48.4]
    ];
    return pts.map(([lng, lat]) => {
      const p = projectPoint(lat, lng, US_BOUNDS, mapWidth, mapHeight);
      return `${p.x},${p.y}`;
    }).join(' ');
  }, [mapWidth, mapHeight]);

  // SLC reference point
  const slcPt = projectPoint(40.76, -111.89, hasIntl ? WORLD_BOUNDS : US_BOUNDS, mapWidth, mapHeight);

  return (
    <section className="py-12 px-4 max-w-7xl mx-auto">
      <h2 className="text-3xl font-black text-center mb-2">
        <span className="text-team-secondary">{config.name.toUpperCase()}</span> NATION
      </h2>
      <p className="text-center text-gray-400 mb-6">
        {visitors.length === 0 ? 'Be the first fan on the map — allow location access below' :
          `${uniqueLocations} location${uniqueLocations !== 1 ? 's' : ''} \u2022 ${totalVisits} total visit${totalVisits !== 1 ? 's' : ''}`}
      </p>

      <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
        {/* Map */}
        <div className="lg:col-span-3 glass rounded-2xl p-4 relative" style={{ minHeight: 420 }}>
          <svg viewBox={`0 0 ${mapWidth} ${mapHeight}`} className="w-full" style={{ background: '#05000A', borderRadius: 12 }}>
            {!hasIntl ? (
              <>
                {/* US continental outline */}
                <polygon points={usOutline} fill="rgba(var(--team-primary-rgb),0.12)" stroke="rgba(var(--team-primary-rgb),0.5)" strokeWidth="1.5" strokeLinejoin="round" />
                {/* State boundary lines */}
                {[
                  // Major vertical state lines (west to east longitude boundaries)
                  [[-104.05, 49], [-104.05, 37]], // MT/ND → CO/KS border
                  [[-104.05, 37], [-104.05, 32]], // CO/KS → NM/TX
                  [[-109.05, 49], [-109.05, 37]], // MT/WY/CO/UT border
                  [[-109.05, 37], [-109.05, 31.3]], // AZ/NM
                  [[-114.04, 42], [-114.04, 35]], // NV/UT/AZ
                  [[-120, 42], [-120, 39]], // OR/CA border segment
                  [[-100, 49], [-100, 37]], // ND/SD/NE/KS
                  [[-100, 37], [-100, 34]], // KS/OK
                  [[-97, 49], [-97, 37]], // MN/IA/MO border area
                  [[-95.3, 49], [-95.3, 43]], // MN west
                  [[-90, 49], [-90, 43]], // WI/MN
                  [[-87.5, 42], [-87.5, 37]], // IL/IN
                  [[-84.8, 42], [-84.8, 39]], // OH/IN
                  [[-81, 42], [-81, 39]], // PA/OH
                  // Major horizontal state lines (latitude boundaries)
                  [[-124, 42], [-117, 42]], // OR/CA
                  [[-117, 42], [-111, 42]], // NV/ID, UT/ID
                  [[-111, 42], [-104, 42]], // WY south
                  [[-111, 37], [-109, 37]], // UT/AZ
                  [[-109, 37], [-102, 37]], // CO/NM, CO/OK
                  [[-102, 37], [-95, 37]], // KS/OK
                  [[-104, 46], [-97, 46]], // SD/ND
                  [[-104, 43], [-97, 43]], // SD/NE
                  [[-97, 40], [-90, 40]], // KS-NE/MO-IA
                  [[-90, 45], [-83, 45]], // WI/MI
                  [[-90, 42.5], [-82, 42.5]], // IL/WI, approximate
                  [[-80, 42], [-75, 42]], // PA/NY
                  [[-81, 36.5], [-75.5, 36.5]], // NC/VA approx
                  [[-88, 35], [-81, 35]], // TN/GA/NC
                  [[-91, 33], [-88, 33]], // LA/MS/AL
                ].map(([[lng1, lat1], [lng2, lat2]], i) => {
                  const p1 = projectPoint(lat1, lng1, US_BOUNDS, mapWidth, mapHeight);
                  const p2 = projectPoint(lat2, lng2, US_BOUNDS, mapWidth, mapHeight);
                  return <line key={`sb${i}`} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="rgba(var(--team-primary-rgb),0.25)" strokeWidth="0.5" />;
                })}
                {/* SLC home marker */}
                <circle cx={slcPt.x} cy={slcPt.y} r="4" fill="none" stroke="rgba(var(--team-secondary-rgb),0.3)" strokeWidth="1" strokeDasharray="3 2" />
                <text x={slcPt.x} y={slcPt.y - 8} textAnchor="middle" fill="rgba(var(--team-secondary-rgb),0.35)" fontSize="9" fontWeight="600" fontFamily="Inter">SLC</text>
              </>
            ) : (
              <>
                {/* Simplified world continents */}
                <polygon points={usOutline} fill="rgba(var(--team-primary-rgb),0.12)" stroke="rgba(var(--team-primary-rgb),0.3)" strokeWidth="0.8" />
                <ellipse cx="420" cy="160" rx="90" ry="100" fill="rgba(var(--team-primary-rgb),0.1)" stroke="rgba(var(--team-primary-rgb),0.25)" strokeWidth="0.5" />
                <ellipse cx="430" cy="75" rx="120" ry="55" fill="rgba(var(--team-primary-rgb),0.1)" stroke="rgba(var(--team-primary-rgb),0.25)" strokeWidth="0.5" />
                <ellipse cx="600" cy="180" rx="80" ry="80" fill="rgba(var(--team-primary-rgb),0.1)" stroke="rgba(var(--team-primary-rgb),0.25)" strokeWidth="0.5" />
                <ellipse cx="700" cy="330" rx="50" ry="40" fill="rgba(var(--team-primary-rgb),0.1)" stroke="rgba(var(--team-primary-rgb),0.25)" strokeWidth="0.5" />
              </>
            )}

            {/* Visitor dots */}
            {visitors.map((v, i) => {
              const { x, y } = projectPoint(v.lat, v.lng, mapBounds, mapWidth, mapHeight);
              if (x < 0 || x > mapWidth || y < 0 || y > mapHeight) return null;
              const r = Math.min(4 + Math.log2(v.count + 1) * 3, 16);
              const isUser = userLoc && Math.abs(v.lat - userLoc.lat) < 0.2 && Math.abs(v.lng - userLoc.lng) < 0.2;
              return (
                <g key={i} onMouseEnter={() => setHovCity(v)} onMouseLeave={() => setHovCity(null)} className="cursor-pointer">
                  {/* Outer glow */}
                  <circle cx={x} cy={y} r={r * 2.5} fill="rgba(var(--team-secondary-rgb),0.08)" />
                  <circle cx={x} cy={y} r={r * 1.5} fill="rgba(var(--team-secondary-rgb),0.15)" className={isUser && isNewVisit ? 'pulse-dot' : ''} />
                  {/* Core dot */}
                  <circle cx={x} cy={y} r={r} fill="var(--team-secondary)" opacity={0.7 + Math.min(v.count / 20, 0.3)} />
                  {/* "You" label for user's dot */}
                  {isUser && (
                    <text x={x} y={y - r - 6} textAnchor="middle" fill="var(--team-secondary)" fontSize="10" fontWeight="700" fontFamily="Inter">YOU</text>
                  )}
                </g>
              );
            })}
          </svg>

          {hovCity && (
            <div className="absolute top-4 left-4 glass rounded-lg px-4 py-3 text-sm z-10">
              <div className="font-bold text-team-secondary">{flags[hovCity.country] || '🌍'} {hovCity.country === 'US' && hovCity.city.includes(', ') ? hovCity.city.split(', ').pop() : hovCity.city}</div>
              <div className="text-gray-400">{hovCity.count} visit{hovCity.count !== 1 ? 's' : ''} &bull; Last: {new Date(hovCity.lastVisit).toLocaleDateString()}</div>
            </div>
          )}

          {geoStatus === 'pending' && visitors.length === 0 && (
            <div className="absolute inset-0 flex items-center justify-center">
              <div className="glass rounded-xl px-6 py-4 text-center">
                <div className="text-team-secondary font-semibold mb-1">Allow location access</div>
                <div className="text-sm text-gray-400">to put yourself on the {config.name} Nation map</div>
              </div>
            </div>
          )}

          {geoStatus === 'denied' && visitors.length === 0 && (
            <div className="absolute inset-0 flex items-center justify-center">
              <div className="glass rounded-xl px-6 py-4 text-center">
                <div className="text-gray-400 text-sm">We know you're out there, {config.name} fan</div>
                <div className="text-gray-500 text-xs mt-1">Enable location to join {config.name} Nation</div>
              </div>
            </div>
          )}

          {/* Map mode indicator */}
          <div className="absolute bottom-3 right-3 glass rounded-full px-3 py-1 text-[10px] text-gray-500">
            {hasIntl ? 'WORLD VIEW' : 'UNITED STATES'}
          </div>
        </div>

        {/* Leaderboard */}
        <div className="glass rounded-2xl p-4">
          <h3 className="text-sm font-bold text-team-secondary mb-4">TOP LOCATIONS</h3>
          {top5.length === 0 ? (
            <div className="text-center text-gray-500 text-sm py-8">No visitors yet. Be the first!</div>
          ) : top5.map((v, i) => (
            <div key={i} className="flex items-center gap-3 mb-3 pb-3 border-b border-team-primary/30 last:border-0">
              <span className="text-lg font-black text-team-secondary w-6">#{i + 1}</span>
              <span className="text-lg">{flags[v.country] || '🌍'}</span>
              <div className="flex-1 min-w-0">
                <div className="font-semibold text-sm truncate">{v.country === 'US' && v.city.includes(', ') ? v.city.split(', ').pop() : v.city}</div>
                <div className="text-xs text-gray-400">{v.count} visit{v.count !== 1 ? 's' : ''}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

const POLL_STORAGE_KEY = 'jazzketball_poll_data';
const POLL_ANSWERED_KEY = 'jazzketball_poll_answered';
const POLL_ORDER_KEY = 'jazzketball_poll_order';

function loadPollData() {
  try { return JSON.parse(localStorage.getItem(POLL_STORAGE_KEY)) || {}; } catch { return {}; }
}
function savePollData(data) {
  try { localStorage.setItem(POLL_STORAGE_KEY, JSON.stringify(data)); } catch {}
}
function loadAnswered() {
  try { return JSON.parse(localStorage.getItem(POLL_ANSWERED_KEY)) || {}; } catch { return {}; }
}
function saveAnswered(data) {
  try { localStorage.setItem(POLL_ANSWERED_KEY, JSON.stringify(data)); } catch {}
}
function getShuffledOrder(questions) {
  try {
    const saved = JSON.parse(localStorage.getItem(POLL_ORDER_KEY));
    if (saved && saved.length === questions.length) return saved;
  } catch {}
  const order = questions.map((_, i) => i);
  for (let i = order.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [order[i], order[j]] = [order[j], order[i]]; }
  try { localStorage.setItem(POLL_ORDER_KEY, JSON.stringify(order)); } catch {}
  return order;
}

const POLL_COLORS = ['var(--team-secondary)', 'var(--team-primary)', 'var(--team-light)', 'color-mix(in srgb, var(--team-secondary), white 20%)', '#8B5CF6', '#EC4899', '#10B981', '#F59E0B'];

function FanPoll() {
  const { config, teamData } = useTeam();
  const pollQuestions = teamData.pollQuestions;
  const [pollData, setPollData] = useState(() => loadPollData());
  const [answered, setAnswered] = useState(() => loadAnswered());
  const [order] = useState(() => getShuffledOrder(pollQuestions));
  const [showDashboard, setShowDashboard] = useState(false);

  // Find first unanswered question in this user's shuffled order
  const currentIdx = order.findIndex(i => pollQuestions[i] && answered[pollQuestions[i].id] === undefined);
  const currentQ = currentIdx >= 0 ? pollQuestions[order[currentIdx]] : null;
  const answeredCount = Object.keys(answered).length;
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [selectedQId, setSelectedQId] = useState(null);

  const vote = (qId, optIdx) => {
    if (answered[qId] !== undefined) return;
    setSelectedAnswer(optIdx);
    setSelectedQId(qId);

    const key = `q${qId}`;
    const newData = { ...pollData };
    if (!newData[key]) newData[key] = {};
    newData[key][optIdx] = (newData[key][optIdx] || 0) + 1;
    setPollData(newData);
    savePollData(newData);

    const newAnswered = { ...answered, [qId]: optIdx };
    setAnswered(newAnswered);
    saveAnswered(newAnswered);
  };

  const goNext = () => {
    setSelectedAnswer(null);
    setSelectedQId(null);
  };

  const getQData = (qId) => {
    const key = `q${qId}`;
    return pollData[key] || {};
  };

  const getTotalVotes = (qId) => {
    const d = getQData(qId);
    return Object.values(d).reduce((s, v) => s + v, 0);
  };

  // Category stats for dashboard
  const cats = ['Draft', 'Roster', 'Team', 'Trade', 'Culture'];
  const catCounts = {};
  cats.forEach(c => { catCounts[c] = pollQuestions.filter(q => q.cat === c && answered[q.id] !== undefined).length; });
  const catTotals = {};
  cats.forEach(c => { catTotals[c] = pollQuestions.filter(q => q.cat === c).length; });

  // Most voted questions
  const mostVoted = pollQuestions
    .map(q => ({ ...q, total: getTotalVotes(q.id) }))
    .filter(q => q.total > 0)
    .sort((a, b) => b.total - a.total)
    .slice(0, 5);

  return (
    <section className="py-12 px-4 max-w-5xl mx-auto">
      <h2 className="text-3xl font-black text-center mb-2">
        <span className="text-team-secondary">FAN</span> POLL
      </h2>

      {/* Progress bar */}
      <div className="max-w-md mx-auto mb-2">
        <div className="flex justify-between text-xs text-gray-400 mb-1">
          <span>{answeredCount} of {pollQuestions.length} answered</span>
          <span>{Math.round((answeredCount / pollQuestions.length) * 100)}%</span>
        </div>
        <div className="h-2 bg-gray-800 rounded-full overflow-hidden">
          <div className="h-full bg-team-secondary rounded-full transition-all duration-500" style={{ width: `${(answeredCount / pollQuestions.length) * 100}%` }} />
        </div>
      </div>

      {/* Toggle */}
      <div className="flex justify-center gap-3 mb-8">
        <button onClick={() => setShowDashboard(false)}
          className={`px-4 py-2 rounded-full text-sm font-semibold transition-all ${!showDashboard ? 'bg-team-secondary text-black' : 'glass text-gray-400 hover:text-white'}`}>
          Vote
        </button>
        <button onClick={() => setShowDashboard(true)}
          className={`px-4 py-2 rounded-full text-sm font-semibold transition-all ${showDashboard ? 'bg-team-secondary text-black' : 'glass text-gray-400 hover:text-white'}`}>
          Dashboard
        </button>
      </div>

      {!showDashboard ? (
        /* VOTING VIEW */
        currentQ ? (
          <div className="max-w-2xl mx-auto">
            <div className="glass rounded-2xl p-6 animate-fade-in" key={currentQ.id}>
              <div className="flex items-center justify-between mb-4">
                <span className="px-3 py-1 rounded-full text-xs font-bold border border-team-primary text-team-light">{currentQ.cat}</span>
                <span className="text-xs text-gray-500">Q{answeredCount + 1}</span>
              </div>
              <h3 className="text-xl font-bold text-center mb-6">{currentQ.q}</h3>
              <div className="space-y-3">
                {currentQ.opts.map((opt, i) => {
                  const data = getQData(currentQ.id);
                  const total = Object.values(data).reduce((s, v) => s + v, 0);
                  const votes = data[i] || 0;
                  const pct = total > 0 ? Math.round((votes / total) * 100) : 0;
                  const isSelected = selectedAnswer === i && selectedQId === currentQ.id;
                  const hasVoted = answered[currentQ.id] !== undefined;
                  return (
                    <button key={i} onClick={() => vote(currentQ.id, i)}
                      disabled={hasVoted}
                      className={`w-full text-left rounded-xl p-4 transition-all duration-300 relative overflow-hidden
                        ${isSelected ? 'border-2 border-team-secondary bg-team-secondary/10' : hasVoted ? 'glass opacity-80' : 'glass hover:border-team-secondary/30 cursor-pointer'}`}>
                      {hasVoted && (
                        <div className="absolute inset-0 rounded-xl overflow-hidden">
                          <div className="h-full bg-team-primary/20 transition-all duration-700" style={{ width: `${pct}%` }} />
                        </div>
                      )}
                      <div className="relative flex justify-between items-center">
                        <span className={`font-semibold ${isSelected ? 'text-team-secondary' : ''}`}>{opt}</span>
                        {hasVoted && <span className="text-team-secondary font-bold text-lg">{pct}%</span>}
                      </div>
                      {hasVoted && <div className="relative text-xs text-gray-500 mt-1">{votes} vote{votes !== 1 ? 's' : ''}</div>}
                    </button>
                  );
                })}
              </div>
              {answered[currentQ.id] !== undefined && (
                <div className="mt-6 text-center animate-fade-in">
                  <button onClick={goNext}
                    className="px-8 py-3 rounded-xl bg-team-secondary text-black font-bold text-lg hover:bg-yellow-400 transition-all">
                    Next Question &rarr;
                  </button>
                </div>
              )}
              <p className="text-center text-xs text-gray-500 mt-4">{getTotalVotes(currentQ.id) > 0 ? `${getTotalVotes(currentQ.id)} total votes` : 'Be the first to vote!'}</p>
            </div>
          </div>
        ) : (
          <div className="text-center glass rounded-2xl p-8 max-w-md mx-auto">
            <div className="text-4xl mb-3">🏆</div>
            <h3 className="text-xl font-bold text-team-secondary mb-2">All Done!</h3>
            <p className="text-gray-400">You've answered all 50 questions. Check the Dashboard for results!</p>
            <button onClick={() => setShowDashboard(true)} className="mt-4 px-6 py-2 rounded-xl bg-team-secondary text-black font-bold hover:bg-yellow-400 transition-all">
              View Dashboard
            </button>
          </div>
        )
      ) : (
        /* DASHBOARD VIEW — community results analysis */
        <div className="space-y-8 animate-fade-in">
          {/* Overview stats */}
          <div className="grid grid-cols-3 gap-4">
            <div className="glass rounded-xl p-4 text-center">
              <div className="text-3xl font-black text-team-secondary">
                {pollQuestions.reduce((s, q) => s + getTotalVotes(q.id), 0)}
              </div>
              <div className="text-xs text-gray-400">Total Community Votes</div>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <div className="text-3xl font-black text-team-secondary">
                {pollQuestions.filter(q => getTotalVotes(q.id) > 0).length}
              </div>
              <div className="text-xs text-gray-400">Questions With Votes</div>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <div className="text-3xl font-black text-team-secondary">{answeredCount}/50</div>
              <div className="text-xs text-gray-400">Your Progress</div>
            </div>
          </div>

          {/* Community consensus — top winning answers by category */}
          {cats.map(cat => {
            const catQs = pollQuestions.filter(q => q.cat === cat && getTotalVotes(q.id) > 0);
            if (catQs.length === 0) return null;
            return (
              <div key={cat} className="glass rounded-2xl p-6">
                <h3 className="text-lg font-bold text-team-secondary mb-1">{cat}</h3>
                <p className="text-xs text-gray-500 mb-4">{catQs.length} question{catQs.length !== 1 ? 's' : ''} voted on</p>
                <div className="space-y-4">
                  {catQs.map(q => {
                    const data = getQData(q.id);
                    const total = getTotalVotes(q.id);
                    const sorted = q.opts.map((opt, i) => ({ opt, votes: data[i] || 0, i })).sort((a, b) => b.votes - a.votes);
                    const winner = sorted[0];
                    const winPct = total > 0 ? Math.round((winner.votes / total) * 100) : 0;
                    return (
                      <div key={q.id} className="glass rounded-xl p-4">
                        <div className="flex items-start justify-between mb-3">
                          <h4 className="font-semibold text-sm flex-1 text-gray-200">{q.q}</h4>
                          <span className="text-xs text-gray-500 ml-2 whitespace-nowrap">{total} votes</span>
                        </div>
                        {/* Winner highlight */}
                        <div className="flex items-center gap-2 mb-3">
                          <span className="text-team-secondary font-bold">{winner.opt}</span>
                          <span className="text-team-secondary font-black text-lg">{winPct}%</span>
                          {winPct >= 60 && <span className="text-xs px-2 py-0.5 rounded-full bg-team-secondary/20 text-team-secondary">Strong consensus</span>}
                          {winPct >= 40 && winPct < 60 && <span className="text-xs px-2 py-0.5 rounded-full bg-team-primary/30 text-team-light">Split vote</span>}
                        </div>
                        {/* All options as bars */}
                        <div className="space-y-1.5">
                          {sorted.map((s, si) => {
                            const pct = total > 0 ? Math.round((s.votes / total) * 100) : 0;
                            return (
                              <div key={si} className="flex items-center gap-2">
                                <div className="text-xs text-gray-400 w-28 truncate">{s.opt}</div>
                                <div className="flex-1 h-2 bg-gray-800 rounded-full overflow-hidden">
                                  <div className="h-full rounded-full transition-all duration-500" style={{
                                    width: `${pct}%`,
                                    background: si === 0 ? 'var(--team-secondary)' : si === 1 ? 'var(--team-primary)' : 'var(--team-light)'
                                  }} />
                                </div>
                                <span className="text-xs text-gray-500 w-10 text-right">{pct}%</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}

          {/* Votes by category chart */}
          {(() => {
            const chartData = cats.map(c => ({
              name: c,
              votes: pollQuestions.filter(q => q.cat === c).reduce((s, q) => s + getTotalVotes(q.id), 0)
            })).filter(d => d.votes > 0);
            return chartData.length > 0 && (
              <div className="glass rounded-2xl p-6">
                <h3 className="text-lg font-bold text-team-secondary mb-4">Votes by Category</h3>
                <div style={{ height: 250 }}>
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart data={chartData}>
                      <CartesianGrid strokeDasharray="3 3" stroke="rgba(var(--team-primary-rgb),0.2)" />
                      <XAxis dataKey="name" tick={{ fill: '#aaa', fontSize: 11 }} />
                      <YAxis tick={{ fill: '#aaa', fontSize: 11 }} />
                      <Tooltip contentStyle={{ background: 'var(--team-midnight)', border: '1px solid var(--team-primary)', borderRadius: 8 }} />
                      <Bar dataKey="votes" fill="var(--team-secondary)" radius={[4, 4, 0, 0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>
            );
          })()}

          <div className="text-center">
            <button onClick={() => setShowDashboard(false)} className="px-6 py-2 rounded-xl glass text-team-secondary hover:bg-team-secondary/20 font-semibold">
              {answeredCount < pollQuestions.length ? 'Keep Voting' : 'Review Questions'}
            </button>
          </div>
        </div>
      )}
    </section>
  );
}

function LineupBuilder() {
  const { teamData } = useTeam();
  const players = teamData.players;
  const positions = ['PG', 'SG', 'SF', 'PF', 'C'];
  const [lineup, setLineup] = useState({ PG: null, SG: null, SF: null, PF: null, C: null });
  const [report, setReport] = useState(null);

  const assignPlayer = (player) => {
    const posOptions = player.pos.split('/');
    for (const pos of posOptions) {
      if (lineup[pos] === null) {
        setLineup(prev => ({ ...prev, [pos]: player }));
        return;
      }
    }
    // Try any empty slot
    for (const pos of positions) {
      if (!lineup[pos]) {
        setLineup(prev => ({ ...prev, [pos]: player }));
        return;
      }
    }
  };

  const filledCount = Object.values(lineup).filter(Boolean).length;
  const usedNames = new Set(Object.values(lineup).filter(Boolean).map(p => p.name));

  useEffect(() => {
    if (filledCount === 5) {
      const players = Object.values(lineup).filter(Boolean);
      const totalPPG = players.reduce((s, p) => s + p.stats.ppg, 0).toFixed(1);
      const totalRPG = players.reduce((s, p) => s + p.stats.rpg, 0).toFixed(1);
      const avgShot = players.reduce((s, p) => s + p.radar.Shooting, 0) / 5;
      const avgPlay = players.reduce((s, p) => s + p.radar.Playmaking, 0) / 5;
      const avgDef = players.reduce((s, p) => s + p.radar.Defense, 0) / 5;
      const avgScor = players.reduce((s, p) => s + p.radar.Scoring, 0) / 5;
      const starterCount = players.filter(p => p.starter).length;

      let identity = 'Balanced';
      let chemistry = 5 + starterCount;
      const strengths = [];

      if (avgShot > 65) { identity = 'Stretch Offense'; chemistry += 1; strengths.push('Elite floor spacing — multiple shooters warp defensive schemes'); }
      if (avgPlay > 70) { identity = 'Guard-Driven'; strengths.push('Playmaking-heavy lineup creates open shots and easy buckets'); }
      if (avgDef > 70) { strengths.push('Top-tier defensive unit — opponents score at a below-average rate'); chemistry += 1; }
      if (avgScor > 75) { strengths.push('Scoring firepower from multiple positions'); }
      if (starterCount >= 4) { chemistry += 1; strengths.push('Core lineup — maximum chemistry and continuity'); }
      if (strengths.length === 0) strengths.push('Versatile lineup with multiple scoring options');

      chemistry = Math.min(chemistry, 10);

      setReport({
        ppg: totalPPG, rpg: totalRPG, chemistry, identity,
        defRating: (105 - avgDef * 0.15).toFixed(1), strengths
      });
    } else {
      setReport(null);
    }
  }, [lineup, filledCount]);

  return (
    <section className="py-12 px-4 max-w-5xl mx-auto">
      <h2 className="text-3xl font-black text-center mb-2">
        <span className="text-team-secondary">LINEUP</span> BUILDER
      </h2>
      <p className="text-center text-gray-400 mb-6">Build your dream Jazz lineup</p>

      {/* Position Slots */}
      <div className="flex justify-center gap-3 mb-8 flex-wrap">
        {positions.map(pos => (
          <div key={pos} className={`glass rounded-xl p-4 w-32 text-center transition-all ${lineup[pos] ? 'border-team-secondary/50' : 'border-dashed border-2 border-team-primary/50'}`}>
            <div className="text-xs text-team-secondary font-bold mb-2">{pos}</div>
            {lineup[pos] ? (
              <div>
                <JerseyAvatar number={lineup[pos].number} size={48} />
                <div className="text-xs font-semibold mt-1 truncate">{lineup[pos].name.split(' ').pop()}</div>
              </div>
            ) : (
              <div className="text-3xl text-gray-600">+</div>
            )}
          </div>
        ))}
      </div>

      {/* Available Players */}
      <div className="flex flex-wrap gap-2 justify-center mb-6">
        {players.map(p => (
          <button key={p.name} onClick={() => assignPlayer(p)}
            disabled={usedNames.has(p.name)}
            className={`px-3 py-1.5 rounded-full text-xs font-semibold transition-all ${usedNames.has(p.name) ? 'bg-gray-800 text-gray-600 cursor-not-allowed' : 'glass text-white hover:bg-team-secondary/20 hover:text-team-secondary'}`}>
            #{p.number} {p.name.split(' ').pop()}
          </button>
        ))}
      </div>

      <div className="flex justify-center gap-3">
        <button onClick={() => setLineup({ PG: null, SG: null, SF: null, PF: null, C: null })}
          className="px-4 py-2 rounded-full glass text-gray-400 hover:text-white text-sm">Reset</button>
      </div>

      {/* Report */}
      {report && (
        <div className="mt-8 glass rounded-2xl p-6 animate-fade-in">
          <h3 className="text-lg font-bold text-team-secondary text-center mb-4">Lineup Report</h3>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
            <div className="text-center">
              <div className="text-2xl font-black text-team-secondary">{report.ppg}</div>
              <div className="text-xs text-gray-400">Projected PPG</div>
            </div>
            <div className="text-center">
              <div className="text-2xl font-black text-team-secondary">{report.rpg}</div>
              <div className="text-xs text-gray-400">Projected RPG</div>
            </div>
            <div className="text-center">
              <div className="text-2xl font-black text-team-secondary">{report.chemistry}/10</div>
              <div className="text-xs text-gray-400">Chemistry</div>
            </div>
            <div className="text-center">

function TradeMachine() {
  const { config, teamData } = useTeam();
  const players = teamData.players;
  const [teamOut, setTeamOut] = useState([]);
  const [incoming, setIncoming] = useState('');
  const [analysis, setAnalysis] = useState(null);
  const [loading, setLoading] = useState(false);
  const [apiKey, setApiKey] = useState('');

  const toggleTeamPlayer = (name) => {
    setTeamOut(prev => prev.includes(name) ? prev.filter(n => n !== name) : prev.length < 2 ? [...prev, name] : prev);
  };

  const coreStr = players.filter(p => p.starter).map(p => `${p.name} (${p.pos})`).join(', ');

  const analyzeTrade = async () => {
    if (!teamOut.length || !incoming.trim()) return;
    const key = apiKey || prompt('Enter your Anthropic API key:');
    if (!key) return;
    if (!apiKey) setApiKey(key);
    setLoading(true);
    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514', max_tokens: 1000,
          system: `You are an NBA trade analyst. Evaluate trades for the ${config.fullName}. Current core: ${coreStr}. Head coach: ${config.coach}. GM: ${config.gm}. Be specific and analytical. Format: Start with a letter grade (A+ to F), then 3 bullet points for the trade, then 3 bullet points against. End with a ${config.gm} Approval rating (1-10).`,
          messages: [{ role: 'user', content: `${config.name} trade away: ${teamOut.join(', ')}. ${config.name} receive: ${incoming}. Analyze this trade.` }]
        })
      });
      const data = await resp.json();
      setAnalysis(data.content?.[0]?.text || 'Could not analyze trade.');
    } catch (e) {
      setAnalysis('Trade analysis requires an Anthropic API key. Enter a valid key to unlock AI-powered analysis.');
    }
    setLoading(false);
  };

  return (
    <section className="py-12 px-4 max-w-4xl mx-auto">
      <h2 className="text-3xl font-black text-center mb-2">
        <span className="text-team-secondary">TRADE</span> MACHINE
      </h2>
      <p className="text-center text-gray-400 mb-6">What if? Simulate trades with AI analysis</p>

      <div className="glass rounded-2xl p-6">
        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
          {/* Team sends */}
          <div>
            <h3 className="text-sm font-bold text-red-400 mb-3">{config.name.toUpperCase()} SEND (select 1-2)</h3>
            <div className="space-y-2">
              {players.map(p => (
                <button key={p.name} onClick={() => toggleTeamPlayer(p.name)}
                  className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-all ${teamOut.includes(p.name) ? 'bg-red-600/20 border border-red-500/50 text-red-300' : 'glass text-gray-300 hover:text-white'}`}>
                  #{p.number} {p.name} <span className="text-gray-500">({p.pos})</span>
                </button>
              ))}
            </div>
          </div>
          {/* Team receives */}
          <div>
            <h3 className="text-sm font-bold text-green-400 mb-3">{config.name.toUpperCase()} RECEIVE</h3>
            <textarea value={incoming} onChange={e => setIncoming(e.target.value)}
              placeholder="Type player names (e.g., 'Zach LaVine, 2027 1st round pick')"
              className="w-full h-32 bg-gray-900/50 border border-team-primary rounded-xl p-3 text-sm text-white placeholder-gray-500 resize-none focus:outline-none focus:border-team-secondary" />
            <button onClick={analyzeTrade} disabled={loading || !teamOut.length || !incoming.trim()}
              className="mt-3 w-full py-3 rounded-xl font-bold text-sm transition-all bg-team-secondary text-black hover:bg-yellow-400 disabled:opacity-40 disabled:cursor-not-allowed">
              {loading ? 'Analyzing...' : '🔄 Analyze Trade'}
            </button>
          </div>
        </div>

        {analysis && (
          <div className="mt-6 glass rounded-xl p-4 animate-fade-in">
            <h3 className="text-sm font-bold text-team-secondary mb-3">AI TRADE ANALYSIS</h3>
            <div className="text-sm text-gray-300 leading-relaxed space-y-2"
              dangerouslySetInnerHTML={{ __html: (() => {
                // Sanitize: escape HTML entities first, then apply safe formatting
                const escaped = analysis
                  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                  .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
                return escaped
                  .replace(/\*\*(.*?)\*\*/g, '<strong class="text-team-secondary font-semibold">$1</strong>')
                  .replace(/\n\n/g, '</p><p class="mt-2">')
                  .replace(/\n- /g, '<br/>\u2022 ')
                  .replace(/\n/g, '<br/>');
              })() }} />
          </div>
        )}
      </div>
    </section>
  );
}

// ============================================================
function DraftSimulator() {
  const { config, teamData } = useTeam();
  const prospects = teamData.prospects;
  const lotteryTeams = teamData.lotteryTeams;
  const [simState, setSimState] = useState('idle');
  const [lotteryOrder, setLotteryOrder] = useState([]);
  const [picks, setPicks] = useState([]);
  const [available, setAvailable] = useState([...prospects]);
  const [teamOptions, setTeamOptions] = useState([]);
  const [teamPickNum, setTeamPickNum] = useState(4);
  const [userPick, setUserPick] = useState(null);
  const [showConfetti, setShowConfetti] = useState(false);

  const teamFullName = config.fullName.toUpperCase();
  const teamLotteryName = lotteryTeams.find(t => t.team.includes(config.name.toUpperCase()) || t.team.includes(config.abbr))?.team || teamFullName;

  const startSim = () => {
    const lottery = simulateLottery(lotteryTeams);
    const teamSlot = lottery.findIndex(t => t.team === teamLotteryName);
    const teamPick = teamSlot >= 0 ? teamSlot + 1 : 4;

    setLotteryOrder(lottery);
    setTeamPickNum(teamPick);
    setSimState('lottery');
    setPicks([]);
    setAvailable([...prospects]);
    setUserPick(null);

    // Show lottery results for 3s then start picks
    setTimeout(() => {
      setSimState('simulating');
      simulatePicks([...prospects], [], 1, lottery, teamPick);
    }, 3000);
  };

  const simulatePicks = (avail, currentPicks, pickNum, lottery, teamPick) => {
    if (pickNum >= teamPick) {
      const top3 = avail.slice(0, 3);
      setTeamOptions(top3);
      setAvailable(avail);
      setPicks(currentPicks);
      setSimState('picking');
      return;
    }

    setTimeout(() => {
      const team = lottery[pickNum - 1];
      // Add some randomness to team picks — sometimes they don't take BPA
      let pickIdx = 0;
      if (Math.random() < 0.25 && avail.length > 2) {
        // 25% chance team reaches for a need-based pick (take #2 or #3 instead of #1)
        pickIdx = Math.floor(Math.random() * Math.min(3, avail.length));
      }
      const picked = avail[pickIdx];
      const newAvail = [...avail]; newAvail.splice(pickIdx, 1);
      const newPicks = [...currentPicks, { ...team, player: picked }];
      setPicks(newPicks);
      setAvailable(newAvail);
      simulatePicks(newAvail, newPicks, pickNum + 1, lottery, teamPick);
    }, 700);
  };

  const makeJazzPick = (prospect) => {
    setUserPick(prospect);
    setShowConfetti(true);
    setSimState('done');
    setTimeout(() => setShowConfetti(false), 3000);
  };

  return (
    <div className="max-w-4xl mx-auto">
      {simState === 'idle' && (
        <div className="text-center">
          <p className="text-gray-400 text-sm mb-4">Lottery odds determine pick order. Results change every run.</p>
          <button onClick={startSim} className="px-8 py-4 rounded-2xl bg-team-secondary text-black font-bold text-lg hover:opacity-90 transition-all pulse-secondary">
            Run Mock Draft
          </button>
        </div>
      )}

      {simState === 'lottery' && (
        <div className="glass rounded-2xl p-6 animate-fade-in">
          <h3 className="text-lg font-bold text-team-secondary text-center mb-4">Lottery Results</h3>
          <p className="text-center text-gray-400 text-sm mb-4">The ping pong balls have spoken...</p>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
            {lotteryOrder.slice(0, 14).map((t, i) => (
              <div key={i} className={`rounded-lg p-2 text-center text-sm ${t.team === teamLotteryName ? 'bg-team-secondary/20 border border-team-secondary/50' : 'glass'}`}>
                <div className="font-black text-team-secondary">#{i + 1}</div>
                <div className={`text-xs font-semibold ${t.team === teamLotteryName ? 'text-team-secondary' : 'text-gray-300'}`}>{t.team}</div>
              </div>
            ))}
          </div>
          <div className="text-center mt-4">
            <div className="text-team-secondary font-bold">{config.name} pick at #{lotteryOrder.findIndex(t => t.team === teamLotteryName) + 1}</div>
            <div className="text-gray-500 text-xs animate-pulse mt-2">Simulating picks...</div>
          </div>
        </div>
      )}

      {(simState === 'simulating' || simState === 'picking' || simState === 'done') && (
        <div className="glass rounded-2xl p-6">
          {/* Lottery result summary */}
          <div className="flex items-center justify-between mb-4 pb-3 border-b border-team-primary/30">
            <span className="text-xs text-gray-500">{config.name} lottery position: <span className="text-team-secondary font-bold">#{teamPickNum}</span></span>
            <span className="text-xs text-gray-600">{teamPickNum <= 4 ? 'Lottery winner!' : teamPickNum <= 7 ? 'Solid range' : 'Fell in the draft'}</span>
          </div>

          {/* Previous picks */}
          <div className="space-y-2 mb-6">
            {picks.map((p, i) => (
              <div key={i} className="flex items-center gap-3 glass rounded-lg p-2.5 animate-fade-in">
                <div className="w-7 h-7 rounded-full bg-gray-700 flex items-center justify-center text-xs font-bold">#{p.pick}</div>
                <div className="flex-1 min-w-0">
                  <div className="font-bold text-xs truncate">{p.team}</div>
                </div>
                <div className="text-right">
                  <div className="font-bold text-team-secondary text-xs">{p.player.name}</div>
                  <div className="text-[10px] text-gray-500">{p.player.pos} | {p.player.school}</div>
                </div>
              </div>
            ))}
          </div>

          {simState === 'simulating' && (
            <div className="text-center py-6">
              <div className="text-team-secondary font-bold animate-pulse">Picks {picks.length + 1}–{jazzPickNum - 1} loading...</div>
            </div>
          )}

          {simState === 'picking' && (
            <div className="animate-fade-in">
              <div className="text-center mb-4">
                <div className="text-team-secondary font-black text-xl">WITH THE #{teamPickNum} PICK...</div>
                <div className="text-gray-400 text-sm">The {config.fullName} select:</div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                {teamOptions.map(p => (
                  <button key={p.rank} onClick={() => makeJazzPick(p)}
                    className="glass rounded-xl p-4 text-center hover:border-team-secondary/50 hover:scale-105 transition-all">
                    <div className="text-2xl font-black text-team-secondary mb-1">#{p.rank}</div>
                    <div className="font-bold text-sm">{p.name}</div>
                    <div className="text-xs text-gray-400">{p.pos} | {p.school}</div>
                    <div className="text-xs text-gray-400 mt-1">{p.stats.ppg} PPG | {p.stats.rpg} RPG</div>
                    <div className={`text-xs font-bold mt-2 ${p.teamFit >= 8 ? 'text-green-400' : 'text-yellow-400'}`}>Fit: {p.teamFit}/10</div>
                  </button>
                ))}
              </div>
            </div>
          )}

          {simState === 'done' && userPick && (
            <div className="animate-fade-in">
              {showConfetti && (
                <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
                  {Array.from({length: 20}, (_, i) => (
                    <div key={i} className="absolute" style={{
                      left: `${Math.random() * 100}%`, top: '-20px',
                      width: 10, height: 10, borderRadius: Math.random() > 0.5 ? '50%' : '0',
                      background: ['var(--team-secondary)', 'var(--team-primary)', 'var(--team-light)', '#fff'][Math.floor(Math.random() * 4)],
                      animation: `confetti ${1 + Math.random() * 2}s ${Math.random()}s forwards`
                    }} />
                  ))}
                </div>
              )}

              <div className="glass rounded-xl p-3 mb-4 flex items-center gap-4">
                <div className="w-8 h-8 rounded-full bg-team-secondary flex items-center justify-center text-black text-sm font-bold">#{teamPickNum}</div>
                <div className="flex-1">
                  <div className="font-bold text-sm text-team-secondary">{config.fullName.toUpperCase()}</div>
                  <div className="text-xs text-gray-400">select</div>
                </div>
                <div className="text-right">
                  <div className="font-bold text-team-secondary text-lg">{userPick.name}</div>
                  <div className="text-xs text-gray-400">{userPick.pos} | {userPick.school}</div>
                </div>
              </div>

              <div className="glass rounded-xl p-4 mb-4">
                <h3 className="text-sm font-bold text-team-secondary mb-2">{config.name} Fit Analysis</h3>
                <p className="text-sm text-gray-300 leading-relaxed">{userPick.teamFitAnalysis}</p>
              </div>

              {/* Projected Roster Impact */}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div className="glass rounded-xl p-4">
                  <h3 className="text-sm font-bold text-team-secondary mb-3">Projected Lineup With {userPick.name.split(' ').pop()}</h3>

function AIChatScout() {
  const { config, teamData } = useTeam();
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [apiKey, setApiKey] = useState('');
  const chatRef = useRef(null);

  const coreStr = teamData.players.filter(p => p.starter).map(p => `${p.name} (#${p.number}, ${p.pos})`).join(', ');
  const systemPrompt = `You are the ${config.fullName}'s expert AI scout for the 2026-27 season. The ${config.name}'s core is ${coreStr}. Head coach: ${config.coach}. GM: ${config.gm}. Arena: ${config.arena}. The 2026 draft's top prospects are Dybantsa, Peterson, and Boozer. Be confident, use analytics lingo. Keep answers concise (2-3 paragraphs max).`;

  const sendMessage = async () => {
    if (!input.trim()) return;
    const userMsg = { role: 'user', content: input };
    const newMessages = [...messages, userMsg].slice(-12);
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setLoading(true);

    const key = apiKey || prompt('Enter your Anthropic API key:');
    if (key && !apiKey) setApiKey(key);

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: systemPrompt,
          messages: newMessages.map(m => ({ role: m.role, content: m.content }))
        })
      });
      const data = await resp.json();
      const assistantMsg = { role: 'assistant', content: data.content?.[0]?.text || 'I had trouble generating a response. Try again!' };
      setMessages(prev => [...prev, assistantMsg]);
    } catch (e) {
      setMessages(prev => [...prev, { role: 'assistant', content: 'Enter a valid Anthropic API key to chat with the Jazz AI Scout.' }]);
    }
    setLoading(false);
  };

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages]);

  return (
    <>
      {/* Floating Button */}
      <button onClick={() => setOpen(!open)}
        className="fixed bottom-6 right-6 z-40 w-14 h-14 rounded-full bg-team-secondary text-black flex items-center justify-center text-xl font-bold shadow-lg pulse-secondary hover:scale-110 transition-transform">
        {open ? '✕' : '🤖'}
      </button>

      {/* Chat Panel */}
      {open && (
        <div className="fixed bottom-24 right-6 z-40 w-96 max-w-[90vw] bg-team-midnight border border-team-primary rounded-2xl shadow-2xl animate-fade-in overflow-hidden">
          <div className="bg-team-primary/30 p-4 border-b border-team-primary">
            <h3 className="font-bold text-team-secondary">Ask the Scout 🤖</h3>
            <p className="text-xs text-gray-400">AI-powered Jazz analysis</p>
          </div>

          <div ref={chatRef} className="h-80 overflow-y-auto p-4 space-y-3">
            {messages.length === 0 && (
              <div className="text-center text-gray-500 text-sm py-8">
                Ask about the roster, draft prospects, trades, or strategy!
              </div>
            )}
            {messages.map((m, i) => (
              <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[80%] rounded-xl px-3 py-2 text-sm ${m.role === 'user' ? 'bg-team-secondary text-black' : 'glass text-gray-200'}`}>
                  {m.content}
                </div>
              </div>
            ))}
            {loading && (
              <div className="flex justify-start">
                <div className="glass rounded-xl px-4 py-2 text-sm text-gray-400 animate-pulse">Scouting...</div>
              </div>
            )}
          </div>

          <div className="p-3 border-t border-team-primary flex gap-2">
            <input value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && sendMessage()}
              placeholder="Ask about Jazz basketball..."
              className="flex-1 bg-gray-900/50 border border-team-primary rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-team-secondary" />
            <button onClick={sendMessage} disabled={loading}
              className="px-4 py-2 rounded-lg bg-team-secondary text-black font-bold text-sm hover:bg-yellow-400 disabled:opacity-40">
              Send
            </button>
          </div>
        </div>
      )}
    </>
  );
}
