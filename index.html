          <p className="text-gray-300 text-sm leading-relaxed">
            Each team gets its own themed experience with dynamically swappable colors, data, and content. The Utah Jazz edition features complete roster scouting reports, 25 draft prospect analyses, and 50 custom fan poll questions. Other teams launch with generated placeholder data that can be fleshed out over time.
          </p>
        </div>

        <div className="glass rounded-2xl p-6">
          <h3 className="text-lg font-bold text-team-secondary mb-4">Tech Stack</h3>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {[
              { name: 'React 18', desc: 'UI framework loaded via CDN — no build step, no Node.js required', url: 'https://react.dev' },
              { name: 'Tailwind CSS (CDN)', desc: 'Utility-first CSS with custom team color theming via CSS custom properties', url: 'https://tailwindcss.com' },
              { name: 'Recharts', desc: 'Composable charting library for radar charts, bar charts, line charts, and pie charts', url: 'https://recharts.org' },
              { name: 'Babel Standalone', desc: 'In-browser JSX transpilation — enables modern React syntax without a build pipeline', url: 'https://babeljs.io' },
              { name: 'CSS Custom Properties', desc: 'Dynamic theming system — all 30 team color palettes swap instantly via :root variables' },
              { name: 'localStorage', desc: 'Client-side persistence for team preference, poll votes, fan map data, and session state' },
              { name: 'Geolocation API', desc: 'Browser native API for the Fan Map feature — plots visitor locations on an SVG map' },
              { name: 'Claude API (Anthropic)', desc: 'Powers the AI Trade Analyst and AI Chat Scout features — requires user-provided API key', url: 'https://docs.anthropic.com' },
              { name: 'Jest', desc: '82-test suite covering structure, theming, data integrity, security, and regression — runs automatically via pre-commit hook' },
            ].map((t, i) => (
              <div key={i} className="rounded-xl p-4 border border-team-primary/20" style={{ background: 'rgba(var(--team-primary-rgb),0.06)' }}>
                <div className="flex items-center gap-2 mb-1">
                  <span className="font-bold text-sm text-team-secondary">{t.name}</span>
                </div>
                <p className="text-xs text-gray-400">{t.desc}</p>
              </div>
            ))}
          </div>
        </div>

        <div className="glass rounded-2xl p-6">
          <h3 className="text-lg font-bold text-team-secondary mb-4">Data Sources</h3>
          <div className="space-y-3">
            {[
              { source: 'NBA.com / cdn.nba.com', desc: 'Player headshot images via the official NBA CDN (public, no auth required)' },
              { source: 'Tankathon.com', desc: '2026 NBA Draft lottery odds, team records, and pick probabilities' },
              { source: 'Manual Scouting Data', desc: 'Player stats, radar ratings, scout reports, strengths/weaknesses, and draft prospect analyses are editorially curated' },
              { source: 'OpenStreetMap Nominatim', desc: 'Reverse geocoding API for the Fan Map feature — converts lat/lng coordinates to city/country names' },
              { source: 'Team Color References', desc: 'Official NBA team colors sourced from team brand guidelines and public style guides' },
            ].map((d, i) => (
              <div key={i} className="flex items-start gap-3 p-3 rounded-lg" style={{ background: 'rgba(var(--team-primary-rgb),0.06)' }}>
                <div className="w-2 h-2 rounded-full bg-team-secondary mt-1.5 shrink-0" />
                <div>
                  <span className="text-sm font-semibold text-white">{d.source}</span>
                  <p className="text-xs text-gray-400 mt-0.5">{d.desc}</p>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="glass rounded-2xl p-6">
          <h3 className="text-lg font-bold text-team-secondary mb-4">Architecture</h3>
          <div className="space-y-3 text-sm text-gray-300">
            <p><span className="text-team-secondary font-semibold">Single File:</span> The entire application lives in one <code className="text-xs bg-gray-800 px-1.5 py-0.5 rounded">index.html</code> file (~180KB). No build step, no bundler, no server — just open the file in a browser.</p>
            <p><span className="text-team-secondary font-semibold">30-Team Theming:</span> A <code className="text-xs bg-gray-800 px-1.5 py-0.5 rounded">TEAM_CONFIGS</code> object holds metadata for all 30 NBA teams. CSS custom properties enable instant color swaps via <code className="text-xs bg-gray-800 px-1.5 py-0.5 rounded">applyTeamColors()</code>.</p>
            <p><span className="text-team-secondary font-semibold">Context-Driven:</span> A React Context (<code className="text-xs bg-gray-800 px-1.5 py-0.5 rounded">TeamContext</code>) propagates the active team config, data, and switch function to all child components.</p>
            <p><span className="text-team-secondary font-semibold">URL Routing:</span> Hash-based routing (<code className="text-xs bg-gray-800 px-1.5 py-0.5 rounded">#roster</code>, <code className="text-xs bg-gray-800 px-1.5 py-0.5 rounded">#draft</code>, etc.) enables shareable deep links to each section.</p>
            <p><span className="text-team-secondary font-semibold">Stub System:</span> Teams without full data get auto-generated rosters, generic poll questions, and placeholder scouting reports — ready to be replaced with real data.</p>
            <p><span className="text-team-secondary font-semibold">Performance:</span> Lazy-loaded images, memoized components (<code className="text-xs bg-gray-800 px-1.5 py-0.5 rounded">React.memo</code>), GPU-accelerated animations with <code className="text-xs bg-gray-800 px-1.5 py-0.5 rounded">will-change</code>, preconnect hints, and optimized font loading.</p>
            <p><span className="text-team-secondary font-semibold">Security:</span> HTML entity escaping on API responses, no embedded API keys, referrer policy, session-only key storage, and XSS-safe rendering patterns.</p>
            <p><span className="text-team-secondary font-semibold">Testing:</span> 82-test Jest suite covering file structure, CSS theming, all 30 team configs, data integrity, component existence, URL routing, security checks, and poll regression. Runs automatically via Git pre-commit hook.</p>
          </div>
        </div>

        <div className="glass rounded-2xl p-6">
          <h3 className="text-lg font-bold text-team-secondary mb-4">Features Overview</h3>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {[
              { feature: 'Roster', desc: 'Player cards with stats, radar charts, monthly trends, scout reports, streak tracking, and ceiling projections' },
              { feature: 'Draft Room', desc: 'Big board with 25 ranked prospects, team fit analysis, positional needs, and lottery odds breakdown' },
              { feature: 'Mock Draft Simulator', desc: 'Lottery simulation with weighted odds, AI pick logic, and interactive team selection with roster impact projections' },
              { feature: 'Fan Poll', desc: '50 team-specific questions across 5 categories with real-time vote tracking and results dashboard' },
              { feature: 'Trade Machine', desc: 'Select players to trade, type incoming assets, and get AI-powered analysis with grades and GM approval ratings' },
              { feature: 'Lineup Builder', desc: '5-position lineup constructor with auto-calculated chemistry scores, identity labels, and projected stats' },
              { feature: 'Fan Map', desc: 'Geolocation-based visitor tracking with US and world map visualizations and city leaderboards' },
              { feature: 'AI Chat Scout', desc: 'Floating chatbot powered by Claude for real-time basketball analysis and team-specific Q&A' },
            ].map((f, i) => (
              <div key={i} className="rounded-lg p-3 border border-team-primary/15" style={{ background: 'rgba(var(--team-primary-rgb),0.04)' }}>
                <span className="text-sm font-bold text-team-secondary">{f.feature}</span>
                <p className="text-xs text-gray-400 mt-1">{f.desc}</p>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

function FAQPage() {
  const { config } = useTeam();
  const [openIdx, setOpenIdx] = useState(null);

  const faqs = [
    { q: 'How do I switch teams?', a: 'Use the team selector dropdown in the top-left of the navigation bar. Your selection is saved automatically and persists across sessions.' },
    { q: 'Why do some teams show "Preview mode"?', a: 'The Utah Jazz has complete data including full scouting reports, 25 draft prospects with team-fit analysis, and 50 custom poll questions. Other teams launch with auto-generated placeholder data. Real data for more teams will be added over time.' },
    { q: 'Is my poll data saved?', a: 'Yes. Your votes and poll progress are saved in your browser\'s localStorage. They persist across page reloads but are local to your browser — clearing browser data will reset them.' },
    { q: 'How does the Mock Draft Simulator work?', a: 'The simulator uses real lottery odds from Tankathon.com to randomly determine draft order (top 4 picks by lottery, picks 5-14 by inverse record). Then AI logic simulates each team\'s pick before your team selects. Each run produces different results.' },
    { q: 'Do the Trade Machine and AI Scout require an API key?', a: 'Yes. Both features use the Claude API (Anthropic) for real-time analysis. You\'ll be prompted to enter your API key when you first use either feature. Your key is stored only in your browser session — it\'s never sent anywhere except directly to the Anthropic API.' },
    { q: 'How does the Fan Map work?', a: 'The Fan Map uses your browser\'s Geolocation API (with your permission) to plot your location on an SVG map. Visitor data is stored in localStorage. It\'s a fun visualization of where fans are checking in from — entirely client-side, no data leaves your browser.' },
    { q: 'Can I share a specific section?', a: 'Yes! Each tab has its own URL. For example, share the Draft Room by sending someone the URL ending in #draft. The page will open directly to that section.' },
    { q: 'How are player ratings calculated?', a: 'Player radar charts (Scoring, Playmaking, Defense, Athleticism, Shooting, IQ) are editorially assigned on a 0-100 scale based on scouting analysis. They represent current ability, not potential.' },
    { q: 'Where does the lottery odds data come from?', a: 'Draft lottery odds, team records, and probabilities are sourced from Tankathon.com, which tracks the official NBA lottery odds format.' },
    { q: 'Is this an official NBA product?', a: 'No. This is an independent fan project with no affiliation to the NBA, any NBA team, or the National Basketball Players Association. All team names, logos, and player likenesses are property of their respective owners.' },
    { q: 'What browsers are supported?', a: 'Any modern browser (Chrome, Firefox, Safari, Edge) with JavaScript enabled. The app uses CSS custom properties, ES6+, and the Geolocation API — all widely supported since ~2018.' },
    { q: 'Can I contribute data for my team?', a: 'The codebase is a single HTML file. To add full data for a team, you\'d add player objects to that team\'s config in the TEAM_CONFIGS object, following the same structure as the Jazz data (JAZZ_PLAYERS, JAZZ_PROSPECTS, etc.).' },
  ];

  return (
    <section className="py-12 px-4 max-w-3xl mx-auto">
      <h2 className="text-3xl font-black text-center mb-8">
        <span className="text-team-secondary">FAQ</span>
      </h2>

      <div className="space-y-3">
        {faqs.map((faq, i) => (
          <div key={i} className="glass rounded-xl overflow-hidden">
            <button onClick={() => setOpenIdx(openIdx === i ? null : i)}
              className="w-full text-left px-5 py-4 flex items-center justify-between hover:bg-team-primary/10 transition-colors">
              <span className="font-semibold text-sm pr-4">{faq.q}</span>
              <span className={`text-team-secondary text-lg transition-transform duration-200 ${openIdx === i ? 'rotate-45' : ''}`}>+</span>
            </button>
            {openIdx === i && (
              <div className="px-5 pb-4 animate-fade-in">
                <p className="text-sm text-gray-300 leading-relaxed">{faq.a}</p>
              </div>
            )}
          </div>
        ))}
      </div>
    </section>
  );
}

// ============================================================
// MAIN APP
// ============================================================
const TAB_SLUGS = {
  'ROSTER': 'roster', 'DRAFT ROOM': 'draft', 'POLL': 'poll',
  'TRADES': 'trades', 'LINEUPS': 'lineups', 'FAN MAP': 'fanmap',
  'WIKI': 'wiki', 'FAQ': 'faq'
};
const SLUG_TO_TAB = Object.fromEntries(Object.entries(TAB_SLUGS).map(([k, v]) => [v, k]));

function getTabFromHash() {
  const hash = window.location.hash.replace('#', '');
  return SLUG_TO_TAB[hash] || 'ROSTER';
}

function App() {
  const [activeTab, setActiveTab] = useState(getTabFromHash);
  const [selectedTeam, setSelectedTeam] = useState(() => {
    return localStorage.getItem('nbahub_selected_team') || 'UTA';
  });
  const tabs = ['ROSTER', 'DRAFT ROOM', 'POLL', 'TRADES', 'LINEUPS', 'FAN MAP'];

  const navigateTo = useCallback((tab) => {
    setActiveTab(tab);
    window.location.hash = TAB_SLUGS[tab] || '';
  }, []);

  useEffect(() => {
    const onHash = () => setActiveTab(getTabFromHash());
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const config = TEAM_CONFIGS[selectedTeam];
  const isStub = !config.players;

  const teamData = useMemo(() => ({
    players: getTeamData(config, 'players'),
    prospects: getTeamData(config, 'prospects'),
    pollQuestions: getTeamData(config, 'pollQuestions'),
    lotteryTeams: getTeamData(config, 'lotteryTeams'),
  }), [selectedTeam]);

  const switchTeam = useCallback((abbr) => {
    setSelectedTeam(abbr);
    localStorage.setItem('nbahub_selected_team', abbr);
    const c = TEAM_CONFIGS[abbr].colors;
    applyTeamColors(c);
    document.title = `${TEAM_CONFIGS[abbr].fullName} Season Hub`;
  }, []);

  useEffect(() => {
    applyTeamColors(config.colors);
    document.title = `${config.fullName} Season Hub`;
  }, []);

  const ctxValue = useMemo(() => ({ config, teamData, isStub, switchTeam }), [selectedTeam]);

  const westTeams = Object.values(TEAM_CONFIGS).filter(t => t.conference === 'West').sort((a, b) => a.fullName.localeCompare(b.fullName));
  const eastTeams = Object.values(TEAM_CONFIGS).filter(t => t.conference === 'East').sort((a, b) => a.fullName.localeCompare(b.fullName));

  return (
    <TeamContext.Provider value={ctxValue}>
    <div className="min-h-screen">
      {/* Header */}
      <header className="relative overflow-hidden" style={{ background: 'linear-gradient(180deg, var(--team-deep), var(--team-midnight))' }}>
        <Particles />
        <HeroBg />
        <div className="relative z-10 text-center py-10 px-4">
          <h1 className="text-4xl md:text-5xl font-black tracking-tight">
            <span className="text-team-secondary">{config.city.toUpperCase()}</span> <span className="text-white">{config.name.toUpperCase()}</span>
          </h1>
          <p className="text-xs md:text-sm text-gray-400 tracking-widest mt-1">2026-27 SEASON HUB</p>
        </div>
      </header>

      {/* Sticky Navigation */}
      <nav className="sticky top-0 z-30 border-b border-team-primary/30" style={{ background: 'rgba(var(--team-deep-rgb),0.95)', backdropFilter: 'blur(12px)' }}>
        <div className="flex items-center justify-between py-2.5 px-4">
          <div className="w-[120px] hidden md:block" />
          <div className="flex items-center gap-1 flex-wrap justify-center">
            {tabs.map(tab => (
              <button key={tab} onClick={() => navigateTo(tab)}
                className={`px-3 py-1.5 rounded-full text-xs font-semibold transition-all duration-300 ${activeTab === tab ? 'bg-team-secondary text-black shadow-lg shadow-team-secondary/20' : 'text-gray-400 hover:text-white hover:bg-team-primary/30'}`}>
                {tab}
              </button>
            ))}
          </div>
          <select value={selectedTeam} onChange={e => switchTeam(e.target.value)}
            className="bg-transparent border border-team-primary/40 rounded-lg px-2 py-1.5 text-xs font-semibold text-white cursor-pointer focus:outline-none focus:ring-1 focus:ring-team-secondary/50" style={{ background: 'var(--team-midnight)' }}>
            <optgroup label="Western Conference">
              {westTeams.map(t => <option key={t.abbr} value={t.abbr} style={{ background: '#111' }}>{t.fullName}{t.players ? '' : ' *'}</option>)}
            </optgroup>
            <optgroup label="Eastern Conference">
              {eastTeams.map(t => <option key={t.abbr} value={t.abbr} style={{ background: '#111' }}>{t.fullName}{t.players ? '' : ' *'}</option>)}
            </optgroup>
          </select>
        </div>
      </nav>

      {/* Stub team banner */}
      {isStub && (
        <div className="text-center py-2 px-4 text-xs text-gray-400 border-b border-team-primary/10" style={{ background: 'rgba(var(--team-primary-rgb),0.08)' }}>
          Preview mode &mdash; full {config.fullName} roster data coming soon
        </div>
      )}

      {/* Content */}
      <main>
        {activeTab === 'ROSTER' && <RosterSection />}
        {activeTab === 'DRAFT ROOM' && <DraftRoom />}
        {activeTab === 'FAN MAP' && <FanMap />}
        {activeTab === 'POLL' && <FanPoll />}
        {activeTab === 'TRADES' && <TradeMachine />}
        {activeTab === 'LINEUPS' && <LineupBuilder />}
        {activeTab === 'WIKI' && <WikiPage />}
        {activeTab === 'FAQ' && <FAQPage />}
      </main>

      {/* Footer */}
      <footer className="text-center py-8 px-4 border-t border-team-primary/20">
        <p className="text-gray-500 text-sm">{config.fullName} &mdash; 2026-27 Season Hub</p>
        <div className="flex justify-center gap-4 mt-2">
          <button onClick={() => navigateTo('WIKI')} className="text-team-secondary/70 hover:text-team-secondary text-xs transition-colors">Wiki &amp; Tech Stack</button>
          <span className="text-gray-700">|</span>
          <button onClick={() => navigateTo('FAQ')} className="text-team-secondary/70 hover:text-team-secondary text-xs transition-colors">FAQ</button>
        </div>
        <p className="text-gray-600 text-xs mt-2">Built with React &amp; Recharts &bull; Select any team above</p>
      </footer>

      {/* AI Chat Scout - Always visible */}
      <AIChatScout />
    </div>
    </TeamContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
