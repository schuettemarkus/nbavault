// SECTION: TRADE CENTER (full-page interactive trade experience)
// ============================================================
function TradeCenter() {
  const { config, teamData } = useTeam();
  const players = teamData.players;
  const allTeams = Object.values(TEAM_CONFIGS).filter(t => t.abbr !== config.abbr && t.players);

  // States
  const [view, setView] = useState('hub'); // hub, builder, suggestions, history, valuations
  const [teamOut, setTeamOut] = useState([]);
  const [partnerTeam, setPartnerTeam] = useState(null);
  const [partnerOut, setPartnerOut] = useState([]);
  const [draftPicks, setDraftPicks] = useState({ sending: [], receiving: [] });
  const [tradeHistory, setTradeHistory] = useState(() => {
    try { return JSON.parse(localStorage.getItem('nbavault_trade_history_' + config.abbr)) || []; } catch { return []; }
  });
  const [expandedTrade, setExpandedTrade] = useState(null);

  const saveHistory = (trades) => {
    setTradeHistory(trades);
    try { localStorage.setItem('nbavault_trade_history_' + config.abbr, JSON.stringify(trades.slice(0, 20))); } catch {}
  };

  // Player value estimation (simplified — based on age, stats, contract)
  function estimateValue(player) {
    const ppg = player.stats?.ppg || 0;
    const age = 25; // Estimate
    let value = ppg * 3;
    if (player.badge === 'ALL-STAR') value += 20;
    if (player.starter) value += 10;
    if (ppg >= 25) value += 15;
    if (ppg >= 20) value += 8;
    return Math.round(value);
  }

  // Calculate trade fairness
  function tradeFairness(sendPlayers, recvPlayers, sendPicks, recvPicks) {
    const sendVal = sendPlayers.reduce((s, p) => s + estimateValue(p), 0) + sendPicks.length * 20;
    const recvVal = recvPlayers.reduce((s, p) => s + estimateValue(p), 0) + recvPicks.length * 20;
    if (sendVal === 0 && recvVal === 0) return { pct: 50, label: 'Empty', color: 'text-gray-500' };
    const total = sendVal + recvVal;
    const recvPct = Math.round((recvVal / total) * 100);
    if (recvPct >= 65) return { pct: recvPct, label: 'Highway Robbery', color: 'text-green-400' };
    if (recvPct >= 55) return { pct: recvPct, label: 'Win', color: 'text-green-400' };
    if (recvPct >= 45) return { pct: recvPct, label: 'Fair Trade', color: 'text-team-secondary' };
    if (recvPct >= 35) return { pct: recvPct, label: 'Slight Overpay', color: 'text-yellow-400' };
    return { pct: recvPct, label: 'Overpay', color: 'text-red-400' };
  }

  // Generate trade grade
  function tradeGrade(fairness, fillsNeed) {
    let score = fairness.pct;
    if (fillsNeed) score += 10;
    if (score >= 65) return { grade: 'A', color: 'text-green-400' };
    if (score >= 58) return { grade: 'B+', color: 'text-green-400' };
    if (score >= 52) return { grade: 'B', color: 'text-team-secondary' };
    if (score >= 45) return { grade: 'C+', color: 'text-team-secondary' };
    if (score >= 38) return { grade: 'C', color: 'text-yellow-400' };
    return { grade: 'D', color: 'text-red-400' };
  }

  // Identify team needs — always returns at least 3
  function getNeeds(teamPlayers) {
    const roster = teamPlayers || players;
    const starters = roster.filter(p => p.starter);
    const all = roster;
    const needs = [];
    const posMap = {};
    ['PG', 'SG', 'SF', 'PF', 'C'].forEach(pos => {
      posMap[pos] = starters.filter(p => p.pos.includes(pos));
    });
    const scorers = starters.filter(p => p.stats.ppg >= 15);
    const topPPG = starters.length > 0 ? Math.max(...starters.map(p => p.stats.ppg)) : 0;
    const secondPPG = starters.length > 1 ? [...starters].sort((a, b) => b.stats.ppg - a.stats.ppg)[1]?.stats.ppg || 0 : 0;
    const totalPPG = starters.reduce((s, p) => s + p.stats.ppg, 0);
    const totalAPG = starters.reduce((s, p) => s + (p.stats.apg || 0), 0);
    const totalRPG = starters.reduce((s, p) => s + (p.stats.rpg || 0), 0);
    const shooters = starters.filter(p => (p.stats.threePct || 0) >= 36);
    const avgThree = starters.filter(p => p.stats.threePct > 0).reduce((s, p) => s + p.stats.threePct, 0) / Math.max(starters.filter(p => p.stats.threePct > 0).length, 1);
    const benchDepth = all.filter(p => !p.starter && p.stats.ppg >= 8).length;

    // Scoring — smarter: check if there's a second scorer, not just topPPG
    if (topPPG < 20) needs.push({ type: 'Go-To Scorer', desc: `Best scorer at ${topPPG.toFixed(1)} PPG — need a 20+ PPG alpha`, priority: 'high' });
    else if (secondPPG < 15) needs.push({ type: 'Second Scorer', desc: `No reliable #2 — second-best starter at ${secondPPG.toFixed(1)} PPG`, priority: 'high' });
    else if (scorers.length < 3) needs.push({ type: 'Scoring Depth', desc: `Only ${scorers.length} starter(s) averaging 15+ PPG`, priority: 'medium' });

    // Playmaking — check all players, not just PGs
    const playmakers = starters.filter(p => (p.stats.apg || 0) >= 5);
    if (playmakers.length === 0)
      needs.push({ type: 'Playmaker', desc: 'No starter averaging 5+ APG', priority: 'high' });
    else if (totalAPG < 15)
      needs.push({ type: 'Playmaking Depth', desc: `Team-wide ${totalAPG.toFixed(0)} APG — need more creation`, priority: 'medium' });

    // Rim protection / rebounding — check bigs (C/PF), not just C
    const bigs = starters.filter(p => p.pos.includes('C') || p.pos.includes('PF'));
    const topRebounder = bigs.length > 0 ? Math.max(...bigs.map(p => p.stats.rpg || 0)) : 0;
    if (topRebounder < 7)
      needs.push({ type: 'Rim Protector', desc: 'No big averaging 7+ RPG — need interior presence', priority: 'high' });
    else if (totalRPG < 20)
      needs.push({ type: 'Rebounding', desc: `Starters at ${totalRPG.toFixed(0)} RPG — need more boards`, priority: 'medium' });

    // Shooting
    if (avgThree < 33)
      needs.push({ type: '3PT Shooting', desc: `Team averaging ${avgThree.toFixed(1)}% from 3 — need floor spacing`, priority: 'high' });
    else if (shooters.length < 2)
      needs.push({ type: 'Spacing', desc: `Only ${shooters.length} shooter(s) at 36%+ — need more threats`, priority: 'medium' });

    // Wing depth
    const wings = starters.filter(p => p.pos.includes('SF') || p.pos.includes('SG'));
    if (wings.length < 2)
      needs.push({ type: '3-and-D Wing', desc: 'Thin on the wing — need a two-way forward', priority: 'medium' });

    // Bench depth
    if (benchDepth < 3)
      needs.push({ type: 'Bench Depth', desc: `Only ${benchDepth} bench player(s) averaging 8+ PPG`, priority: 'medium' });

    // Defense — smarter: check badges, radar, AND stats (rpg >= 10 for bigs = rim protector)
    const defenders = starters.filter(p =>
      p.badge === 'DPOY' ||
      (p.radar && p.radar.Defense >= 70) ||
      ((p.stats.rpg || 0) >= 10 && p.pos.includes('C')) || // Elite rebounding center = defensive anchor
      (p.stats.ppg >= 20 && (p.stats.rpg || 0) >= 8) // Two-way star
    );
    if (defenders.length === 0)
      needs.push({ type: 'Defensive Anchor', desc: 'No elite defenders on the roster', priority: 'medium' });

    // Veteran presence — check badges AND ppg threshold
    const vets = all.filter(p => p.badge === 'VETERAN' || p.badge === 'ALL-STAR' || p.badge === 'DPOY' || p.stats.ppg >= 20);
    if (vets.length === 0)
      needs.push({ type: 'Veteran Leadership', desc: 'Young roster — need an experienced stabilizer', priority: 'low' });

    // Always ensure at least 3 needs
    if (needs.length < 3) {
      const fillers = [
        { type: 'Roster Flexibility', desc: 'Add tradeable contracts for future flexibility', priority: 'low' },
        { type: 'Draft Capital', desc: 'Accumulate future picks for long-term building', priority: 'low' },
        { type: 'Culture Fit', desc: 'Add high-character players who elevate the locker room', priority: 'low' },
      ];
      for (let fi = 0; needs.length < 3 && fi < fillers.length; fi++) needs.push(fillers[fi]);
    }

    return needs.slice(0, 5);
  }

  // Generate suggested trades based on team needs
  function generateSuggestions() {
    const needs = getNeeds();
    const suggestions = [];
    const starters = players.filter(p => p.starter);
    const benchPlayers = players.filter(p => !p.starter && p.stats.ppg >= 5);
    const tradeable = [...benchPlayers, ...starters.filter(p => p.stats.ppg < 18)].slice(0, 5);

    allTeams.forEach(otherTeam => {
      if (!otherTeam.players) return;
      const otherStarters = otherTeam.players.filter(p => p.starter);
      needs.forEach(need => {
        otherStarters.forEach(target => {
          const nt = need.type.toLowerCase();
          let match = false;
          if (nt.includes('scor') && target.stats.ppg >= 18) match = true;
          if (nt.includes('playmak') && (target.stats.apg || 0) >= 5) match = true;
          if ((nt.includes('rim') || nt.includes('rebound')) && (target.stats.rpg || 0) >= 8 && (target.pos.includes('C') || target.pos.includes('PF'))) match = true;
          if ((nt.includes('3pt') || nt.includes('spac') || nt.includes('shoot')) && (target.stats.threePct || 0) >= 37) match = true;
          if (nt.includes('wing') && (target.pos.includes('SF') || target.pos.includes('SG')) && target.stats.ppg >= 12) match = true;
          if (nt.includes('defen') && target.radar && target.radar.Defense >= 80) match = true;
          if (nt.includes('bench') && target.stats.ppg >= 12 && target.stats.ppg < 20) match = true;
          if (!match) return;

          // Find a realistic trade package
          let sendPlayer = null;
          for (const tp of tradeable) {
            const tpVal = estimateValue(tp);
            const tgtVal = estimateValue(target);
            if (Math.abs(tpVal - tgtVal) < 35) { sendPlayer = tp; break; }
          }
          if (!sendPlayer && tradeable.length > 0) sendPlayer = tradeable[0];
          if (!sendPlayer) return;

          const targetVal = estimateValue(target);
          const sendVal = estimateValue(sendPlayer);
          const needPick = targetVal > sendVal + 8;

          suggestions.push({
            partner: otherTeam,
            target,
            send: sendPlayer,
            needPick,
            need: need.type,
            targetVal,
            sendVal,
          });
        });
      });
    });

    return suggestions
      .sort((a, b) => b.targetVal - a.targetVal)
      .filter((s, i, arr) => arr.findIndex(x => x.target.name === s.target.name) === i)
      .slice(0, 8);
  }

  const togglePlayer = (name, side) => {
    if (side === 'send') {
      setTeamOut(prev => prev.includes(name) ? prev.filter(n => n !== name) : prev.length < 3 ? [...prev, name] : prev);
    } else {
      setPartnerOut(prev => prev.includes(name) ? prev.filter(n => n !== name) : prev.length < 3 ? [...prev, name] : prev);
    }
  };

  const togglePick = (pick, side) => {
    setDraftPicks(prev => {
      const key = side;
      const existing = prev[key];
      return { ...prev, [key]: existing.includes(pick) ? existing.filter(p => p !== pick) : [...existing, pick] };
    });
  };

  // Generate trade report card for one side
  function teamReportCard(teamAbbr, teamName, sentPlayers, recvPlayers, sentPks, recvPks, teamRoster) {
    const myNeeds = getNeeds(teamRoster);
    const fillsNeed = recvPlayers.some(p => {
      return myNeeds.some(n => {
        if (n.type.includes('Scor') && p.stats.ppg >= 18) return true;
        if (n.type.includes('Playmak') && (p.stats.apg || 0) >= 5) return true;
        if (n.type.includes('Rim') && (p.stats.rpg || 0) >= 7 && p.pos.includes('C')) return true;
        if (n.type.includes('3PT') && (p.stats.threePct || 0) >= 36) return true;
        if (n.type.includes('Wing') && (p.pos.includes('SF') || p.pos.includes('SG'))) return true;
        return false;
      });
    });
    const sentVal = sentPlayers.reduce((s, p) => s + estimateValue(p), 0) + sentPks.length * 20;
    const recvVal = recvPlayers.reduce((s, p) => s + estimateValue(p), 0) + recvPks.length * 20;
    const netVal = recvVal - sentVal;
    const ppgChange = recvPlayers.reduce((s, p) => s + p.stats.ppg, 0) - sentPlayers.reduce((s, p) => s + p.stats.ppg, 0);
    const rpgChange = recvPlayers.reduce((s, p) => s + (p.stats.rpg || 0), 0) - sentPlayers.reduce((s, p) => s + (p.stats.rpg || 0), 0);
    const apgChange = recvPlayers.reduce((s, p) => s + (p.stats.apg || 0), 0) - sentPlayers.reduce((s, p) => s + (p.stats.apg || 0), 0);

    let grade, gradeColor;
    const score = (netVal > 0 ? 55 : netVal > -10 ? 48 : 35) + (fillsNeed ? 10 : 0) + (recvPks.length * 5) - (sentPks.length * 5);
    if (score >= 65) { grade = 'A'; gradeColor = 'text-green-400'; }
    else if (score >= 55) { grade = 'B+'; gradeColor = 'text-green-400'; }
    else if (score >= 48) { grade = 'B'; gradeColor = 'text-team-secondary'; }
    else if (score >= 40) { grade = 'C+'; gradeColor = 'text-yellow-400'; }
    else if (score >= 30) { grade = 'C'; gradeColor = 'text-yellow-400'; }
    else { grade = 'D'; gradeColor = 'text-red-400'; }

    return { teamAbbr, teamName, grade, gradeColor, fillsNeed, netVal, ppgChange, rpgChange, apgChange, needs: myNeeds.slice(0, 3), sentVal, recvVal };
  }

  // Execute trade and save to history
  function executeTrade() {
    const sendPlayers = players.filter(p => teamOut.includes(p.name));
    const recvPlayers = partnerTeam?.players?.filter(p => partnerOut.includes(p.name)) || [];
    const fairness = tradeFairness(sendPlayers, recvPlayers, draftPicks.sending, draftPicks.receiving);

    // Build report cards for both sides
    const myReport = teamReportCard(config.abbr, config.name, sendPlayers, recvPlayers, draftPicks.sending, draftPicks.receiving, players);
    const theirReport = teamReportCard(partnerTeam.abbr, partnerTeam.name, recvPlayers, sendPlayers, draftPicks.receiving, draftPicks.sending, partnerTeam.players);

    const trade = {
      id: Date.now(),
      date: new Date().toLocaleDateString(),
      sent: sendPlayers.map(p => ({ name: p.name, pos: p.pos, ppg: p.stats.ppg, rpg: p.stats.rpg || 0, apg: p.stats.apg || 0, headshot: p.headshot })),
      received: recvPlayers.map(p => ({ name: p.name, pos: p.pos, ppg: p.stats.ppg, rpg: p.stats.rpg || 0, apg: p.stats.apg || 0, headshot: p.headshot, team: partnerTeam.abbr })),
      sentPicks: draftPicks.sending,
      receivedPicks: draftPicks.receiving,
      partner: partnerTeam?.abbr,
      partnerName: partnerTeam?.fullName,
      fairness,
      grade: myReport,
      fillsNeed: myReport.fillsNeed,
      myReport,
      theirReport,
    };

    saveHistory([trade, ...tradeHistory]);
    setExpandedTrade(trade.id);
    setView('history');
    setTeamOut([]);
    setPartnerOut([]);
    setDraftPicks({ sending: [], receiving: [] });
  }

  const needs = getNeeds();

  return (
    <div className="max-w-5xl mx-auto px-4 py-8">
      {/* Header */}
      <div className="text-center mb-8">
        <h2 className="text-3xl md:text-4xl font-black text-white">{config.name} <span className="text-team-secondary">Trade Center</span></h2>
        <p className="text-gray-400 text-sm mt-2">Build trades, explore suggestions, and track your moves</p>
      </div>

      {/* Navigation */}
      <div className="flex justify-center gap-2 mb-8">
        {[
          { key: 'hub', label: 'Overview' },
          { key: 'builder', label: 'Trade Builder' },
          { key: 'suggestions', label: 'Trade Ideas' },
          { key: 'valuations', label: 'Player Values' },
          { key: 'history', label: `History (${tradeHistory.length})` },
        ].map(tab => (
          <button key={tab.key} onClick={() => setView(tab.key)}
            className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${view === tab.key ? 'bg-team-secondary text-black' : 'glass text-gray-400 hover:text-white'}`}>
            {tab.label}
          </button>
        ))}
      </div>

      {/* FEATURE 1: TRADE HUB — Overview with needs + assets */}
      {view === 'hub' && (
        <div className="space-y-6 animate-fade-in">
          {/* Team needs */}
          <div className="glass rounded-2xl p-6">
            <h3 className="text-lg font-black text-white mb-4">{config.name} <span className="text-team-secondary">Needs Assessment</span></h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              {needs.map((n, i) => (
                <div key={i} className={`rounded-xl p-4 border ${n.priority === 'high' ? 'border-red-500/20 bg-red-500/5' : n.priority === 'medium' ? 'border-yellow-500/20 bg-yellow-500/5' : 'border-white/[0.06] bg-white/[0.02]'}`}>
                  <div className="flex items-center gap-2 mb-1">
                    <span className={`text-xs font-black uppercase tracking-wider ${n.priority === 'high' ? 'text-red-400' : n.priority === 'medium' ? 'text-yellow-400' : 'text-gray-500'}`}>{n.priority}</span>
                    <span className="text-sm font-bold text-white">{n.type}</span>
                  </div>
                  <p className="text-xs text-gray-400">{n.desc}</p>
                </div>
              ))}
            </div>
          </div>

          {/* Tradeable assets */}
          <div className="glass rounded-2xl p-6">
            <h3 className="text-lg font-black text-white mb-4">Trade <span className="text-team-secondary">Assets</span></h3>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              {[...players].sort((a, b) => estimateValue(b) - estimateValue(a)).map(p => (
                <div key={p.name} className="glass rounded-xl p-3 text-center">
                  {p.headshot && <img src={p.headshot} alt="" className="w-12 h-12 rounded-full object-cover mx-auto mb-2" loading="lazy" />}
                  <div className="text-xs font-bold text-white truncate">{p.name}</div>
                  <div className="text-[10px] text-gray-500">{p.pos} · {p.stats.ppg} PPG</div>
                  <div className="mt-1.5">
                    <span className="text-xs font-black text-team-secondary">{estimateValue(p)}</span>
                    <span className="text-[9px] text-gray-500 ml-0.5">value</span>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Quick actions */}
          <div className="flex gap-3 justify-center">
            <button onClick={() => setView('builder')} className="px-6 py-3 rounded-xl bg-team-secondary text-black font-bold text-sm hover:opacity-90 transition-all">
              Build a Trade
            </button>
            <button onClick={() => setView('suggestions')} className="px-6 py-3 rounded-xl glass text-white font-bold text-sm hover:bg-white/[0.06] transition-all">
              See Trade Ideas
            </button>
          </div>
        </div>
      )}

      {/* FEATURE 2: TRADE BUILDER — Full interactive builder */}
      {view === 'builder' && (
        <div className="animate-fade-in">
          {/* Team selector */}
          {!partnerTeam ? (
            <div className="glass rounded-2xl p-6 mb-6">
              <h3 className="text-sm font-black text-team-secondary mb-4">Select Trade Partner</h3>
              <div className="grid grid-cols-3 md:grid-cols-6 gap-2">
                {allTeams.sort((a, b) => a.fullName.localeCompare(b.fullName)).map(t => (
                  <button key={t.abbr} onClick={() => setPartnerTeam(t)}
                    className="glass rounded-lg p-2 text-center hover:bg-white/[0.06] transition-all">
                    <div className="text-xs font-bold text-white">{t.abbr}</div>
                    <div className="text-[10px] text-gray-500 truncate">{t.city}</div>
                  </button>
                ))}
              </div>
            </div>
          ) : (
            <div>
              {/* Trade builder header */}
              <div className="flex items-center justify-between mb-4">
                <button onClick={() => { setPartnerTeam(null); setPartnerOut([]); setTeamOut([]); setDraftPicks({ sending: [], receiving: [] }); }}
                  className="text-xs text-gray-500 hover:text-white transition-colors">← Change Partner</button>
                <div className="text-sm font-bold text-white">{config.name} <span className="text-gray-500">×</span> {partnerTeam.name}</div>
              </div>

              {/* Fairness meter */}
              {(teamOut.length > 0 || partnerOut.length > 0) && (() => {
                const sendPlayers = players.filter(p => teamOut.includes(p.name));
                const recvPlayers = partnerTeam.players?.filter(p => partnerOut.includes(p.name)) || [];
                const fairness = tradeFairness(sendPlayers, recvPlayers, draftPicks.sending, draftPicks.receiving);
                return (
                  <div className="glass rounded-xl p-4 mb-4">
                    <div className="flex items-center justify-between mb-2">
                      <span className="text-xs text-gray-400">Trade Fairness</span>
                      <span className={`text-sm font-black ${fairness.color}`}>{fairness.label}</span>
                    </div>
                    <div className="h-2 bg-gray-800 rounded-full overflow-hidden">
                      <div className="h-full rounded-full transition-all duration-500" style={{
                        width: `${fairness.pct}%`,
                        background: fairness.pct >= 55 ? '#22c55e' : fairness.pct >= 45 ? 'var(--team-secondary)' : fairness.pct >= 35 ? '#eab308' : '#ef4444'
                      }} />
                    </div>
                    <div className="flex justify-between text-[10px] text-gray-600 mt-1">
                      <span>Overpay</span><span>Fair</span><span>Steal</span>
                    </div>
                  </div>
                );
              })()}

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                {/* Your team sends */}
                <div className="glass rounded-xl p-4">
                  <h3 className="text-sm font-bold text-red-400 mb-3">{config.abbr} Sends</h3>
                  <div className="space-y-1.5 max-h-64 overflow-y-auto">
                    {players.map(p => (
                      <button key={p.name} onClick={() => togglePlayer(p.name, 'send')}
                        className={`w-full flex items-center gap-2 px-3 py-2 rounded-lg text-xs transition-all ${teamOut.includes(p.name) ? 'bg-red-500/15 border border-red-500/30 text-red-300' : 'bg-white/[0.02] text-gray-300 hover:bg-white/[0.04]'}`}>
                        {p.headshot && <img src={p.headshot} alt="" className="w-6 h-6 rounded-full object-cover shrink-0" loading="lazy" />}
                        <span className="font-bold flex-1 text-left truncate">{p.name}</span>
                        <span className="text-gray-500">{p.pos}</span>
                        <span className="text-gray-500">{p.stats.ppg}</span>
                      </button>
                    ))}
                  </div>
                  {/* Draft picks to send */}
                  <div className="mt-3 pt-2 border-t border-white/[0.04]">
                    <div className="text-[10px] text-gray-500 mb-1.5">Include draft picks:</div>
                    <div className="flex flex-wrap gap-1">
                      {['2027 1st', '2028 1st', '2029 1st', '2027 2nd'].map(pick => (
                        <button key={pick} onClick={() => togglePick(pick, 'sending')}
                          className={`text-[10px] px-2 py-1 rounded transition-all ${draftPicks.sending.includes(pick) ? 'bg-red-500/20 text-red-300 border border-red-500/30' : 'bg-white/[0.03] text-gray-500 hover:text-white'}`}>
                          {pick}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>

                {/* Partner sends */}
                <div className="glass rounded-xl p-4">
                  <h3 className="text-sm font-bold text-green-400 mb-3">{partnerTeam.abbr} Sends</h3>
                  <div className="space-y-1.5 max-h-64 overflow-y-auto">
                    {(partnerTeam.players || []).map(p => (
                      <button key={p.name} onClick={() => togglePlayer(p.name, 'receive')}
                        className={`w-full flex items-center gap-2 px-3 py-2 rounded-lg text-xs transition-all ${partnerOut.includes(p.name) ? 'bg-green-500/15 border border-green-500/30 text-green-300' : 'bg-white/[0.02] text-gray-300 hover:bg-white/[0.04]'}`}>
                        {p.headshot && <img src={p.headshot} alt="" className="w-6 h-6 rounded-full object-cover shrink-0" loading="lazy" />}
                        <span className="font-bold flex-1 text-left truncate">{p.name}</span>
                        <span className="text-gray-500">{p.pos}</span>
                        <span className="text-gray-500">{p.stats.ppg}</span>
                      </button>
                    ))}
                  </div>
                  {/* Draft picks to receive */}
                  <div className="mt-3 pt-2 border-t border-white/[0.04]">
                    <div className="text-[10px] text-gray-500 mb-1.5">Include draft picks:</div>
                    <div className="flex flex-wrap gap-1">
                      {['2027 1st', '2028 1st', '2029 1st', '2027 2nd'].map(pick => (
                        <button key={pick} onClick={() => togglePick(pick, 'receiving')}
                          className={`text-[10px] px-2 py-1 rounded transition-all ${draftPicks.receiving.includes(pick) ? 'bg-green-500/20 text-green-300 border border-green-500/30' : 'bg-white/[0.03] text-gray-500 hover:text-white'}`}>
                          {pick}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </div>

              {/* Execute */}
              <button onClick={executeTrade}
                disabled={teamOut.length === 0 && partnerOut.length === 0}
                className="w-full py-3 rounded-xl bg-team-secondary text-black font-bold text-sm hover:opacity-90 transition-all disabled:opacity-30 disabled:cursor-not-allowed">
                Execute Trade
              </button>
            </div>
          )}
        </div>
      )}

      {/* FEATURE 3: AI TRADE SUGGESTIONS — based on team needs */}
      {view === 'suggestions' && (
        <div className="animate-fade-in">
          <div className="text-center mb-6">
            <h3 className="text-lg font-black text-white">Trade <span className="text-team-secondary">Ideas</span></h3>
            <p className="text-xs text-gray-400 mt-1">Realistic trade scenarios based on {config.name} needs</p>
          </div>
          <div className="space-y-3">
            {generateSuggestions().map((s, i) => {
              const fairness = tradeFairness([s.send], [s.target], s.needPick ? ['2027 1st'] : [], []);
              const grade = tradeGrade(fairness, true);
              return (
                <div key={i} className="glass rounded-xl p-4">
                  <div className="flex items-center gap-2 mb-3">
                    <span className={`text-xs font-bold px-2 py-0.5 rounded ${s.need === 'Scoring' ? 'bg-red-500/15 text-red-400' : s.need === 'Playmaker' ? 'bg-blue-500/15 text-blue-400' : 'bg-yellow-500/15 text-yellow-400'}`}>
                      {s.need}
                    </span>
                    <span className={`text-sm font-black ${grade.color}`}>{grade.grade}</span>
                    <span className="text-xs text-gray-500 ml-auto">{s.partner.abbr}</span>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <div className="text-[10px] text-red-400 font-bold mb-1">{config.abbr} SENDS</div>
                      <div className="flex items-center gap-2">
                        {s.send.headshot && <img src={s.send.headshot} alt="" className="w-8 h-8 rounded-full object-cover" loading="lazy" />}
                        <div>
                          <div className="text-xs font-bold text-white">{s.send.name}</div>
                          <div className="text-[10px] text-gray-500">{s.send.pos} · {s.send.stats.ppg} PPG</div>
                        </div>
                      </div>
                      {s.needPick && <div className="text-[10px] text-gray-500 mt-1">+ 2027 1st Round Pick</div>}
                    </div>
                    <div>
                      <div className="text-[10px] text-green-400 font-bold mb-1">{config.abbr} RECEIVES</div>
                      <div className="flex items-center gap-2">
                        {s.target.headshot && <img src={s.target.headshot} alt="" className="w-8 h-8 rounded-full object-cover" loading="lazy" />}
                        <div>
                          <div className="text-xs font-bold text-white">{s.target.name}</div>
                          <div className="text-[10px] text-gray-500">{s.target.pos} · {s.target.stats.ppg} PPG</div>
                        </div>
                      </div>
                    </div>
                  </div>
                  <button onClick={() => {
                    setPartnerTeam(s.partner);
                    setTeamOut([s.send.name]);
                    setPartnerOut([s.target.name]);
                    setDraftPicks({ sending: s.needPick ? ['2027 1st'] : [], receiving: [] });
                    setView('builder');
                  }} className="mt-3 w-full py-2 rounded-lg text-xs font-bold bg-white/[0.04] text-gray-300 hover:bg-white/[0.08] hover:text-white transition-all">
                    Open in Trade Builder
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* FEATURE 4: PLAYER VALUATIONS — sortable value rankings */}
      {view === 'valuations' && (
        <div className="animate-fade-in">
          <div className="text-center mb-6">
            <h3 className="text-lg font-black text-white">Player <span className="text-team-secondary">Valuations</span></h3>
            <p className="text-xs text-gray-400 mt-1">Estimated trade value for every player on the roster</p>
          </div>
          <div className="glass rounded-2xl overflow-hidden">
            <div className="grid grid-cols-12 gap-2 px-4 py-2 border-b border-white/[0.06] text-[10px] text-gray-500 uppercase tracking-wider font-bold">
              <div className="col-span-4">Player</div>
              <div className="col-span-1 text-center">POS</div>
              <div className="col-span-1 text-center">PPG</div>
              <div className="col-span-1 text-center">RPG</div>
              <div className="col-span-1 text-center">APG</div>
              <div className="col-span-2 text-center">Role</div>
              <div className="col-span-2 text-center">Value</div>
            </div>
            {[...players].sort((a, b) => estimateValue(b) - estimateValue(a)).map(p => (
              <div key={p.name} className="grid grid-cols-12 gap-2 px-4 py-2.5 border-b border-white/[0.03] items-center hover:bg-white/[0.02]">
                <div className="col-span-4 flex items-center gap-2">
                  {p.headshot && <img src={p.headshot} alt="" className="w-7 h-7 rounded-full object-cover shrink-0" loading="lazy" />}
                  <span className="text-xs font-bold text-white truncate">{p.name}</span>
                </div>
                <div className="col-span-1 text-center text-xs text-gray-400">{p.pos}</div>
                <div className="col-span-1 text-center text-xs text-white font-bold">{p.stats.ppg}</div>
                <div className="col-span-1 text-center text-xs text-gray-300">{p.stats.rpg}</div>
                <div className="col-span-1 text-center text-xs text-gray-300">{p.stats.apg}</div>
                <div className="col-span-2 text-center">
                  <span className={`text-[10px] px-2 py-0.5 rounded ${p.starter ? 'bg-team-secondary/15 text-team-secondary' : 'bg-white/[0.04] text-gray-500'}`}>
                    {p.starter ? 'Starter' : 'Bench'}
                  </span>
                </div>
                <div className="col-span-2 text-center">
                  <div className="flex items-center justify-center gap-1">
                    <div className="w-16 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                      <div className="h-full bg-team-secondary rounded-full" style={{ width: `${Math.min(estimateValue(p), 100)}%` }} />
                    </div>
                    <span className="text-xs font-black text-team-secondary">{estimateValue(p)}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* FEATURE 5: TRADE HISTORY — saved trades with grades */}
      {view === 'history' && (
        <div className="animate-fade-in">
          <div className="text-center mb-6">
            <h3 className="text-lg font-black text-white">Trade <span className="text-team-secondary">History</span></h3>
            <p className="text-xs text-gray-400 mt-1">Your simulated trades this session</p>
          </div>
          {tradeHistory.length === 0 ? (
            <div className="glass rounded-2xl p-8 text-center">
              <p className="text-gray-500 text-sm mb-4">No trades yet. Build your first trade!</p>
              <button onClick={() => setView('builder')} className="px-6 py-2.5 rounded-xl bg-team-secondary text-black font-bold text-sm">
                Open Trade Builder
              </button>
            </div>
          ) : (
            <div className="space-y-3">
              {tradeHistory.map(t => (
                <div key={t.id}>
                  <div className={`glass rounded-xl p-4 cursor-pointer transition-all hover:bg-white/[0.03] ${expandedTrade === t.id ? 'border border-team-secondary/20' : ''}`}
                    onClick={() => setExpandedTrade(expandedTrade === t.id ? null : t.id)}>
                    <div className="flex items-center gap-3">
                      <span className={`text-xl font-black ${t.myReport?.gradeColor || t.grade?.color || 'text-gray-500'}`}>{t.myReport?.grade || t.grade?.grade || '?'}</span>
                      <div className="flex-1">
                        <div className="text-xs font-bold text-white">{config.abbr} ↔ {t.partner}</div>
                        <div className="text-[10px] text-gray-500">{t.date} · {t.fairness.label}</div>
                      </div>
                      <div className="flex items-center gap-1">
                        <div className="flex -space-x-2">
                          {t.received.slice(0, 2).map((p, i) => (
                            p.headshot ? <img key={i} src={p.headshot} alt="" className="w-6 h-6 rounded-full object-cover border border-gray-800" loading="lazy" /> : null
                          ))}
                        </div>
                        <span className="text-[10px] text-green-400 ml-1">+{t.received.map(p => p.ppg).reduce((a, b) => a + b, 0).toFixed(1)} PPG</span>
                      </div>
                    </div>
                  </div>
                  {expandedTrade === t.id && (
                    <div className="rounded-b-xl p-5 -mt-1 border-t border-white/[0.04] animate-fade-in" style={{ background: 'rgba(var(--team-primary-rgb),0.03)' }}>
                      {/* Trade details */}
                      <div className="grid grid-cols-2 gap-4 mb-4">
                        <div>
                          <div className="text-[10px] text-red-400 font-bold mb-2">{config.abbr} SENDS</div>
                          {t.sent.map((p, i) => (
                            <div key={i} className="flex items-center gap-2 mb-1.5">
                              {p.headshot && <img src={p.headshot} alt="" className="w-8 h-8 rounded-full object-cover" loading="lazy" />}
                              <div>
                                <div className="text-xs font-bold text-white">{p.name}</div>
                                <div className="text-[10px] text-gray-500">{p.pos} · {p.ppg} PPG · {p.rpg || 0} RPG · {p.apg || 0} APG</div>
                              </div>
                            </div>
                          ))}
                          {t.sentPicks.map((pick, i) => (
                            <div key={i} className="text-[10px] text-gray-400 mt-1">+ {pick}</div>
                          ))}
                        </div>
                        <div>
                          <div className="text-[10px] text-green-400 font-bold mb-2">{config.abbr} RECEIVES</div>
                          {t.received.map((p, i) => (
                            <div key={i} className="flex items-center gap-2 mb-1.5">
                              {p.headshot && <img src={p.headshot} alt="" className="w-8 h-8 rounded-full object-cover" loading="lazy" />}
                              <div>
                                <div className="text-xs font-bold text-white">{p.name}</div>
                                <div className="text-[10px] text-gray-500">{p.pos} · {p.ppg} PPG · {p.rpg || 0} RPG · {p.apg || 0} APG</div>
                              </div>
                            </div>
                          ))}
                          {t.receivedPicks.map((pick, i) => (
                            <div key={i} className="text-[10px] text-gray-400 mt-1">+ {pick}</div>
                          ))}
                        </div>
                      </div>

                      {/* Report Cards — both teams side by side */}
                      {t.myReport && t.theirReport && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 pt-4 border-t border-white/[0.06]">
                          {[t.myReport, t.theirReport].map((report, ri) => (
                            <div key={ri} className={`rounded-xl p-4 ${ri === 0 ? 'border border-team-secondary/20' : 'glass'}`} style={ri === 0 ? { background: 'rgba(var(--team-secondary-rgb),0.04)' } : {}}>
                              <div className="flex items-center justify-between mb-3">
                                <div className="text-xs font-black text-white">{report.teamAbbr} Report Card</div>
                                <div className={`text-2xl font-black ${report.gradeColor}`}>{report.grade}</div>
                              </div>
                              {/* Stat impact */}
                              <div className="grid grid-cols-3 gap-2 mb-3">
                                {[
                                  { label: 'PPG', val: report.ppgChange },
                                  { label: 'RPG', val: report.rpgChange },
                                  { label: 'APG', val: report.apgChange },
                                ].map((s, si) => (
                                  <div key={si} className="text-center glass rounded-lg p-1.5">
                                    <div className={`text-sm font-black ${s.val > 0 ? 'text-green-400' : s.val < 0 ? 'text-red-400' : 'text-gray-500'}`}>
                                      {s.val > 0 ? '+' : ''}{s.val.toFixed(1)}
                                    </div>
                                    <div className="text-[9px] text-gray-500">{s.label}</div>
                                  </div>
                                ))}
                              </div>
                              {/* Needs addressed */}
                              <div className="mb-2">
                                <div className="text-[10px] text-gray-500 mb-1">Team Needs:</div>
                                <div className="flex flex-wrap gap-1">
                                  {(report.needs || []).map((n, ni) => (
                                    <span key={ni} className={`text-[9px] px-1.5 py-0.5 rounded ${n.priority === 'high' ? 'bg-red-500/10 text-red-400' : n.priority === 'medium' ? 'bg-yellow-500/10 text-yellow-400' : 'bg-white/[0.04] text-gray-500'}`}>
                                      {n.type}
                                    </span>
                                  ))}
                                </div>
                              </div>
                              {report.fillsNeed && (
                                <div className="text-[10px] text-green-400 bg-green-500/10 rounded px-2 py-1 mt-1 text-center font-bold">Addresses a key need</div>
                              )}
                              {!report.fillsNeed && (
                                <div className="text-[10px] text-gray-500 bg-white/[0.02] rounded px-2 py-1 mt-1 text-center">Doesn't address primary needs</div>
                              )}
                            </div>
                          ))}
                        </div>
                      )}

                      {/* Fairness summary */}
                      <div className="flex items-center justify-between mt-3 pt-3 border-t border-white/[0.04]">
                        <span className={`text-xs font-bold ${t.fairness.color}`}>{t.fairness.label} ({t.fairness.pct}%)</span>
                        <div className="h-1.5 w-24 bg-gray-800 rounded-full overflow-hidden">
                          <div className="h-full rounded-full transition-all" style={{
                            width: `${t.fairness.pct}%`,
                            background: t.fairness.pct >= 55 ? '#22c55e' : t.fairness.pct >= 45 ? 'var(--team-secondary)' : '#ef4444'
                          }} />
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              ))}
              {tradeHistory.length > 0 && (
                <button onClick={() => { saveHistory([]); }} className="text-xs text-gray-600 hover:text-red-400 transition-colors mt-2">
                  Clear History
                </button>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ============================================================
// SECTION: INTERACTIVE DRAFT SIMULATOR (full experience)
// ============================================================
function InteractiveDraftSim() {
  const { config, teamData } = useTeam();
  const prospects = teamData.prospects;
  const lotteryTeams = teamData.lotteryTeams;

  // States
  const [phase, setPhase] = useState('setup'); // setup, lottery, picking, userPick, review
  const [lotteryOrder, setLotteryOrder] = useState([]);
  const [picks, setPicks] = useState([]);
  const [available, setAvailable] = useState([...prospects]);
  const [currentPick, setCurrentPick] = useState(1);
  const [teamPickNum, setTeamPickNum] = useState(4);
  const [userSelection, setUserSelection] = useState(null);
  const [expandedPick, setExpandedPick] = useState(null);
  const [showConfetti, setShowConfetti] = useState(false);
  const [lotteryRevealed, setLotteryRevealed] = useState(0);
  const [autoPlay, setAutoPlay] = useState(false);
  const [tradeUp, setTradeUp] = useState(false);
  const [compareMode, setCompareMode] = useState(null);

  const teamFullName = config.fullName.toUpperCase();
  const teamEntry = lotteryTeams.find(t => t.team.includes(config.name.toUpperCase()) || t.team.includes(config.abbr));
  const teamLotteryName = teamEntry?.team || teamFullName;

  // Draft grade based on prospect rank vs pick position
  function getDraftGrade(prospect, pickNum) {
    const value = prospect.rank - pickNum; // negative = reach, positive = steal
    if (value >= 5) return { grade: 'A+', label: 'Absolute Steal', color: 'text-green-400' };
    if (value >= 3) return { grade: 'A', label: 'Great Value', color: 'text-green-400' };
    if (value >= 1) return { grade: 'A-', label: 'Solid Pick', color: 'text-green-400' };
    if (value >= 0) return { grade: 'B+', label: 'Right on Board', color: 'text-team-secondary' };
    if (value >= -2) return { grade: 'B', label: 'Slight Reach', color: 'text-team-secondary' };
    if (value >= -4) return { grade: 'C+', label: 'Moderate Reach', color: 'text-yellow-400' };
    if (value >= -6) return { grade: 'C', label: 'Significant Reach', color: 'text-orange-400' };
    return { grade: 'D', label: 'Major Reach', color: 'text-red-400' };
  }

  // Generate team need analysis
  function getTeamNeeds(teamAbbr) {
    const tc = TEAM_CONFIGS[teamAbbr];
    if (!tc || !tc.players) return { needs: ['Best Player Available'], posNeeds: [] };
    const starters = tc.players.filter(p => p.starter);
    const posMap = {};
    starters.forEach(p => {
      const pos = p.pos.split('/')[0];
      posMap[pos] = (posMap[pos] || 0) + 1;
    });
    const needs = [];
    const posNeeds = [];
    if (!posMap['PG']) { needs.push('Primary ball-handler'); posNeeds.push('PG'); }
    if (!posMap['SG'] && !posMap['SF']) { needs.push('Wing scoring'); posNeeds.push('SG', 'SF'); }
    if (!posMap['PF'] && !posMap['C']) { needs.push('Frontcourt presence'); posNeeds.push('PF', 'C'); }
    // Check for scoring gaps
    const topScorer = starters.reduce((max, p) => p.stats.ppg > max ? p.stats.ppg : max, 0);
    if (topScorer < 20) needs.push('Go-to scorer');
    if (needs.length === 0) needs.push('Best Player Available');
    return { needs, posNeeds };
  }

  // AI pick logic — scores each prospect by value + team fit
  function aiPick(avail, teamAbbr, pickNum) {
    if (avail.length === 0) return null;
    const { posNeeds, needs } = getTeamNeeds(teamAbbr);
    const lotteryEntry = lotteryTeams.find(t => t.team.includes(teamAbbr));
    const teamNeedText = lotteryEntry?.need || '';

    // Score each available prospect for this team
    const scored = avail.slice(0, 8).map((p, idx) => {
      let score = 0;
      // BPA value: higher ranked = higher base score
      score += (25 - p.rank) * 2; // rank 1 = 48 pts, rank 10 = 30 pts
      // Board position bonus: don't fall too far from BPA
      score -= idx * 3; // penalty for reaching

      // Positional need match: +20 if fills a gap
      const playerPositions = p.pos.split('/');
      const fillsNeed = posNeeds.some(need => playerPositions.includes(need));
      if (fillsNeed) score += 20;

      // Lottery need keyword match (e.g., "Franchise player", "Wing help")
      if (teamNeedText) {
        if (teamNeedText.toLowerCase().includes('scorer') && p.stats.ppg >= 18) score += 10;
        if (teamNeedText.toLowerCase().includes('wing') && (playerPositions.includes('SF') || playerPositions.includes('SG'))) score += 10;
        if (teamNeedText.toLowerCase().includes('playmaker') && p.stats.apg >= 4) score += 8;
        if (teamNeedText.toLowerCase().includes('franchise') && p.rank <= 3) score += 15;
        if (teamNeedText.toLowerCase().includes('rim') && playerPositions.includes('C')) score += 10;
      }

      // Star power bonus for top picks
      if (pickNum <= 3 && p.stars >= 5) score += 10;

      // Small random variance for realism
      score += (Math.random() - 0.5) * 8;

      return { prospect: p, score };
    });

    scored.sort((a, b) => b.score - a.score);
    return scored[0].prospect;
  }

  // Start the lottery reveal
  function startLottery() {
    const lottery = simulateLottery(lotteryTeams);
    setLotteryOrder(lottery);
    const teamSlot = lottery.findIndex(t => t.team === teamLotteryName);
    setTeamPickNum(teamSlot >= 0 ? teamSlot + 1 : 7 + Math.floor(Math.random() * 8));
    setPhase('lottery');
    setLotteryRevealed(0);
    // Dramatic reveal: progressively slower — builds tension toward #1
    // Picks 14-10: 0.9s, Picks 9-5: 1.8s, Picks 4-2: 2.7s, Pick 1: 3.6s
    let i = 14;
    const reveal = () => {
      if (i <= 0) return;
      i--;
      setLotteryRevealed(14 - i);
      const delay = i === 0 ? 3600 : i <= 4 ? 2700 : i <= 9 ? 1800 : 900;
      setTimeout(reveal, delay);
    };
    setTimeout(reveal, 1000);
  }

  // Advance one pick
  function advancePick(avail, currentPicks, pickNum) {
    const team = lotteryOrder[pickNum - 1];
    if (!team) return;
    // Extract team abbreviation from lottery name
    const abbr = team.team.split(' ')[0];
    const picked = aiPick(avail, abbr, pickNum);
    if (!picked) return;

    const newAvail = avail.filter(p => p.rank !== picked.rank);
    const grade = getDraftGrade(picked, pickNum);
    const { needs: teamNeeds, posNeeds } = getTeamNeeds(abbr);
    const pickedPositions = picked.pos.split('/');
    const fillsNeed = posNeeds.some(n => pickedPositions.includes(n));
    const newPick = { ...team, pick: pickNum, player: picked, grade, abbr, teamNeeds, fillsNeed };
    const newPicks = [...currentPicks, newPick];

    setPicks(newPicks);
    setAvailable(newAvail);
    setCurrentPick(pickNum + 1);
    setExpandedPick(pickNum);

    // Auto-collapse after 2s if auto-play
    if (autoPlay) {
      setTimeout(() => setExpandedPick(null), 1500);
    }

    return { avail: newAvail, picks: newPicks };
  }

  // Start picking phase
  function startPicking() {
    setPhase('picking');
    setAvailable([...prospects]);
    setPicks([]);
    setCurrentPick(1);
  }

  // Handle next pick click (or auto-advance)
  function handleNextPick() {
    if (currentPick === teamPickNum) {
      setPhase('userPick');
      return;
    }
    advancePick(available, picks, currentPick);
  }

  // Auto-play effect
  useEffect(() => {
    if (!autoPlay || phase !== 'picking' || currentPick >= teamPickNum) return;
    const timer = setTimeout(handleNextPick, 2000);
    return () => clearTimeout(timer);
  }, [autoPlay, currentPick, phase]);

  const [showLineupBuilder, setShowLineupBuilder] = useState(false);
  const [continuingDraft, setContinuingDraft] = useState(false);
  const [showLotteryModal, setShowLotteryModal] = useState(false);

  // User makes their pick
  function makeUserPick(prospect) {
    const grade = getDraftGrade(prospect, teamPickNum);
    const pick = { team: teamLotteryName, pick: teamPickNum, player: prospect, grade };
    setPicks(prev => [...prev, pick]);
    setUserSelection(prospect);
    setAvailable(prev => prev.filter(p => p.rank !== prospect.rank));
    setCurrentPick(teamPickNum + 1);
    setShowConfetti(true);
    setPhase('review');
    setTimeout(() => setShowConfetti(false), 4000);
  }

  // Non-lottery teams for picks 15-30 (playoff teams, reverse seed order)
  const NON_LOTTERY_PICKS = [
    { team: 'POR Trail Blazers', need: 'Young wing scorer' },
    { team: 'TOR Raptors', need: 'Defensive wing' },
    { team: 'ATL Hawks', need: 'Post-Young rebuild' },
    { team: 'HOU Rockets', need: 'KD complement wing' },
    { team: 'PHI 76ers', need: 'Depth behind Maxey/Embiid' },
    { team: 'SAS Spurs', need: 'Fox/Wemby supporting cast' },
    { team: 'LAL Lakers', need: 'Luka/LeBron role player' },
    { team: 'MIN Timberwolves', need: 'Edwards complement' },
    { team: 'DEN Nuggets', need: 'Jokic/Murray wing help' },
    { team: 'NYK Knicks', need: 'Brunson/KAT depth' },
    { team: 'BOS Celtics', need: 'Tatum/Brown complement' },
    { team: 'CLE Cavaliers', need: 'Mitchell/Harden depth' },
    { team: 'ORL Magic', need: 'Banchero/Wagner help' },
    { team: 'DET Pistons', need: 'Cade wingman' },
    { team: 'MIA Heat', need: 'Culture wing' },
    { team: 'OKC Thunder', need: 'SGA supporting cast' },
  ];

  // Continue draft after user's pick — simulate through full first round
  function continueDraft() {
    setContinuingDraft(true);
    let a = [...available];
    let p = [...picks];
    let pick = currentPick;
    const maxPick = Math.min(30, prospects.length);
    const runNext = () => {
      if (pick > maxPick || a.length === 0) { setContinuingDraft(false); return; }
      const team = pick <= 14
        ? lotteryOrder[pick - 1]
        : { team: NON_LOTTERY_PICKS[pick - 15]?.team || `Pick #${pick}`, need: NON_LOTTERY_PICKS[pick - 15]?.need || 'Best available' };
      if (!team) { setContinuingDraft(false); return; }
      const abbr = team.team.split(' ')[0];
      const selected = aiPick(a, abbr, pick);
      if (!selected) { setContinuingDraft(false); return; }
      const grade = getDraftGrade(selected, pick);
      const { needs: teamNeeds, posNeeds } = getTeamNeeds(abbr);
      const fillsNeed = posNeeds.some(n => selected.pos.split('/').includes(n));
      a = a.filter(pr => pr.rank !== selected.rank);
      p = [...p, { ...team, pick, player: selected, grade, abbr, teamNeeds, fillsNeed }];
      setPicks([...p]);
      setAvailable([...a]);
      setCurrentPick(pick + 1);
      pick++;
      setTimeout(runNext, 600);
    };
    setTimeout(runNext, 500);
  }

  // Prospect comparison overlay
  function ProspectCompare({ a, b, onClose }) {
    const cats = Object.keys(a.radar);
    return (
      <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: 'rgba(0,0,0,0.85)' }} onClick={onClose}>
        <div className="w-full max-w-2xl glass rounded-2xl p-6 animate-fade-in" onClick={e => e.stopPropagation()}>
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-lg font-black text-white">Head to Head</h3>
            <button onClick={onClose} className="text-gray-500 hover:text-white text-xl">&times;</button>
          </div>
          <div className="grid grid-cols-3 gap-2 mb-4">
            <div className="text-center">
              <div className="font-bold text-team-secondary">{a.name}</div>
              <div className="text-[10px] text-gray-400">{a.pos} | {a.school}</div>
            </div>
            <div className="text-center text-xs text-gray-500 self-end pb-1">VS</div>
            <div className="text-center">
              <div className="font-bold text-white">{b.name}</div>
              <div className="text-[10px] text-gray-400">{b.pos} | {b.school}</div>
            </div>
          </div>
          {cats.map(cat => {
            const aVal = a.radar[cat]; const bVal = b.radar[cat];
            return (
              <div key={cat} className="flex items-center gap-2 mb-2">
                <div className="w-16 text-right text-xs text-gray-400">{cat}</div>
                <div className="flex-1 flex items-center gap-1">
                  <div className="flex-1 h-3 bg-gray-800 rounded-full overflow-hidden flex justify-end">
                    <div className="h-full rounded-full" style={{ width: `${aVal}%`, background: 'var(--team-secondary)' }} />
                  </div>
                  <span className={`text-xs font-bold w-7 text-right ${aVal > bVal ? 'text-team-secondary' : 'text-gray-500'}`}>{aVal}</span>
                </div>
                <div className="flex-1 flex items-center gap-1">
                  <span className={`text-xs font-bold w-7 ${bVal > aVal ? 'text-white' : 'text-gray-500'}`}>{bVal}</span>
                  <div className="flex-1 h-3 bg-gray-800 rounded-full overflow-hidden">
                    <div className="h-full rounded-full bg-white/30" style={{ width: `${bVal}%` }} />
                  </div>
                </div>
              </div>
            );
          })}
          <div className="grid grid-cols-3 gap-3 mt-4 pt-4 border-t border-white/[0.06]">
            {['ppg', 'rpg', 'apg'].map(k => (
              <div key={k} className="text-center">
                <div className="flex justify-around">
                  <span className={`text-sm font-black ${a.stats[k] > b.stats[k] ? 'text-team-secondary' : 'text-gray-400'}`}>{a.stats[k]}</span>
                  <span className={`text-sm font-black ${b.stats[k] > a.stats[k] ? 'text-white' : 'text-gray-400'}`}>{b.stats[k]}</span>
                </div>
                <div className="text-[9px] text-gray-500 uppercase">{k.toUpperCase()}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="max-w-4xl mx-auto px-4 py-8">
      {/* Confetti */}
      {showConfetti && (
        <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
          {Array.from({length: 30}, (_, i) => (
            <div key={i} className="absolute" style={{
              left: `${Math.random() * 100}%`, top: '-20px',
              width: 8 + Math.random() * 8, height: 8 + Math.random() * 8,
              borderRadius: Math.random() > 0.5 ? '50%' : '0',
              background: ['var(--team-secondary)', 'var(--team-primary)', 'var(--team-light)', '#fff', '#22c55e'][Math.floor(Math.random() * 5)],
              animation: `confetti ${1.5 + Math.random() * 2}s ${Math.random() * 0.5}s forwards`
            }} />
          ))}
        </div>
      )}

      {/* Compare overlay */}
      {compareMode && compareMode.length === 2 && (
        <ProspectCompare a={compareMode[0]} b={compareMode[1]} onClose={() => setCompareMode(null)} />
      )}

      {/* Header */}
      <div className="text-center mb-8">
        <h2 className="text-3xl md:text-4xl font-black text-white">2026 NBA <span className="text-team-secondary">Draft Simulator</span></h2>
        <p className="text-gray-400 text-sm mt-2">Step through every pick. Scout prospects. Make your selection.</p>
      </div>

      {/* PHASE: SETUP */}
      {phase === 'setup' && (
        <div className="glass rounded-2xl p-8 text-center animate-fade-in">
          <div className="text-6xl mb-4" style={{ filter: 'grayscale(0.3)' }}>&#127936;</div>
          <h3 className="text-xl font-black text-white mb-2">Ready to Run the Draft?</h3>
          <p className="text-gray-400 text-sm mb-6 max-w-md mx-auto">
            The lottery will determine draft order based on real odds. Then step through each pick — scout prospects, compare players, and make the call for the {config.fullName}.
          </p>
          <button onClick={startLottery}
            className="px-10 py-4 rounded-xl bg-team-secondary text-black font-black text-base hover:opacity-90 transition-all shadow-lg shadow-team-secondary/30 mb-2">
            Start Lottery
          </button>
          <div className="mt-6 max-w-lg mx-auto space-y-1">
            {lotteryTeams.map((t, i) => {
              const isTeam = t.team === teamLotteryName;
              return (
                <div key={i} className={`flex items-center gap-3 rounded-lg px-3 py-2 ${isTeam ? 'bg-team-secondary/15 border border-team-secondary/30' : 'bg-white/[0.02]'}`}>
                  <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black shrink-0 ${isTeam ? 'bg-team-secondary text-black' : 'bg-gray-800 text-gray-400'}`}>{i + 1}</div>
                  <div className="flex-1 min-w-0">
                    <div className={`text-xs font-bold truncate ${isTeam ? 'text-team-secondary' : 'text-gray-300'}`}>{t.team}</div>
                  </div>
                  <span className="text-[10px] text-gray-500 shrink-0">{t.record}</span>
                  <span className={`text-[10px] font-bold shrink-0 ${isTeam ? 'text-team-secondary' : 'text-gray-400'}`}>{t.odds}%</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* PHASE: LOTTERY REVEAL */}
      {phase === 'lottery' && (
        <div className="glass rounded-2xl p-6 animate-fade-in">
          <h3 className="text-lg font-black text-team-secondary text-center mb-2">Lottery Results</h3>
          <p className="text-center text-gray-500 text-xs mb-4">Revealing draft order...</p>
          <div className="max-w-lg mx-auto space-y-1.5">
            {lotteryOrder.slice(0, 14).map((t, i) => {
              const revealed = i >= (14 - lotteryRevealed);
              const isTeam = t.team === teamLotteryName;
              // Compare lottery result (i) to pre-draft odds position
              const preDraftIdx = lotteryTeams.findIndex(lt => lt.team === t.team);
              const movement = preDraftIdx >= 0 ? preDraftIdx - i : 0; // positive = moved up
              return (
                <div key={i} className={`flex items-center gap-3 rounded-xl px-4 py-2.5 transition-all duration-500 ${
                  revealed ? (isTeam ? 'bg-team-secondary/20 border border-team-secondary shadow-lg shadow-team-secondary/20' : 'glass') : 'bg-gray-900/30 border border-white/[0.03]'
                }`}>
                  <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-black shrink-0 ${
                    revealed ? (isTeam ? 'bg-team-secondary text-black' : 'bg-gray-700 text-white') : 'bg-gray-800 text-gray-700'
                  }`}>{i + 1}</div>
                  <div className="flex-1 min-w-0">
                    <div className={`text-sm font-bold truncate ${revealed ? (isTeam ? 'text-team-secondary' : 'text-white') : 'text-gray-800'}`}>
                      {revealed ? t.team : '???'}
                    </div>
                    {revealed && <div className="text-[10px] text-gray-500">{t.record} · {t.odds}% odds</div>}
                  </div>
                  {revealed && movement !== 0 && (
                    <div className={`flex items-center gap-0.5 shrink-0 text-[11px] font-black ${movement > 0 ? 'text-green-400' : 'text-red-400'}`}>
                      <span>{movement > 0 ? '▲' : '▼'}</span>
                      <span>{Math.abs(movement)}</span>
                    </div>
                  )}
                  {revealed && movement === 0 && (
                    <div className="text-[10px] text-gray-600 shrink-0">—</div>
                  )}
                  {revealed && <div className="text-[10px] text-gray-400 shrink-0 hidden sm:block">{t.need}</div>}
                </div>
              );
            })}
          </div>
          {lotteryRevealed >= 14 && (
            <div className="text-center mt-8 animate-fade-in">
              {teamPickNum === 1 && !showLotteryModal && (() => { setTimeout(() => setShowLotteryModal(true), 300); return null; })()}
              <div className="rounded-2xl p-6 mx-auto max-w-md" style={{
                background: 'linear-gradient(135deg, rgba(var(--team-secondary-rgb),0.1) 0%, rgba(var(--team-primary-rgb),0.15) 50%, rgba(var(--team-midnight-rgb),0.9) 100%)',
                border: '1px solid rgba(var(--team-secondary-rgb),0.3)',
                boxShadow: '0 0 20px rgba(var(--team-secondary-rgb),0.15)'
              }}>
                <div className="text-xs text-gray-400 uppercase tracking-widest mb-1">Your Pick</div>
                <div className="text-team-secondary font-black text-2xl mb-1">#{teamPickNum} Overall</div>
                <div className="text-sm text-gray-300 mb-4">{config.fullName}</div>
                <button onClick={startPicking}
                  className="w-full py-4 rounded-xl bg-team-secondary text-black font-black text-base hover:opacity-90 transition-all shadow-lg shadow-team-secondary/30">
                  Start the Draft
                </button>
              </div>
            </div>
          )}

          {/* Lottery Win Modal */}
          {showLotteryModal && teamPickNum === 1 && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: 'rgba(0,0,0,0.8)' }}>
              <div className="w-full max-w-lg rounded-2xl relative overflow-hidden animate-fade-in" style={{
                background: 'linear-gradient(135deg, rgba(var(--team-secondary-rgb),0.15) 0%, rgba(var(--team-primary-rgb),0.25) 40%, rgba(var(--team-midnight-rgb),0.98) 100%)',
                border: '2px solid var(--team-secondary)',
                boxShadow: '0 0 60px rgba(var(--team-secondary-rgb),0.3), 0 0 120px rgba(var(--team-secondary-rgb),0.1)'
              }}>
                <div className="absolute top-0 left-0 right-0 h-1" style={{ background: 'linear-gradient(90deg, transparent, var(--team-secondary), transparent)', animation: 'shimmer 2s infinite' }} />
                <div className="p-8 text-center">
                  <div className="text-6xl mb-4">&#127942;</div>
                  <div className="text-xs text-team-secondary font-bold uppercase tracking-[0.3em] mb-2">Draft Lottery</div>
                  <h2 className="text-3xl font-black text-white mb-1">THE #1 PICK!</h2>
                  <p className="text-lg text-team-secondary font-bold mb-4">{config.fullName}</p>
                  <p className="text-sm text-gray-300 leading-relaxed mb-6 max-w-sm mx-auto">
                    The {config.name} have won the draft lottery and will have the first overall pick in the 2026 NBA Draft. Every top prospect is on the board.
                  </p>
                  <div className="grid grid-cols-3 gap-3 mb-6">
                    {prospects.slice(0, 3).map((p, i) => (
                      <div key={i} className="glass rounded-xl p-3 text-center">
                        <div className="text-lg font-black text-team-secondary">{p.name.split(' ').pop()}</div>
                        <div className="text-[10px] text-gray-400">{p.pos} | {p.school}</div>
                        <div className="text-[10px] text-gray-500 mt-1">{p.stats.ppg} PPG</div>
                      </div>
                    ))}
                  </div>
                  <button onClick={() => { setShowLotteryModal(false); startPicking(); }}
                    className="px-8 py-3 rounded-xl bg-team-secondary text-black font-bold text-sm hover:opacity-90 transition-all">
                    Start the Draft
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* PHASE: PICKING (step-through) */}
      {phase === 'picking' && (
        <div className="animate-fade-in">
          {/* Progress bar */}
          <div className="flex items-center gap-3 mb-6">
            <div className="flex-1 h-2 bg-gray-800 rounded-full overflow-hidden">
              <div className="h-full bg-team-secondary rounded-full transition-all duration-500" style={{ width: `${(currentPick / teamPickNum) * 100}%` }} />
            </div>
            <span className="text-xs text-gray-400 shrink-0">Pick {currentPick} of {teamPickNum}</span>
            <button onClick={() => setAutoPlay(!autoPlay)}
              className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all shrink-0 ${autoPlay ? 'bg-team-secondary text-black' : 'glass text-gray-400 hover:text-white'}`}>
              {autoPlay ? 'Auto' : 'Auto-Play'}
            </button>
          </div>

          {/* Completed picks */}
          <div className="space-y-2">
            {picks.map((p, i) => {
              const value = p.player.rank - p.pick;
              const valueLabel = value >= 3 ? 'Steal' : value >= 0 ? 'Fair Value' : value >= -3 ? 'Slight Reach' : 'Reach';

function DraftSimulator() {
  const { config, teamData } = useTeam();
  const prospects = teamData.prospects;
  const lotteryTeams = teamData.lotteryTeams;
  const [simState, setSimState] = useState('idle');
  const [lotteryOrder, setLotteryOrder] = useState([]);
  const [picks, setPicks] = useState([]);
  const [available, setAvailable] = useState([...prospects]);
  const [teamOptions, setTeamOptions] = useState([]);
  const [teamPickNum, setTeamPickNum] = useState(4);
  const [userPick, setUserPick] = useState(null);
  const [showConfetti, setShowConfetti] = useState(false);

  const teamFullName = config.fullName.toUpperCase();
  const teamLotteryEntry = lotteryTeams.find(t => t.team.includes(config.name.toUpperCase()) || t.team.includes(config.abbr));
  const teamLotteryName = teamLotteryEntry?.team || teamFullName;
  const isInLottery = !!teamLotteryEntry;

  // Auto-start simulation on mount
  useEffect(() => { startSim(); }, []);

  const startSim = () => {
    const lottery = simulateLottery(lotteryTeams);
    let teamPick;
    if (isInLottery) {
      const teamSlot = lottery.findIndex(t => t.team === teamLotteryName);
      teamPick = teamSlot >= 0 ? teamSlot + 1 : 7;
    } else {
      // Team not in lottery — give them a random mid-range pick for fun
      teamPick = 7 + Math.floor(Math.random() * 8);
    }

    setLotteryOrder(lottery);
    setTeamPickNum(teamPick);
    setSimState('lottery');
    setPicks([]);
    setAvailable([...prospects]);
    setUserPick(null);

    // Show lottery results for 3s then start picks
    setTimeout(() => {
      setSimState('simulating');
      simulatePicks([...prospects], [], 1, lottery, teamPick);
    }, 3000);
  };

  const simulatePicks = (avail, currentPicks, pickNum, lottery, teamPick) => {
    if (pickNum >= teamPick) {
      const top3 = avail.slice(0, 3);
      setTeamOptions(top3);
      setAvailable(avail);
      setPicks(currentPicks);
      setSimState('picking');
      return;
    }

    setTimeout(() => {
      const team = lottery[pickNum - 1] || { team: `Pick #${pickNum}`, record: '', odds: 0, need: '' };
      // Add some randomness to team picks — sometimes they don't take BPA
      let pickIdx = 0;
      if (Math.random() < 0.25 && avail.length > 2) {
        // 25% chance team reaches for a need-based pick (take #2 or #3 instead of #1)
        pickIdx = Math.floor(Math.random() * Math.min(3, avail.length));
      }
      const picked = avail[pickIdx];
      const newAvail = [...avail]; newAvail.splice(pickIdx, 1);
      const newPicks = [...currentPicks, { ...team, player: picked }];
      setPicks(newPicks);
      setAvailable(newAvail);
      simulatePicks(newAvail, newPicks, pickNum + 1, lottery, teamPick);
    }, 700);
  };

  const makeJazzPick = (prospect) => {
    setUserPick(prospect);
    setShowConfetti(true);
    setSimState('done');
    setTimeout(() => setShowConfetti(false), 3000);
  };

  return (
    <div className="max-w-4xl mx-auto">
      {simState === 'idle' && (
        <div className="text-center py-8">
          <div className="text-team-secondary font-bold animate-pulse">Starting lottery simulation...</div>
        </div>
      )}

      {simState === 'lottery' && (
        <div className="glass rounded-2xl p-6 animate-fade-in">
          <h3 className="text-lg font-bold text-team-secondary text-center mb-4">Lottery Results</h3>
          <p className="text-center text-gray-400 text-sm mb-4">The ping pong balls have spoken...</p>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
            {lotteryOrder.slice(0, 14).map((t, i) => (
              <div key={i} className={`rounded-lg p-2 text-center text-sm ${t.team === teamLotteryName ? 'bg-team-secondary/20 border border-team-secondary/50' : 'glass'}`}>
                <div className="font-black text-team-secondary">#{i + 1}</div>
                <div className={`text-xs font-semibold ${t.team === teamLotteryName ? 'text-team-secondary' : 'text-gray-300'}`}>{t.team}</div>
              </div>
            ))}
          </div>
          <div className="text-center mt-4">
            <div className="text-team-secondary font-bold">{config.name} pick at #{teamPickNum}</div>
            <div className="text-gray-500 text-xs animate-pulse mt-2">Simulating picks...</div>
          </div>
        </div>
      )}

      {(simState === 'simulating' || simState === 'picking' || simState === 'done') && (
        <div className="glass rounded-2xl p-6">
          {/* Lottery result summary */}
          <div className="flex items-center justify-between mb-4 pb-3 border-b border-team-primary/30">
            <span className="text-xs text-gray-500">{config.name} lottery position: <span className="text-team-secondary font-bold">#{teamPickNum}</span></span>
            <span className="text-xs text-gray-600">{teamPickNum <= 4 ? 'Lottery winner!' : teamPickNum <= 7 ? 'Solid range' : 'Fell in the draft'}</span>

function AIChatScout() {
  const { config, teamData } = useTeam();
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [apiKey, setApiKey] = useState('');
  const chatRef = useRef(null);

  const coreStr = teamData.players.filter(p => p.starter).map(p => `${p.name} (#${p.number}, ${p.pos})`).join(', ');
  const systemPrompt = `You are the ${config.fullName}'s expert AI scout for the 2026-27 season. The ${config.name}'s core is ${coreStr}. Head coach: ${config.coach}. GM: ${config.gm}. Arena: ${config.arena}. The 2026 draft's top prospects are Dybantsa, Peterson, and Boozer. Be confident, use analytics lingo. Keep answers concise (2-3 paragraphs max).`;

  const sendMessage = async () => {
    if (!input.trim()) return;
    const userMsg = { role: 'user', content: input };
    const newMessages = [...messages, userMsg].slice(-12);
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setLoading(true);

    const key = apiKey || prompt('Enter your Anthropic API key:');
    if (key && !apiKey) setApiKey(key);

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: systemPrompt,
          messages: newMessages.map(m => ({ role: m.role, content: m.content }))
        })
      });
      const data = await resp.json();
      const assistantMsg = { role: 'assistant', content: data.content?.[0]?.text || 'I had trouble generating a response. Try again!' };
      setMessages(prev => [...prev, assistantMsg]);
    } catch (e) {
      setMessages(prev => [...prev, { role: 'assistant', content: 'Enter a valid Anthropic API key to chat with the Jazz AI Scout.' }]);
    }
    setLoading(false);
  };

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages]);

  return (
    <>
      {/* Floating Button */}
      <button onClick={() => setOpen(!open)}
        className="fixed bottom-6 right-6 z-40 w-14 h-14 rounded-full bg-team-secondary text-black flex items-center justify-center text-xl font-bold shadow-lg pulse-secondary hover:scale-110 transition-transform">
        {open ? '✕' : '🤖'}
      </button>

      {/* Chat Panel */}
      {open && (
        <div className="fixed bottom-24 right-6 z-40 w-96 max-w-[90vw] bg-team-midnight border border-team-primary rounded-2xl shadow-2xl animate-fade-in overflow-hidden">
          <div className="bg-team-primary/30 p-4 border-b border-team-primary">
            <h3 className="font-bold text-team-secondary">Ask the Scout 🤖</h3>
            <p className="text-xs text-gray-400">AI-powered Jazz analysis</p>
          </div>

          <div ref={chatRef} className="h-80 overflow-y-auto p-4 space-y-3">
            {messages.length === 0 && (
              <div className="text-center text-gray-500 text-sm py-8">
                Ask about the roster, draft prospects, trades, or strategy!
              </div>
            )}
            {messages.map((m, i) => (
              <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[80%] rounded-xl px-3 py-2 text-sm ${m.role === 'user' ? 'bg-team-secondary text-black' : 'glass text-gray-200'}`}>
                  {m.content}
                </div>
              </div>
            ))}
            {loading && (
              <div className="flex justify-start">
                <div className="glass rounded-xl px-4 py-2 text-sm text-gray-400 animate-pulse">Scouting...</div>
              </div>
            )}
          </div>

          <div className="p-3 border-t border-team-primary flex gap-2">
            <input value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && sendMessage()}
              placeholder="Ask about your team..."
              className="flex-1 bg-gray-900/50 border border-team-primary rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-team-secondary" />
            <button onClick={sendMessage} disabled={loading}
              className="px-4 py-2 rounded-lg bg-team-secondary text-black font-bold text-sm hover:bg-yellow-400 disabled:opacity-40">
              Send
            </button>
          </div>
        </div>
      )}
    </>
  );
}
