    prospects: getTeamData(config, 'prospects'),
    pollQuestions: getTeamData(config, 'pollQuestions'),
    lotteryTeams: getTeamData(config, 'lotteryTeams'),
  }), [selectedTeam]);

  const switchTeam = useCallback((abbr) => {
    setSelectedTeam(abbr);
    localStorage.setItem('nbavault_selected_team', abbr);
    if (activeTab !== 'LANDING' && activeTab !== 'PICKS') {
      applyTeamColors(TEAM_CONFIGS[abbr].colors);
    }
    document.title = `${TEAM_CONFIGS[abbr].fullName} | NBA Vault`;
  }, [activeTab]);

  // Apply Vault brand theme on Picks + Landing, team theme elsewhere
  useEffect(() => {
    if (activeTab === 'PICKS' || activeTab === 'LANDING') {
      applyTeamColors(VAULT_COLORS);
      document.title = activeTab === 'LANDING' ? 'NBA Betting Edges | NBA Vault' : `${VAULT.signals} | ${VAULT.brand}`;
    } else {
      applyTeamColors(config.colors);
      document.title = `${config.fullName} | NBA Vault`;
    }
  }, [activeTab, selectedTeam]);

  const ctxValue = useMemo(() => ({ config, teamData, switchTeam }), [selectedTeam]);

  const westTeams = Object.values(TEAM_CONFIGS).filter(t => t.conference === 'West').sort((a, b) => a.fullName.localeCompare(b.fullName));
  const eastTeams = Object.values(TEAM_CONFIGS).filter(t => t.conference === 'East').sort((a, b) => a.fullName.localeCompare(b.fullName));

  const handleWelcomeSelect = useCallback((abbr) => {
    switchTeam(abbr);
    setShowWelcome(false);
  }, [switchTeam]);

  return (
    <TeamContext.Provider value={ctxValue}>
    {showWelcome && <WelcomeModal onSelect={handleWelcomeSelect} />}
    <div className="min-h-screen">
      {/* Header — hidden on landing page */}
      {activeTab !== 'LANDING' && (
      <header className="relative overflow-hidden" style={{ background: 'linear-gradient(180deg, var(--team-deep), var(--team-midnight))' }}>
        <Particles />
        <HeroBg />
        <div className="relative z-10 text-center py-8 px-4">
          {/* Logo area — same height (80px) on all tabs */}
          <div className="w-20 h-20 mx-auto mb-3 flex items-center justify-center">
            {activeTab === 'PICKS' ? (
              <div className="flex flex-col items-center gap-1 cursor-pointer select-none" onClick={handleVaultLogoClick}>
                <svg className="w-12 h-12" viewBox="0 0 48 48" fill="none">
                  {/* Vault door body */}
                  <rect x="6" y="6" width="36" height="36" rx="4" stroke="var(--team-secondary)" strokeWidth="2.5" fill="none" opacity="0.85" />
                  <rect x="10" y="10" width="28" height="28" rx="2" stroke="var(--team-secondary)" strokeWidth="1.5" fill="none" opacity="0.3" />
                  {/* Hinges */}
                  <rect x="3" y="14" width="5" height="4" rx="1" fill="var(--team-secondary)" opacity="0.4" />
                  <rect x="3" y="22" width="5" height="4" rx="1" fill="var(--team-secondary)" opacity="0.4" />
                  <rect x="3" y="30" width="5" height="4" rx="1" fill="var(--team-secondary)" opacity="0.4" />
                  {/* Center dial */}
                  <circle cx="26" cy="24" r="7" stroke="var(--team-secondary)" strokeWidth="2" fill="none" opacity="0.8" />
                  <circle cx="26" cy="24" r="3" stroke="var(--team-secondary)" strokeWidth="1.5" fill="none" opacity="0.5" />
                  {/* Dial spokes */}
                  <line x1="26" y1="17" x2="26" y2="13" stroke="var(--team-secondary)" strokeWidth="1.5" opacity="0.5" />
                  <line x1="26" y1="31" x2="26" y2="35" stroke="var(--team-secondary)" strokeWidth="1.5" opacity="0.5" />
                  <line x1="19" y1="24" x2="15" y2="24" stroke="var(--team-secondary)" strokeWidth="1.5" opacity="0.5" />
                  <line x1="33" y1="24" x2="37" y2="24" stroke="var(--team-secondary)" strokeWidth="1.5" opacity="0.5" />
                  {/* Diagonal spokes */}
                  <line x1="21.1" y1="19.1" x2="18.2" y2="16.2" stroke="var(--team-secondary)" strokeWidth="1.2" opacity="0.35" />
                  <line x1="30.9" y1="19.1" x2="33.8" y2="16.2" stroke="var(--team-secondary)" strokeWidth="1.2" opacity="0.35" />
                  <line x1="21.1" y1="28.9" x2="18.2" y2="31.8" stroke="var(--team-secondary)" strokeWidth="1.2" opacity="0.35" />
                  <line x1="30.9" y1="28.9" x2="33.8" y2="31.8" stroke="var(--team-secondary)" strokeWidth="1.2" opacity="0.35" />
                </svg>
                <span className="text-[10px] font-bold text-team-secondary tracking-[0.2em] uppercase">NBA Vault</span>
              </div>
            ) : config.franchiseId ? (
              <img src={`https://cdn.nba.com/logos/nba/${config.franchiseId}/primary/L/logo.svg`}
                alt={`${config.fullName} logo`} className="w-20 h-20 drop-shadow-lg" loading="lazy" />
            ) : null}
          </div>
          <h1 className="text-4xl md:text-5xl font-black tracking-tight">
            {activeTab === 'PICKS' ? (
              <><span className="text-team-secondary">VAULT</span> <span className="text-white">SIGNALS</span></>
            ) : (
              <><span className="text-team-secondary">{config.city.toUpperCase()}</span> <span className="text-white">{config.name.toUpperCase()}</span></>
            )}
          </h1>
          <p className="text-xs md:text-sm text-gray-400 tracking-widest mt-1">
            {activeTab === 'PICKS' ? VAULT.picksSub : '2026-27 \u2022 NBA VAULT'}
          </p>
        </div>
      </header>
      )}

      {/* Sticky Navigation — hidden on landing page */}
      {activeTab !== 'LANDING' && (
      <nav className="sticky top-0 z-30 border-b border-team-primary/30" style={{ background: 'rgba(var(--team-deep-rgb),0.95)', backdropFilter: 'blur(12px)' }}>
        <div className="overflow-x-auto scrollbar-hide">
          <div className="flex items-center justify-center gap-1 py-2.5 px-3 min-w-max mx-auto">
            {/* Team selector — logo that triggers dropdown */}
            <div className="relative shrink-0">
              <img src={`https://cdn.nba.com/logos/nba/${config.franchiseId}/primary/L/logo.svg`}
                alt={config.abbr}
                className="w-7 h-7 rounded-full cursor-pointer hover:scale-110 transition-transform duration-200"
                style={{ filter: 'drop-shadow(0 0 4px rgba(var(--team-secondary-rgb),0.4))' }}
                onClick={() => document.getElementById('team-select-nav').click()}
              />
              <select id="team-select-nav" value={selectedTeam} onChange={e => switchTeam(e.target.value)}
                className="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                <optgroup label="Western Conference">
                  {westTeams.map(t => <option key={t.abbr} value={t.abbr}>{t.fullName}</option>)}
                </optgroup>
                <optgroup label="Eastern Conference">
                  {eastTeams.map(t => <option key={t.abbr} value={t.abbr}>{t.fullName}</option>)}
                </optgroup>
              </select>
            </div>
            <span className="text-gray-700 mx-0.5">|</span>
            {/* Nav tabs */}
            {tabs.filter(t => t !== 'PICKS').map(tab => (
              <button key={tab} onClick={() => navigateTo(tab)}
                className={`px-3 py-1.5 rounded-full text-xs font-semibold transition-all duration-300 whitespace-nowrap ${
                  activeTab === tab
                    ? 'bg-team-secondary text-black shadow-lg shadow-team-secondary/20'
                    : 'text-gray-400 hover:text-white hover:bg-team-primary/30'
                }`}>
                {tab}
              </button>
            ))}
            <button onClick={() => navigateTo('PICKS')}
              className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all duration-300 whitespace-nowrap backdrop-blur-sm ${
                activeTab === 'PICKS'
                  ? 'bg-team-secondary text-black shadow-lg shadow-team-secondary/20'
                  : 'text-white bg-white/[0.08] border border-white/[0.15] hover:bg-white/[0.14] hover:border-white/[0.25]'
              }`}>
              VAULT
            </button>
          </div>
        </div>
      </nav>
      )}

      {/* Content */}
      <main>
        {activeTab === 'ROSTER' && <RosterSection />}
        {activeTab === 'DRAFT' && <DraftRoom />}
        {/* FanMap is embedded in the Poll page */}
        {activeTab === 'POLL' && <FanPoll />}
        {activeTab === 'SIM' && <InteractiveDraftSim />}
        {activeTab === 'TRADE' && <TradeCenter />}
        {activeTab === 'PICKS' && <DailyPicks />}
        {/* Trades + Lineups are embedded in Roster page */}
        {activeTab === 'WIKI' && <WikiPage />}
        {activeTab === 'FAQ' && <FAQPage />}
        {activeTab === 'LANDING' && <LandingPage />}
      </main>

      {/* Footer */}
      <footer className="mt-12 border-t border-white/[0.06] pt-8 pb-6 px-4">
        <div className="max-w-4xl mx-auto">
          <div className="flex flex-col md:flex-row md:items-start md:justify-between gap-6">
            <div className="flex items-center gap-3">
              <svg className="w-7 h-7 shrink-0" viewBox="0 0 48 48" fill="none">
                <rect x="6" y="6" width="36" height="36" rx="4" stroke="var(--team-secondary)" strokeWidth="2" fill="none" opacity="0.5" />
                <rect x="10" y="10" width="28" height="28" rx="2" stroke="var(--team-secondary)" strokeWidth="1" fill="none" opacity="0.2" />
                <rect x="3" y="14" width="5" height="4" rx="1" fill="var(--team-secondary)" opacity="0.25" />
                <rect x="3" y="22" width="5" height="4" rx="1" fill="var(--team-secondary)" opacity="0.25" />
                <rect x="3" y="30" width="5" height="4" rx="1" fill="var(--team-secondary)" opacity="0.25" />
                <circle cx="26" cy="24" r="7" stroke="var(--team-secondary)" strokeWidth="1.5" fill="none" opacity="0.4" />
                <circle cx="26" cy="24" r="3" stroke="var(--team-secondary)" strokeWidth="1" fill="none" opacity="0.3" />
                <line x1="26" y1="17" x2="26" y2="13" stroke="var(--team-secondary)" strokeWidth="1" opacity="0.3" />
                <line x1="26" y1="31" x2="26" y2="35" stroke="var(--team-secondary)" strokeWidth="1" opacity="0.3" />
                <line x1="19" y1="24" x2="15" y2="24" stroke="var(--team-secondary)" strokeWidth="1" opacity="0.3" />
                <line x1="33" y1="24" x2="37" y2="24" stroke="var(--team-secondary)" strokeWidth="1" opacity="0.3" />
              </svg>
              <div>
                <span className="text-sm font-bold text-white">{VAULT.brand}</span>
                <p className="text-[10px] text-gray-500">{VAULT.tagline}</p>
              </div>
            </div>
            <div className="flex gap-6 text-xs">
              <button onClick={() => navigateTo('PICKS')} className="text-gray-400 hover:text-team-secondary transition-colors">{VAULT.signals}</button>
              <button onClick={() => navigateTo('WIKI')} className="text-gray-400 hover:text-team-secondary transition-colors">Wiki</button>
              <button onClick={() => navigateTo('FAQ')} className="text-gray-400 hover:text-team-secondary transition-colors">FAQ</button>
            </div>
          </div>
          <div className="mt-6 pt-4 border-t border-white/[0.04] text-center">
            <p className="text-gray-600 text-[10px]">&copy; {new Date().getFullYear()} {VAULT.brand}. Not affiliated with the NBA. For entertainment purposes only. Please bet responsibly.</p>
          </div>
        </div>
      </footer>

      {/* AI Chat Scout - disabled for now */}
      {/* <AIChatScout /> */}
    </div>
    </TeamContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
