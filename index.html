// Simulate lottery using weighted random selection
function simulateLottery(lotteryTeams) {
  const teams = lotteryTeams.map(t => ({ ...t }));
  const lotteryResult = [];

  // Top 4 picks determined by lottery balls
  for (let pick = 0; pick < 4; pick++) {
    const totalOdds = teams.reduce((s, t) => s + t.odds, 0);
    let rand = Math.random() * totalOdds;
    let selected = teams[0];
    for (const t of teams) {
      rand -= t.odds;
      if (rand <= 0) { selected = t; break; }
    }
    lotteryResult.push({ ...selected, pick: pick + 1 });
    const idx = teams.findIndex(t => t.team === selected.team);
    teams.splice(idx, 1);
  }

  // Picks 5-14 go in reverse-record order
  teams.forEach((t, i) => {
    lotteryResult.push({ ...t, pick: 5 + i });
  });

  return lotteryResult;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `${r}, ${g}, ${b}`;
}

function applyTeamColors(colors) {
  const root = document.documentElement.style;
  root.setProperty('--team-primary', colors.primary);
  root.setProperty('--team-secondary', colors.secondary);
  root.setProperty('--team-midnight', colors.midnight);
  root.setProperty('--team-deep', colors.deep);
  root.setProperty('--team-light', colors.light);
  root.setProperty('--team-black', colors.black);
  root.setProperty('--team-primary-rgb', hexToRgb(colors.primary));
  root.setProperty('--team-secondary-rgb', hexToRgb(colors.secondary));
  root.setProperty('--team-midnight-rgb', hexToRgb(colors.midnight));
  root.setProperty('--team-deep-rgb', hexToRgb(colors.deep));
  root.setProperty('--team-light-rgb', hexToRgb(colors.light));
}

function getTeamData(config, field) {
  if (field === 'prospects') {
    if (config.prospects) {
      const needs = { ATL:['PG','C'], BOS:['PF','C'], BKN:['PG','SF'], CHA:['C','PF'], CHI:['SG','SF'],
        CLE:['SF','PF'], DAL:['PG','SF'], DEN:['SG','PF'], DET:['SG','SF'], GSW:['SF','SG'],
        HOU:['SG','SF'], IND:['C','SF'], LAC:['SG','PF'], LAL:['PG','C'], MEM:['SG','PF'],
        MIA:['PG','PF'], MIL:['PG','SF'], MIN:['PG','SF'], NOP:['SG','C'], NYK:['PG','PF'],
        OKC:['SF','PF'], ORL:['PG','SG'], PHI:['SF','C'], PHX:['PG','C'], POR:['SG','PF'],
        SAC:['PG','SF'], SAS:['SG','SF'], TOR:['C','PG'], UTA:['SG','SF'], WAS:['PG','C'] };
      const teamNeeds = needs[config.abbr] || ['SF','PG'];
      return config.prospects.map(p => {
        if (config.abbr === 'UTA') return { ...p, teamFit: p.jazzFit || 5, teamFitAnalysis: p.jazzFitAnalysis || '' };
        const posMatch = teamNeeds.some(n => (p.pos || '').includes(n));
        const baseFit = posMatch ? 7 : 4;
        const fit = Math.min(10, Math.max(3, baseFit + ((p.rank * 7 + config.abbr.charCodeAt(0)) % 5) - 2));
        const fitText = fit >= 8 ? `${p.name} is an excellent fit for the ${config.fullName}. His skill set addresses key roster needs and he would contribute immediately.`
          : fit >= 6 ? `${p.name} could develop into a solid contributor for the ${config.fullName}. The fit is decent but the team may have higher priorities.`
          : `The fit with the ${config.fullName} is limited. ${p.name}'s skill set overlaps with existing roster pieces.`;
        return { ...p, teamFit: fit, teamFitAnalysis: fitText };
      });
    }
    return generateStubProspects(config);
  }
  if (config[field]) return config[field];
  switch (field) {
    case 'players': return generateStubRoster(config);
    case 'pollQuestions': return generatePollQuestions(config);
    case 'lotteryTeams': return JAZZ_LOTTERY_TEAMS;
    default: return null;
  }
}

// Runtime data generators for stripped fields (saves ~350KB)
const MONTHS = ['Oct','Nov','Dec','Jan','Feb','Mar','Apr'];
function genStreak(name) {
  const opps = ['LAL','BOS','GSW','PHX','NYK','MIA','DEN','CHI','OKC','CLE'];
  const results = ['hot','avg','cold'];
  let h = 0; for (let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
  return Array.from({length:10}, (_,i) => {
    const s = Math.abs(h * (i+1) * 2654435761);
    return { result: results[s % 3], opp: opps[(s>>4) % 10], pts: 5 + (s>>8) % 25, reb: 1 + (s>>12) % 8, ast: (s>>16) % 7, win: (s>>20) % 2 === 0 };
  });
}
function genZones(pos) {
  const isGuard = pos.includes('PG') || pos.includes('SG');
  const isBig = pos.includes('C') || pos.includes('PF');
  return { Rim: isBig ? 35 : 25, Midrange: isGuard ? 28 : 20, Three: isGuard ? 30 : 18, FreeThrow: 17 };
}
function getMonthly(player) {
  const m = player.monthly;
  if (!m || m.length === 0) return [];
  if (typeof m[0] === 'object') return m;
  return m.map((ppg, i) => ({ month: MONTHS[i], ppg }));
}
function getStreak(player) { return player.streak || genStreak(player.name); }
function getZones(player) { return player.zones || genZones(player.pos); }

function storageKey(abbr, suffix) {
  return `nbavault_${abbr.toLowerCase()}_${suffix}`;
}

// Auto-assign a contextual badge based on player stats and role
function getAutoBadge(player) {
  if (player.badge) return player.badge;
  const s = player.stats;
  if (!s) return null;
  if (s.ppg >= 30) return 'MVP CANDIDATE';
  if (s.ppg >= 25 && player.starter) return 'ELITE';
  if (s.apg >= 7) return 'FLOOR GENERAL';
  if (s.threePct >= 39 && s.ppg >= 10) return 'SHARPSHOOTER';
  if (s.rpg >= 10 && player.starter) return 'ANCHOR';
  if (s.ppg >= 18 && player.starter) return 'STARTER';
  if (s.ppg >= 12 && !player.starter) return 'SIXTH MAN';
  if (s.apg >= 5 && player.starter) return 'PLAYMAKER';
  if (s.ppg >= 15 && player.starter) return 'BREAKOUT';
  return null;
}

// Hot/Cold Streak
function StreakDots({ streak }) {
  const [hovIdx, setHovIdx] = useState(null);
  const colors = { hot: '#22c55e', cold: '#ef4444', avg: '#eab308' };
  return (
    <div className="flex gap-1.5 items-center relative">
      {streak.map((g, i) => (
        <div key={i} className="relative">
          <div
            className="w-4 h-4 rounded-full cursor-pointer transition-transform hover:scale-150"
            style={{ background: colors[g.result] }}
            onMouseEnter={() => setHovIdx(i)}
            onMouseLeave={() => setHovIdx(null)}
          />
          {hovIdx === i && (
            <div className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs whitespace-nowrap z-50 shadow-lg">
              <div className="font-bold">vs {g.opp}</div>
              <div>{g.pts} pts, {g.reb} reb{g.ast ? `, ${g.ast} ast` : ''}</div>

function RosterSection() {
  const { config, teamData } = useTeam();
  const players = teamData.players;
  const [selectedPlayer, setSelectedPlayer] = useState(null);
  const starters = players.filter(p => p.starter);
  const bench = players.filter(p => !p.starter);

  const pctChange = (curr, prev) => {
    if (!prev || prev === 0) return null;
    return Math.round(((curr - prev) / prev) * 100);
  };

  // League averages for comparison (2025-26 season)
  const leagueAvg = { ppg: 14.2, rpg: 5.4, apg: 3.1, fgPct: 46.0, threePct: 36.0 };

  const StatWithDelta = ({ val, label, prev, showComp, compAvg, isRookie }) => {
    // Prefer YoY delta if available, otherwise show league comparison (not for rookies)
    const delta = prev != null ? pctChange(val, prev) : null;
    const comp = showComp && compAvg && !isRookie ? Math.round(((val - compAvg) / compAvg) * 100) : null;
    const displayDelta = delta !== null ? delta : comp;
    const isUp = displayDelta > 0;
    const isDown = displayDelta < 0;
    return (
      <span className="inline-flex flex-col items-center leading-tight">
        <span className="flex items-baseline gap-0.5">
          <span className="font-bold">{val}</span>
          {displayDelta !== null && (
            <span className={`text-[8px] font-bold ${isUp ? 'text-green-400' : isDown ? 'text-red-400' : 'text-gray-500'}`}>
              {isUp ? '+' : ''}{displayDelta}%
            </span>
          )}
        </span>
        <span className="text-[9px] text-gray-500">{label}</span>
      </span>
    );
  };

  const PlayerTile = ({ player, large }) => (
    <div
      onClick={() => setSelectedPlayer(player)}
      className={`glass rounded-xl cursor-pointer transition-all duration-300 hover:scale-105 hover:border-team-secondary/50 group overflow-hidden ${large ? '' : 'p-3'}`}
    >
      <div className="flex flex-col items-center text-center">
        {player.headshot ? (
          large ? (
            <div className="w-full h-48 overflow-hidden rounded-t-xl mb-3 relative" style={{ background: 'linear-gradient(180deg, var(--team-deep) 0%, var(--team-midnight) 100%)' }}>
              <img src={player.headshot} alt={player.name} loading="lazy"

          </h3>
          <p className="text-xs text-gray-400">{player.pos} | #{player.number}</p>

            <StatWithDelta val={player.stats.ppg} label="PPG" prev={player.lastYear?.ppg} showComp={player.starter} compAvg={leagueAvg.ppg} isRookie={player.badge === 'ROOKIE'} />
            <StatWithDelta val={player.stats.rpg} label="RPG" prev={player.lastYear?.rpg} showComp={player.starter} compAvg={leagueAvg.rpg} isRookie={player.badge === 'ROOKIE'} />
            <StatWithDelta val={player.stats.apg} label="APG" prev={player.lastYear?.apg} showComp={player.starter} compAvg={leagueAvg.apg} isRookie={player.badge === 'ROOKIE'} />
          </div>
          {/* 2027 Projected Stats */}
          {(() => {
            // Estimate age from context: rookies ~20, no lastYear change ~24, veterans ~30
            const isRookie = player.badge === 'ROOKIE';
            const isVet = player.badge === 'VETERAN' || player.badge === 'ALL-STAR' || player.badge === 'MVP' || player.badge === 'DPOY';
            const age = player.age || (isRookie ? 20 : isVet ? 28 : player.lastYear ? 24 : 23);
            // Growth curve: young players grow, prime holds, veterans decline
            const growth = age <= 21 ? 1.12 : age <= 23 ? 1.08 : age <= 26 ? 1.04 : age <= 29 ? 1.0 : age <= 32 ? 0.94 : 0.87;
            const p27 = { ppg: +(player.stats.ppg * growth).toFixed(1), rpg: +(player.stats.rpg * growth).toFixed(1), apg: +(player.stats.apg * growth).toFixed(1) };
            return (

  return (

  const posNeeds = useMemo(() => {
    if (config.abbr === 'UTA') return [
      { pos: 'SG/SF (Wing)', need: 9, reason: 'Biggest need — shooter to space the floor alongside JJJ/Markkanen' },
      { pos: 'PG', need: 6, reason: 'George is locked in, but backup PG depth thin behind Collier' },
      { pos: 'SF/PF (Forward)', need: 4, reason: 'Markkanen and JJJ fill both spots; depth nice but not critical' },
      { pos: 'C', need: 3, reason: 'Kessler and Filipowski provide solid center rotation' },
    ];
    const players = teamData.players || [];
    const byPos = { PG: [], SG: [], SF: [], PF: [], C: [] };
    players.forEach(p => {
      const primary = (p.pos || 'SF').split('/')[0];
      if (byPos[primary]) byPos[primary].push(p);
    });
    // Score need: fewer players + lower avg PPG at position = higher need
    const posGroups = [
      { pos: 'PG', label: 'PG', players: byPos.PG },
      { pos: 'SG/SF (Wing)', label: 'Wing', players: [...byPos.SG, ...byPos.SF] },
      { pos: 'SF/PF (Forward)', label: 'Forward', players: [...byPos.SF, ...byPos.PF] },
      { pos: 'C', label: 'Center', players: byPos.C },

    return posGroups.map(g => {
      const count = g.players.length;
      const avgPpg = count > 0 ? g.players.reduce((s, p) => s + (p.stats?.ppg || 0), 0) / count : 0;
      const starPower = g.players.some(p => p.stats?.ppg >= 18);

      if (count <= 1) need += 3;
      else if (count <= 2) need += 1;

      need = Math.max(1, Math.min(10, need));

// US state boundaries as simplified SVG path data for an Albers projection
// We use a simple lat/lng → pixel projection for the US bounding box
const US_BOUNDS = { minLat: 24.5, maxLat: 49.5, minLng: -125, maxLng: -66.5 };
const WORLD_BOUNDS = { minLat: -60, maxLat: 72, minLng: -180, maxLng: 180 };

function projectPoint(lat, lng, bounds, width, height) {
  const x = ((lng - bounds.minLng) / (bounds.maxLng - bounds.minLng)) * width;
  const y = ((bounds.maxLat - lat) / (bounds.maxLat - bounds.minLat)) * height;
  return { x, y };
}

function isInUS(lat, lng) {
  return lat >= US_BOUNDS.minLat && lat <= US_BOUNDS.maxLat &&
         lng >= US_BOUNDS.minLng && lng <= US_BOUNDS.maxLng;
}

// Reverse geocode — show state only for US, country for international
async function reverseGeocode(lat, lng) {
  try {
    const resp = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=5`);
    const data = await resp.json();
    const state = data.address?.state || '';
    const country = data.address?.country_code?.toUpperCase() || '??';
    const label = country === 'US' && state ? state : (data.address?.country || 'Unknown');
    return { city: label, country };
  } catch {
    return { city: 'Unknown', country: '??' };
  }
}

const STORAGE_KEY = 'nbavault_fanmap_visitors';

function loadVisitors() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function saveVisitors(visitors) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(visitors)); } catch {}
}

function FanMap() {
  const { config } = useTeam();
  const [visitors, setVisitors] = useState(() => loadVisitors());
  const [userLoc, setUserLoc] = useState(null);
  const [hovCity, setHovCity] = useState(null);
  const [geoStatus, setGeoStatus] = useState('pending');
  const [isNewVisit, setIsNewVisit] = useState(false);

  const hasIntl = visitors.some(v => !isInUS(v.lat, v.lng));
  const mapBounds = hasIntl ? WORLD_BOUNDS : US_BOUNDS;
  const mapWidth = 800;
  const mapHeight = hasIntl ? 500 : 500;

  useEffect(() => {
    if (!navigator.geolocation) { setGeoStatus('denied'); return; }
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const lat = Math.round(pos.coords.latitude * 10) / 10;
        const lng = Math.round(pos.coords.longitude * 10) / 10;
        setUserLoc({ lat, lng });
        setGeoStatus('granted');

        const geo = await reverseGeocode(pos.coords.latitude, pos.coords.longitude);

        setVisitors(prev => {
          const existing = prev.find(v => Math.abs(v.lat - lat) < 0.2 && Math.abs(v.lng - lng) < 0.2);
          let updated;
          if (existing) {
            updated = prev.map(v => v === existing ? { ...v, count: v.count + 1, lastVisit: new Date().toISOString() } : v);
          } else {
            setIsNewVisit(true);
            updated = [...prev, { lat, lng, city: geo.city, country: geo.country, count: 1, lastVisit: new Date().toISOString() }];
          }
          saveVisitors(updated);
          return updated;
        });
      },
      () => setGeoStatus('denied')
    );
  }, []);

  const totalVisits = visitors.reduce((s, v) => s + v.count, 0);
  const uniqueLocations = visitors.length;
  const top5 = [...visitors].sort((a, b) => b.count - a.count).slice(0, 5);

      [-86.5, 30.4], [-85.0, 29.9], [-84.0, 30.0], [-83.0, 29.0], [-82.0, 27.5],
      [-81.0, 25.5], [-80.0, 25.2],
      // Florida east coast up
      [-80.1, 26.5], [-80.4, 28.5], [-81.1, 30.7], [-81.4, 31.5],
      // Atlantic coast north
      [-79.5, 33.0], [-77.9, 34.3], [-75.5, 35.5], [-75.5, 37.0], [-76.0, 37.3],
      [-76.3, 38.0], [-75.1, 38.8], [-74.7, 39.3], [-74.0, 40.5], [-73.7, 40.6],
      [-72.0, 41.0], [-71.0, 41.5], [-70.0, 41.7], [-69.9, 42.0], [-70.6, 42.7],
      [-71.0, 42.8], [-70.8, 43.1], [-67.0, 44.5], [-67.0, 47.2],

      [-89.6, 48.0], [-95.2, 49.0], [-123.3, 49.0], [-124.7, 48.4]

  // SLC reference point
  const slcPt = projectPoint(40.76, -111.89, hasIntl ? WORLD_BOUNDS : US_BOUNDS, mapWidth, mapHeight);

  return (

              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

const POLL_STORAGE_KEY = 'nbavault_poll_data';
const POLL_ANSWERED_KEY = 'nbavault_poll_answered';
const POLL_ORDER_KEY = 'nbavault_poll_order';

function loadPollData() {
  try { return JSON.parse(localStorage.getItem(POLL_STORAGE_KEY)) || {}; } catch { return {}; }
}
function savePollData(data) {
  try { localStorage.setItem(POLL_STORAGE_KEY, JSON.stringify(data)); } catch {}
}
function loadAnswered() {
  try { return JSON.parse(localStorage.getItem(POLL_ANSWERED_KEY)) || {}; } catch { return {}; }
}
function saveAnswered(data) {
  try { localStorage.setItem(POLL_ANSWERED_KEY, JSON.stringify(data)); } catch {}
}
function getShuffledOrder(questions) {
  try {
    const saved = JSON.parse(localStorage.getItem(POLL_ORDER_KEY));
    if (saved && saved.length === questions.length) return saved;
  } catch {}
  const order = questions.map((_, i) => i);
  for (let i = order.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [order[i], order[j]] = [order[j], order[i]]; }
  try { localStorage.setItem(POLL_ORDER_KEY, JSON.stringify(order)); } catch {}
  return order;
}

const POLL_COLORS = ['var(--team-secondary)', 'var(--team-primary)', 'var(--team-light)', 'color-mix(in srgb, var(--team-secondary), white 20%)', '#8B5CF6', '#EC4899', '#10B981', '#F59E0B'];

function FanPoll() {
  const { config, teamData } = useTeam();
  const pollQuestions = teamData.pollQuestions;
  const [pollData, setPollData] = useState(() => loadPollData());
  const [answered, setAnswered] = useState(() => loadAnswered());
  const [order] = useState(() => getShuffledOrder(pollQuestions));
  const [showDashboard, setShowDashboard] = useState(false);

  // Find first unanswered question in this user's shuffled order
  const currentIdx = order.findIndex(i => pollQuestions[i] && answered[pollQuestions[i].id] === undefined);
  const currentQ = currentIdx >= 0 ? pollQuestions[order[currentIdx]] : null;
  const answeredCount = Object.keys(answered).length;
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [selectedQId, setSelectedQId] = useState(null);

  const vote = (qId, optIdx) => {
    if (answered[qId] !== undefined) return;
    setSelectedAnswer(optIdx);
    setSelectedQId(qId);

    const key = `q${qId}`;
    const newData = { ...pollData };
    if (!newData[key]) newData[key] = {};
    newData[key][optIdx] = (newData[key][optIdx] || 0) + 1;
    setPollData(newData);
    savePollData(newData);

    const newAnswered = { ...answered, [qId]: optIdx };
    setAnswered(newAnswered);
    saveAnswered(newAnswered);
  };

  const goNext = () => {
    setSelectedAnswer(null);
    setSelectedQId(null);
  };

  const getQData = (qId) => {
    const key = `q${qId}`;
    return pollData[key] || {};
  };

  const getTotalVotes = (qId) => {
    const d = getQData(qId);
    return Object.values(d).reduce((s, v) => s + v, 0);
  };

  // Category stats for dashboard
  const cats = ['Draft', 'Roster', 'Team', 'Trade', 'Culture'];
  const catCounts = {};
  cats.forEach(c => { catCounts[c] = pollQuestions.filter(q => q.cat === c && answered[q.id] !== undefined).length; });
  const catTotals = {};
  cats.forEach(c => { catTotals[c] = pollQuestions.filter(q => q.cat === c).length; });

  // Most voted questions
  const mostVoted = pollQuestions
    .map(q => ({ ...q, total: getTotalVotes(q.id) }))
    .filter(q => q.total > 0)
    .sort((a, b) => b.total - a.total)
    .slice(0, 5);

  return (
    <section className="py-12 px-4 max-w-5xl mx-auto">
      <h2 className="text-3xl font-black text-center mb-2">
        <span className="text-team-secondary">FAN</span> POLL
      </h2>

      {/* Progress bar */}
      <div className="max-w-md mx-auto mb-2">
        <div className="flex justify-between text-xs text-gray-400 mb-1">
          <span>{answeredCount} of {pollQuestions.length} answered</span>
          <span>{Math.round((answeredCount / pollQuestions.length) * 100)}%</span>
        </div>
        <div className="h-2 bg-gray-800 rounded-full overflow-hidden">
          <div className="h-full bg-team-secondary rounded-full transition-all duration-500" style={{ width: `${(answeredCount / pollQuestions.length) * 100}%` }} />
        </div>
      </div>

      {/* Toggle */}
      <div className="flex justify-center gap-3 mb-8">
        <button onClick={() => setShowDashboard(false)}
          className={`px-4 py-2 rounded-full text-sm font-semibold transition-all ${!showDashboard ? 'bg-team-secondary text-black' : 'glass text-gray-400 hover:text-white'}`}>
          Vote
        </button>
        <button onClick={() => setShowDashboard(true)}
          className={`px-4 py-2 rounded-full text-sm font-semibold transition-all ${showDashboard ? 'bg-team-secondary text-black' : 'glass text-gray-400 hover:text-white'}`}>
          Dashboard
        </button>
      </div>

      {!showDashboard ? (
        /* VOTING VIEW */
        currentQ ? (
          <div className="max-w-2xl mx-auto">
            <div className="glass rounded-2xl p-6 animate-fade-in" key={currentQ.id}>
              <div className="flex items-center justify-between mb-4">
                <span className="px-3 py-1 rounded-full text-xs font-bold border border-team-primary text-team-light">{currentQ.cat}</span>
                <span className="text-xs text-gray-500">Q{answeredCount + 1}</span>
              </div>
              <h3 className="text-xl font-bold text-center mb-6">{currentQ.q}</h3>
              <div className="space-y-3">
                {currentQ.opts.map((opt, i) => {
                  const data = getQData(currentQ.id);
                  const total = Object.values(data).reduce((s, v) => s + v, 0);
                  const votes = data[i] || 0;
                  const pct = total > 0 ? Math.round((votes / total) * 100) : 0;
                  const isSelected = selectedAnswer === i && selectedQId === currentQ.id;
                  const hasVoted = answered[currentQ.id] !== undefined;
                  return (
                    <button key={i} onClick={() => vote(currentQ.id, i)}
                      disabled={hasVoted}
                      className={`w-full text-left rounded-xl p-4 transition-all duration-300 relative overflow-hidden
                        ${isSelected ? 'border-2 border-team-secondary bg-team-secondary/10' : hasVoted ? 'glass opacity-80' : 'glass hover:border-team-secondary/30 cursor-pointer'}`}>
                      {hasVoted && (
                        <div className="absolute inset-0 rounded-xl overflow-hidden">
                          <div className="h-full bg-team-primary/20 transition-all duration-700" style={{ width: `${pct}%` }} />
                        </div>
                      )}
                      <div className="relative flex justify-between items-center">
                        <span className={`font-semibold ${isSelected ? 'text-team-secondary' : ''}`}>{opt}</span>
                        {hasVoted && <span className="text-team-secondary font-bold text-lg">{pct}%</span>}
                      </div>
                      {hasVoted && <div className="relative text-xs text-gray-500 mt-1">{votes} vote{votes !== 1 ? 's' : ''}</div>}
                    </button>
                  );
                })}
              </div>
              {answered[currentQ.id] !== undefined && (
                <div className="mt-6 text-center animate-fade-in">
                  <button onClick={goNext}
                    className="px-8 py-3 rounded-xl bg-team-secondary text-black font-bold text-lg hover:bg-yellow-400 transition-all">
                    Next Question &rarr;
                  </button>
                </div>
              )}
              <p className="text-center text-xs text-gray-500 mt-4">{getTotalVotes(currentQ.id) > 0 ? `${getTotalVotes(currentQ.id)} total votes` : 'Be the first to vote!'}</p>
            </div>
          </div>
        ) : (
          <div className="text-center glass rounded-2xl p-8 max-w-md mx-auto">
            <div className="text-4xl mb-3">🏆</div>
            <h3 className="text-xl font-bold text-team-secondary mb-2">All Done!</h3>
            <p className="text-gray-400">You've answered all 50 questions. Check the Dashboard for results!</p>
            <button onClick={() => setShowDashboard(true)} className="mt-4 px-6 py-2 rounded-xl bg-team-secondary text-black font-bold hover:bg-yellow-400 transition-all">
              View Dashboard
            </button>
          </div>
        )
      ) : (
        /* DASHBOARD VIEW — community results analysis */
        <div className="space-y-8 animate-fade-in">
          {/* Overview stats */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div className="glass rounded-xl p-4 text-center">
              <div className="text-3xl font-black text-team-secondary">
                {pollQuestions.reduce((s, q) => s + getTotalVotes(q.id), 0)}
              </div>
              <div className="text-xs text-gray-400">Total Votes</div>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <div className="text-3xl font-black text-team-secondary">
                {pollQuestions.filter(q => getTotalVotes(q.id) > 0).length}/{pollQuestions.length}
              </div>
              <div className="text-xs text-gray-400">Questions Answered</div>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <div className="text-3xl font-black text-team-secondary">{answeredCount}</div>
              <div className="text-xs text-gray-400">Your Votes</div>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <div className="text-3xl font-black text-team-secondary">
                {(() => {
                  const voted = pollQuestions.filter(q => getTotalVotes(q.id) > 0);
                  if (voted.length === 0) return '—';
                  const consensus = voted.filter(q => {
                    const data = getQData(q.id); const total = getTotalVotes(q.id);
                    const maxVotes = Math.max(...q.opts.map((_, i) => data[i] || 0));
                    return total > 0 && (maxVotes / total) >= 0.5;
                  });
                  return Math.round((consensus.length / voted.length) * 100) + '%';
                })()}
              </div>
              <div className="text-xs text-gray-400">Consensus Rate</div>
            </div>
          </div>

          {/* Community Voice — narrative summary */}
          {(() => {
            const voted = pollQuestions.filter(q => getTotalVotes(q.id) > 0);
            if (voted.length === 0) return null;

            // Build consensus takeaways per category
            const takeaways = [];
            cats.forEach(cat => {
              const catQs = voted.filter(q => q.cat === cat);
              if (catQs.length === 0) return;
              const topAnswers = catQs.map(q => {
                const data = getQData(q.id); const total = getTotalVotes(q.id);
                const sorted = q.opts.map((opt, i) => ({ opt, votes: data[i] || 0 })).sort((a, b) => b.votes - a.votes);
                const pct = total > 0 ? Math.round((sorted[0].votes / total) * 100) : 0;
                return { q: q.q, winner: sorted[0].opt, pct, total };
              }).filter(a => a.pct >= 40);

              if (topAnswers.length > 0) {
                const strongest = topAnswers.sort((a, b) => b.pct - a.pct)[0];
                takeaways.push({ cat, answer: strongest.winner, pct: strongest.pct, question: strongest.q });
              }
            });

            // Most polarizing question (closest vote split)
            const polarizing = voted.map(q => {
              const data = getQData(q.id); const total = getTotalVotes(q.id);
              if (total < 2) return null;
              const sorted = q.opts.map((_, i) => data[i] || 0).sort((a, b) => b - a);
              const gap = total > 0 ? (sorted[0] - sorted[1]) / total : 1;
              return { q: q.q, gap, total };
            }).filter(Boolean).sort((a, b) => a.gap - b.gap)[0];

            return (
              <div className="glass rounded-2xl p-6">
                <h3 className="text-lg font-bold text-team-secondary mb-4">Community Voice</h3>
                <p className="text-sm text-gray-300 leading-relaxed mb-4">
                  Across {voted.length} questions with {pollQuestions.reduce((s, q) => s + getTotalVotes(q.id), 0)} total votes,
                  here's what {config.name} fans are saying:
                </p>

                {takeaways.length > 0 && (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                    {takeaways.slice(0, 6).map((t, i) => (
                      <div key={i} className="rounded-lg p-3 border border-team-primary/20" style={{ background: 'rgba(var(--team-primary-rgb),0.06)' }}>
                        <div className="text-[10px] text-gray-500 uppercase font-bold">{t.cat}</div>
                        <div className="text-sm font-semibold text-white mt-1">{t.question}</div>
                        <div className="flex items-center gap-2 mt-2">
                          <span className="text-team-secondary font-bold">{t.answer}</span>
                          <span className="text-xs text-gray-400">({t.pct}%)</span>
                          {t.pct >= 70 && <span className="text-[10px] px-1.5 py-0.5 rounded bg-green-600/20 text-green-400">Overwhelming</span>}
                          {t.pct >= 50 && t.pct < 70 && <span className="text-[10px] px-1.5 py-0.5 rounded bg-team-secondary/20 text-team-secondary">Majority</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {polarizing && (
                  <div className="rounded-lg p-3 border border-amber-500/20" style={{ background: 'rgba(245,158,11,0.05)' }}>
                    <div className="text-[10px] text-amber-400 uppercase font-bold">Most Divisive Question</div>
                    <div className="text-sm font-semibold text-white mt-1">{polarizing.q}</div>
                    <div className="text-xs text-gray-400 mt-1">Only {Math.round(polarizing.gap * 100)}% gap between top two answers ({polarizing.total} votes)</div>
                  </div>
                )}
              </div>
            );
          })()}

          {/* Community consensus — top winning answers by category */}
          {cats.map(cat => {
            const catQs = pollQuestions.filter(q => q.cat === cat && getTotalVotes(q.id) > 0);
            if (catQs.length === 0) return null;
            return (
              <div key={cat} className="glass rounded-2xl p-6">
                <h3 className="text-lg font-bold text-team-secondary mb-1">{cat}</h3>
                <p className="text-xs text-gray-500 mb-4">{catQs.length} question{catQs.length !== 1 ? 's' : ''} voted on</p>
                <div className="space-y-4">
                  {catQs.map(q => {
                    const data = getQData(q.id);
                    const total = getTotalVotes(q.id);
                    const sorted = q.opts.map((opt, i) => ({ opt, votes: data[i] || 0, i })).sort((a, b) => b.votes - a.votes);
                    const winner = sorted[0];
                    const winPct = total > 0 ? Math.round((winner.votes / total) * 100) : 0;
                    return (
                      <div key={q.id} className="glass rounded-xl p-4">
                        <div className="flex items-start justify-between mb-3">
                          <h4 className="font-semibold text-sm flex-1 text-gray-200">{q.q}</h4>
                          <span className="text-xs text-gray-500 ml-2 whitespace-nowrap">{total} votes</span>
                        </div>
                        {/* Winner highlight */}
                        <div className="flex items-center gap-2 mb-3">
                          <span className="text-team-secondary font-bold">{winner.opt}</span>
                          <span className="text-team-secondary font-black text-lg">{winPct}%</span>
                          {winPct >= 60 && <span className="text-xs px-2 py-0.5 rounded-full bg-team-secondary/20 text-team-secondary">Strong consensus</span>}
                          {winPct >= 40 && winPct < 60 && <span className="text-xs px-2 py-0.5 rounded-full bg-team-primary/30 text-team-light">Split vote</span>}
                        </div>
                        {/* All options as bars */}
                        <div className="space-y-1.5">
                          {sorted.map((s, si) => {
                            const pct = total > 0 ? Math.round((s.votes / total) * 100) : 0;
                            return (
                              <div key={si} className="flex items-center gap-2">
                                <div className="text-xs text-gray-400 w-28 truncate">{s.opt}</div>
                                <div className="flex-1 h-2 bg-gray-800 rounded-full overflow-hidden">
                                  <div className="h-full rounded-full transition-all duration-500" style={{
                                    width: `${pct}%`,
                                    background: si === 0 ? 'var(--team-secondary)' : si === 1 ? 'var(--team-primary)' : 'var(--team-light)'
                                  }} />
                                </div>
                                <span className="text-xs text-gray-500 w-10 text-right">{pct}%</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}

          {/* Votes by category chart */}
          {(() => {
            const chartData = cats.map(c => ({
              name: c,
              votes: pollQuestions.filter(q => q.cat === c).reduce((s, q) => s + getTotalVotes(q.id), 0)
            })).filter(d => d.votes > 0);
            return chartData.length > 0 && (
              <div className="glass rounded-2xl p-6">
                <h3 className="text-lg font-bold text-team-secondary mb-4">Votes by Category</h3>
                <div style={{ height: 250 }}>
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart data={chartData}>
                      <CartesianGrid strokeDasharray="3 3" stroke="rgba(var(--team-primary-rgb),0.2)" />
                      <XAxis dataKey="name" tick={{ fill: '#aaa', fontSize: 11 }} />
                      <YAxis tick={{ fill: '#aaa', fontSize: 11 }} />
                      <Tooltip contentStyle={{ background: 'var(--team-midnight)', border: '1px solid var(--team-primary)', borderRadius: 8 }} />
                      <Bar dataKey="votes" fill="var(--team-secondary)" radius={[4, 4, 0, 0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>
            );
          })()}

          <div className="text-center">
            <button onClick={() => setShowDashboard(false)} className="px-6 py-2 rounded-xl glass text-team-secondary hover:bg-team-secondary/20 font-semibold">
              {answeredCount < pollQuestions.length ? 'Keep Voting' : 'Review Questions'}
            </button>
          </div>
        </div>
      )}

      {/* Fan Map — community engagement */}
      <div className="mt-12 pt-8 border-t border-team-primary/20">
        <FanMap />
      </div>
    </section>
  );
}

// SECTION: LINEUP BUILDER

function LineupBuilder() {
  const { config, teamData } = useTeam();
  const players = teamData.players;
  const positions = ['PG', 'SG', 'SF', 'PF', 'C'];

  // Auto-fill starting lineup on mount
  const buildStartingLineup = useCallback(() => {
    const starters = players.filter(p => p.starter);
    const newLineup = { PG: null, SG: null, SF: null, PF: null, C: null };
    // First pass: exact position matches
    for (const p of starters) {
      const mainPos = p.pos.split('/')[0];
      if (newLineup[mainPos] === null) newLineup[mainPos] = p;
    }
    // Second pass: fill remaining slots
    for (const p of starters) {
      if (Object.values(newLineup).some(v => v && v.name === p.name)) continue;
      for (const pos of p.pos.split('/')) {
        if (newLineup[pos] === null) { newLineup[pos] = p; break; }
      }
      if (!Object.values(newLineup).some(v => v && v.name === p.name)) {
        for (const pos of positions) { if (!newLineup[pos]) { newLineup[pos] = p; break; } }
      }
    }
    return newLineup;
  }, [players]);

  const [lineup, setLineup] = useState(buildStartingLineup);
  const [report, setReport] = useState(null);

  // Reset lineup when team changes
  useEffect(() => {
    setLineup(buildStartingLineup());
  }, [players]);

  const assignPlayer = (player) => {
    const posOptions = player.pos.split('/');
    for (const pos of posOptions) {
      if (lineup[pos] === null) { setLineup(prev => ({ ...prev, [pos]: player })); return; }
    }
    for (const pos of positions) {
      if (!lineup[pos]) { setLineup(prev => ({ ...prev, [pos]: player })); return; }
    }
  };

  const removePlayer = (pos) => {
    setLineup(prev => ({ ...prev, [pos]: null }));
  };

  const filledCount = Object.values(lineup).filter(Boolean).length;
  const usedNames = new Set(Object.values(lineup).filter(Boolean).map(p => p.name));
  const lineupPlayers = Object.values(lineup).filter(Boolean);

  // Generate comprehensive analysis
  const generateAnalysis = useCallback((lp) => {
    const ps = Object.entries(lp).filter(([_, v]) => v).map(([pos, p]) => ({ pos, ...p }));
    if (ps.length < 5) return null;

    const totalPPG = ps.reduce((s, p) => s + p.stats.ppg, 0);
    const totalRPG = ps.reduce((s, p) => s + p.stats.rpg, 0);
    const totalAPG = ps.reduce((s, p) => s + p.stats.apg, 0);
    const avgFG = (ps.reduce((s, p) => s + p.stats.fgPct, 0) / 5);
    const avg3 = (ps.reduce((s, p) => s + p.stats.threePct, 0) / 5);
    const avgShot = ps.reduce((s, p) => s + (p.radar?.Shooting || 50), 0) / 5;
    const avgPlay = ps.reduce((s, p) => s + (p.radar?.Playmaking || 50), 0) / 5;
    const avgDef = ps.reduce((s, p) => s + (p.radar?.Defense || 50), 0) / 5;
    const avgScor = ps.reduce((s, p) => s + (p.radar?.Scoring || 50), 0) / 5;
    const avgAthl = ps.reduce((s, p) => s + (p.radar?.Athleticism || 50), 0) / 5;
    const avgIQ = ps.reduce((s, p) => s + (p.radar?.IQ || 50), 0) / 5;
    const starterCount = ps.filter(p => p.starter).length;
    const topScorer = ps.reduce((a, b) => a.stats.ppg > b.stats.ppg ? a : b);
    const topAssist = ps.reduce((a, b) => a.stats.apg > b.stats.apg ? a : b);
    const topReb = ps.reduce((a, b) => a.stats.rpg > b.stats.rpg ? a : b);

    // Identity
    let identity = 'Balanced';
    if (avgScor > 70 && avgShot > 60) identity = 'Offensive Juggernaut';
    else if (avgDef > 65 && avgAthl > 65) identity = 'Defensive Wall';
    else if (avgPlay > 65 && totalAPG > 25) identity = 'Ball Movement';
    else if (avgShot > 65) identity = 'Perimeter-Oriented';
    else if (avgAthl > 70) identity = 'Athletic & Transition';
    else if (avgIQ > 65) identity = 'High IQ & Disciplined';

    // Chemistry
    let chemistry = 5 + Math.min(starterCount, 5);
    if (starterCount >= 4) chemistry += 1;
    if (avgPlay > 60) chemistry += 1;
    chemistry = Math.min(10, chemistry);

    // Offensive rating estimate
    const offRating = (95 + totalPPG * 0.12 + avgShot * 0.08 + avgPlay * 0.05).toFixed(1);
    const defRating = (108 - avgDef * 0.12 - avgAthl * 0.03).toFixed(1);
    const netRating = (offRating - defRating).toFixed(1);

    // Strengths
    const strengths = [];
    if (totalPPG > 100) strengths.push(`Elite scoring output — ${totalPPG.toFixed(1)} combined PPG across all five positions`);
    if (avgShot > 62) strengths.push('Multiple three-point threats stretch the floor and create driving lanes');
    if (avgPlay > 62) strengths.push('Strong playmaking creates high-quality shots through ball movement');
    if (avgDef > 62) strengths.push('Switchable defense that can guard multiple actions and lineups');
    if (avgAthl > 65) strengths.push('Athletic lineup that dominates in transition and on the glass');
    if (starterCount >= 4) strengths.push('Core unit with established chemistry and shared experience');
    if (totalAPG > 25) strengths.push(`High assist rate (${totalAPG.toFixed(1)} APG) creates efficient team offense`);
    if (strengths.length === 0) strengths.push('Versatile lineup with multiple ways to generate offense');

    // Weaknesses
    const weaknesses = [];
    if (avgShot < 50) weaknesses.push('Limited perimeter shooting — defenses can pack the paint');
    if (avgDef < 55) weaknesses.push('Defensive concerns — vulnerable to elite scoring teams');
    if (avgPlay < 45) weaknesses.push('Lack of playmaking — may struggle in half-court execution');
    if (totalRPG < 30) weaknesses.push('Undersized lineup could be outrebounded by bigger frontcourts');
    if (avg3 < 30) weaknesses.push('Poor three-point shooting limits floor spacing');
    if (weaknesses.length === 0) weaknesses.push('No glaring weaknesses — well-constructed on both ends');

    // Coach's analysis paragraph
    const coachAnalysis = `This ${identity.toLowerCase()} lineup is anchored by ${topScorer.name}'s ${topScorer.stats.ppg} PPG scoring, with ${topAssist.name} orchestrating as the primary facilitator at ${topAssist.stats.apg} APG. ${topReb.name} controls the glass at ${topReb.stats.rpg} RPG, giving this unit a physical presence inside. ` +
      (avgShot > 58 ? `The perimeter shooting (${avg3.toFixed(1)}% team 3PT) creates the spacing needed for driving lanes and pick-and-roll actions. ` : `The offense will need to generate points through paint touches and transition, as the perimeter shooting (${avg3.toFixed(1)}% team 3PT) is below league average. `) +
      (avgDef > 60 ? `Defensively, this group can switch across positions and contest shots at the rim. ` : `Defensively, this lineup will need to rely on scheme and effort over individual talent. `) +
      `With a projected ${offRating} offensive rating and ${defRating} defensive rating, this unit projects as a ${parseFloat(netRating) > 3 ? 'dominant' : parseFloat(netRating) > 0 ? 'positive' : 'negative'} net-rating lineup (${netRating > 0 ? '+' : ''}${netRating}).`;

    return {
      ppg: totalPPG.toFixed(1), rpg: totalRPG.toFixed(1), apg: totalAPG.toFixed(1),
      chemistry, identity, offRating, defRating, netRating,
      topScorer, topAssist, topReb,
      strengths, weaknesses, coachAnalysis,
      avgShot: avgShot.toFixed(0), avgDef: avgDef.toFixed(0), avgAthl: avgAthl.toFixed(0),
      avgPlay: avgPlay.toFixed(0), avgIQ: avgIQ.toFixed(0), avgScor: avgScor.toFixed(0),
    };
  }, []);

  useEffect(() => {
    setReport(filledCount === 5 ? generateAnalysis(lineup) : null);
  }, [lineup, filledCount, generateAnalysis]);

  return (
    <section className="py-12 px-4 max-w-5xl mx-auto">
      <h2 className="text-3xl font-black text-center mb-2">
        <span className="text-team-secondary">LINEUP</span> BUILDER
      </h2>
      <p className="text-center text-gray-400 mb-6">Build and analyze any {config.name} lineup</p>

      {/* Position Slots with Player Images */}
      <div className="flex justify-center gap-3 mb-6 flex-wrap">
        {positions.map(pos => (
          <div key={pos} className={`glass rounded-xl p-3 w-36 text-center transition-all cursor-pointer ${lineup[pos] ? 'border-team-secondary/50 hover:border-red-500/50' : 'border-dashed border-2 border-team-primary/50'}`}
            onClick={() => lineup[pos] && removePlayer(pos)}>

              <div className="relative group">

                  <div className="w-20 h-20 mx-auto rounded-full overflow-hidden border-2 border-team-primary/40 mb-2" style={{ background: 'linear-gradient(180deg, var(--team-deep), var(--team-midnight))' }}>
                    <img src={lineup[pos].headshot} alt={lineup[pos].name} loading="lazy" className="w-full h-full object-cover object-top" />

                  <JerseyAvatar number={lineup[pos].number} size={56} />

                <div className="text-xs font-bold truncate">{lineup[pos].name.split(' ').pop()}</div>
                <div className="text-[10px] text-gray-400">{lineup[pos].stats.ppg} PPG</div>
                <div className="absolute inset-0 flex items-center justify-center bg-red-900/60 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity">
                  <span className="text-white text-xs font-bold">Remove</span>
                </div>
              </div>
            ) : (
              <div className="py-4">
                <div className="text-3xl text-gray-600">+</div>
                <div className="text-[10px] text-gray-500 mt-1">Tap to add</div>
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Quick Actions */}
      <div className="flex justify-center gap-3 mb-6">
        <button onClick={() => setLineup(buildStartingLineup())}
          className="px-4 py-2 rounded-full glass text-team-secondary hover:bg-team-secondary/20 text-xs font-semibold">
          Load Starters
        </button>
        <button onClick={() => setLineup({ PG: null, SG: null, SF: null, PF: null, C: null })}
          className="px-4 py-2 rounded-full glass text-gray-400 hover:text-white text-xs font-semibold">
          Clear All
        </button>
      </div>

      {/* Available Players */}
      <div className="glass rounded-2xl p-4 mb-8">
        <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3 text-center">Available Players</h3>
        <div className="flex flex-wrap gap-2 justify-center">
          {players.map(p => (
            <button key={p.name} onClick={() => assignPlayer(p)}
              disabled={usedNames.has(p.name)}
              className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold transition-all ${usedNames.has(p.name) ? 'bg-gray-800/50 text-gray-600 cursor-not-allowed' : 'glass text-white hover:bg-team-secondary/20 hover:text-team-secondary'}`}>
              {p.headshot && !usedNames.has(p.name) && (
                <img src={p.headshot} alt="" className="w-5 h-5 rounded-full object-cover" loading="lazy" />
              )}
              {p.name.split(' ').pop()} <span className="text-gray-500">{p.stats.ppg}</span>
            </button>
          ))}
        </div>
      </div>

      {/* Full Analysis Report */}
      {report && (
        <div className="space-y-6 animate-fade-in">
          {/* Stats Overview */}
          <div className="glass rounded-2xl p-6">
            <div className="flex items-center justify-between mb-4">
              <h3 className="text-lg font-bold text-team-secondary">Lineup Analysis</h3>
              <span className="px-4 py-1 rounded-full bg-team-secondary/20 text-team-secondary font-bold text-sm">{report.identity}</span>
            </div>
            <div className="grid grid-cols-3 md:grid-cols-6 gap-3 mb-6">
              {[
                ['PPG', report.ppg], ['RPG', report.rpg], ['APG', report.apg],
                ['Off Rtg', report.offRating], ['Def Rtg', report.defRating],
                ['Net', (report.netRating > 0 ? '+' : '') + report.netRating],
              ].map(([label, val]) => (
                <div key={label} className="text-center rounded-lg p-2" style={{ background: 'rgba(var(--team-primary-rgb),0.08)' }}>
                  <div className="text-lg font-black text-team-secondary">{val}</div>
                  <div className="text-[10px] text-gray-400">{label}</div>
                </div>
              ))}
            </div>

            {/* Chemistry meter */}
            <div className="mb-4">
              <div className="flex justify-between text-xs text-gray-400 mb-1">
                <span>Chemistry</span><span>{report.chemistry}/10</span>
              </div>
              <div className="h-3 bg-gray-800 rounded-full overflow-hidden">
                <div className="h-full rounded-full transition-all duration-700" style={{
                  width: `${report.chemistry * 10}%`,
                  background: report.chemistry >= 8 ? 'linear-gradient(90deg, var(--team-secondary), color-mix(in srgb, var(--team-secondary), white 20%))' :
                    report.chemistry >= 6 ? 'var(--team-primary)' : '#6b7280'
                }} />
              </div>
            </div>

            {/* Radar summary */}
            <div className="grid grid-cols-3 md:grid-cols-6 gap-2">
              {[
                ['Scoring', report.avgScor], ['Shooting', report.avgShot], ['Playmaking', report.avgPlay],
                ['Defense', report.avgDef], ['Athleticism', report.avgAthl], ['IQ', report.avgIQ],
              ].map(([label, val]) => (
                <div key={label} className="text-center">
                  <div className="text-sm font-bold text-white">{val}</div>
                  <div className="h-1.5 bg-gray-800 rounded-full overflow-hidden mt-1">
                    <div className="h-full bg-team-secondary rounded-full" style={{ width: `${val}%` }} />
                  </div>
                  <div className="text-[9px] text-gray-500 mt-1">{label}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Coach's Analysis */}
          <div className="glass rounded-2xl p-6">
            <h3 className="text-lg font-bold text-team-secondary mb-3">Coach's Analysis</h3>
            <p className="text-sm text-gray-300 leading-relaxed">{report.coachAnalysis}</p>
          </div>

          {/* Strengths & Weaknesses */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className="glass rounded-2xl p-5">
              <h3 className="text-sm font-bold text-green-400 mb-3">STRENGTHS</h3>
              <div className="space-y-2">
                {report.strengths.map((s, i) => (
                  <div key={i} className="flex items-start gap-2 text-sm"><span className="text-green-400 mt-0.5">&#10003;</span><span className="text-gray-300">{s}</span></div>
                ))}
              </div>
            </div>
            <div className="glass rounded-2xl p-5">
              <h3 className="text-sm font-bold text-amber-400 mb-3">WEAKNESSES</h3>
              <div className="space-y-2">
                {report.weaknesses.map((w, i) => (
                  <div key={i} className="flex items-start gap-2 text-sm"><span className="text-amber-400 mt-0.5">&#9888;</span><span className="text-gray-300">{w}</span></div>
                ))}
              </div>
            </div>
          </div>

          {/* Key Players */}
          <div className="glass rounded-2xl p-6">
            <h3 className="text-sm font-bold text-team-secondary mb-3">KEY MATCHUP ADVANTAGES</h3>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
              <div className="rounded-lg p-3" style={{ background: 'rgba(var(--team-primary-rgb),0.08)' }}>
                <div className="text-[10px] text-gray-500 uppercase">Top Scorer</div>
                <div className="font-bold text-sm text-white">{report.topScorer.name}</div>
                <div className="text-xs text-team-secondary">{report.topScorer.stats.ppg} PPG on {report.topScorer.stats.fgPct}% FG</div>
              </div>
              <div className="rounded-lg p-3" style={{ background: 'rgba(var(--team-primary-rgb),0.08)' }}>
                <div className="text-[10px] text-gray-500 uppercase">Primary Facilitator</div>
                <div className="font-bold text-sm text-white">{report.topAssist.name}</div>
                <div className="text-xs text-team-secondary">{report.topAssist.stats.apg} APG with {report.topAssist.stats.ppg} PPG</div>
              </div>
              <div className="rounded-lg p-3" style={{ background: 'rgba(var(--team-primary-rgb),0.08)' }}>
                <div className="text-[10px] text-gray-500 uppercase">Glass Cleaner</div>
                <div className="font-bold text-sm text-white">{report.topReb.name}</div>
                <div className="text-xs text-team-secondary">{report.topReb.stats.rpg} RPG at {report.topReb.pos}</div>
              </div>
            </div>
          </div>
        </div>
      )}
    </section>
  );
}
